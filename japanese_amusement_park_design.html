<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>国産遊園地設計検定 - 難易度5</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>国産遊園地設計検定 - 難易度5</h1>
    <div class="desc">遊園地工学や土木設計、テーマパーク企画、安全設備に関する高度な知識を問うマニアックなクイズです。国産遊園地の設計技術や安全基準について深堀りします。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "日本の有名な遊園地における土木設計で、地盤の液状化対策として最も一般的に採用される技術はどれか？", "choices": ["柱状改良工法による地盤強化", "表層地盤改良による土壌混合", "排水・排土による地盤改良", "地中連続壁工法による支持杭設置"], "answer": 0, "explanation": "柱状改良工法は、地中深くにセメント系固化材と土を攪拌混合して柱状の強化体を形成し、液状化を防止する方法として日本の遊園地設計で広く用いられています。"}, {"question": "テーマパーク内の大規模噴水設備設計における水圧管理で重要な機能はどれか？", "choices": ["循環ポンプの圧力制御装置", "単方向逆流防止弁", "溢水排水口の容量計算", "水質浄化フィルターの設置位置"], "answer": 0, "explanation": "循環ポンプの圧力制御装置は、噴水の水圧を一定に保つために不可欠で、過剰水圧による配管損傷や噴水の不安定動作を防ぐため重要です。"}, {"question": "日本の遊園地遊具の安全基準で定められている耐風速基準の主な目的は何か？", "choices": ["利用者の落下防止のための構造強度確保", "風による遊具の転倒や破損防止", "騒音の抑制による環境保護", "火災時の避難誘導のための視認性向上"], "answer": 1, "explanation": "耐風速基準は、強風による遊具の転倒や部品脱落を防ぎ、安全な利用環境を維持するために風圧力に耐えうる設計を義務付けています。"}, {"question": "遊園地におけるテーマパーク企画段階での来園者動線設計で重視される点はどれか？", "choices": ["歩行距離の最小化と自然な誘導効果", "多様な障害物配置による安全確保", "施設ごとの独立した動線確保", "動線内の店舗数の最大化"], "answer": 0, "explanation": "来園者の歩行負担を減らし、主要施設へ自然に誘導できる動線設計は来園者満足度や回遊率向上に直結し、テーマパーク企画で重要視されます。"}, {"question": "ローラーコースターの土木構造設計で、橋脚の耐震設計として最も適切な考え方はどれか？", "choices": ["設計地震動のスペクトル加速度に基づいた動的解析", "経験則に基づく過去事故例の対策適用", "風圧強度のみの静的強度計算", "地震波速度を無視した静的解析"], "answer": 0, "explanation": "橋脚耐震設計では、設計地震動のスペクトル加速度に基づいた動的解析が施され、動的応答を考慮した安全かつ経済的な設計が求められます。"}, {"question": "水系アトラクションにおいて、水質管理の根拠となる法令はどれか？", "choices": ["遊園地施設衛生管理基準", "水道法", "廃棄物処理法", "建築基準法"], "answer": 0, "explanation": "遊園地施設衛生管理基準は、水系アトラクションの水質維持に関するガイドラインを示し、安全な利用環境の確保に必要とされます。"}, {"question": "遊園地の配線設計において、屋外配線の防水対策で一般的に用いられる方法はどれか？", "choices": ["防水型配管内配線", "無防水露出配線", "開放型金属管配線", "電線の屋内型絶縁強化のみ"], "answer": 0, "explanation": "防水型配管内配線は、雨水や湿気から電線を保護し、劣化防止と安全確保に有効な方法として採用されています。"}, {"question": "遊園地の動的アトラクション設計で、加速度制御が最も重要となる理由はどれか？", "choices": ["利用者の安全確保と快適性の両立", "最大速度の追求のみの技術指標", "音響効果向上のための振動増幅", "照明設備の同期動作制御"], "answer": 0, "explanation": "過剰な加速度は利用者の安全を脅かすため、適正な範囲に制御し快適な体験を提供することが設計の重点です。"}, {"question": "日本の遊園地設計において、年間降雨量が多い地域で屋外通路に採用すべき舗装材料はどれか？", "choices": ["透水性コンクリート舗装", "アスファルト舗装のみ", "砂利敷き舗装", "土舗装"], "answer": 0, "explanation": "透水性コンクリート舗装は雨水を地中に浸透させ排水負荷を軽減し、滑りにくさも確保できるため、多雨地域の通路舗装に適しています。"}, {"question": "遊園地設備の定期保守点検で特に重視される機器はどれか？", "choices": ["緊急停止装置の動作確認", "看板の視認性チェック", "ゴミ箱の清掃状況", "案内パネルの照明確認"], "answer": 0, "explanation": "緊急停止装置は事故発生時の重大な安全装置のため、正常動作が常に保たれているかの点検が最優先されます。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
