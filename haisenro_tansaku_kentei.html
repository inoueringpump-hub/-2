<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>廃線路探索検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>廃線路探索検定</h1>
    <div class="desc">鉄道史や廃線跡の地図読み、鉄道遺産に関するマニアックなクイズゲームです。廃線ファンの知識を試す難易度5の問題を10問用意しました。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "日本初の国鉄の廃線路として正式に認定された路線はどれか？", "choices": ["信越本線の一部区間", "南武線の登戸～稲田堤間", "三井三池鉄道の一部", "赤穂線の有年～長船間"], "answer": 0, "explanation": "日本で最初に正式な廃線路として認められたのは信越本線の一部区間で、1968年に転換されたことが鉄道史上有名です。"}, {"question": "廃線跡探訪でよく見られる「ノスタルジックな鉄橋」の正式名称として正しいものは？", "choices": ["アーチ式桁橋", "ラーメン橋梁", "トラス橋", "吊り橋"], "answer": 2, "explanation": "多くの廃線跡の鉄橋は鉄鋼を組んで三角形の構造を作ったトラス橋で、強度と資材節約の両面からよく用いられました。"}, {"question": "廃線を利用した遊歩道「レールバイク」の元となった鉄道区分はどれか？", "choices": ["専用貨物線", "軌道線（路面電車）", "軽便鉄道", "山岳鉄道"], "answer": 2, "explanation": "軽便鉄道の廃線路は幅が狭く整地しやすいので、レールバイクやサイクリングロードとして再利用されることが多いです。"}, {"question": "鉄道遺産の保存団体で知られる「日本鉄道保存協会」が特に力を入れているのは何の保存か？", "choices": ["蒸気機関車と関連設備", "戦時中の鉄道トンネル", "駅名標や看板", "鉄道用信号設備"], "answer": 0, "explanation": "日本鉄道保存協会は特に蒸気機関車本体と機関庫など関連設備の保存に力を入れており、多くの蒸気機関車を動態保存しています。"}, {"question": "廃線路の地図読みにおいて鉄道跡特有の曲線の呼称「緩和曲線」は何のために設けられているか？", "choices": ["線路のカント調整を円滑にするため", "乗客の目線を固定するため", "トンネル出口の気密性を高めるため", "保線作業の効率化のため"], "answer": 0, "explanation": "緩和曲線は直線区間から曲線区間へ徐々に曲がるための曲線で、電車のカント（傾斜）調整を自然に行う目的で設けられています。"}, {"question": "廃線跡探索において、地図上で「赤破線」で表示されるものは一般的に何を指すか？", "choices": ["廃線撤去済の旧線跡", "現役の非電化線路", "廃線路跡の遊歩道", "廃線路のトンネル部分"], "answer": 2, "explanation": "赤破線は廃線路を遊歩道などとして整備・利活用している道路を示す地図表記で、多くの地図に共通しています。"}, {"question": "名古屋鉄道（名鉄）の廃線で、電化されていた区間はどれか？", "choices": ["愛知環状鉄道の旧線区間", "揖斐線の一部区間", "豊橋鉄道東田本線の全線", "三河線の廃止区間"], "answer": 1, "explanation": "揖斐線の一部廃止区間は電化された地方私鉄の廃線例として知られており、路線の一部が廃止されました。"}, {"question": "鉄道廃線跡に残る「バラスト」とは何の役割を持つものか？", "choices": ["線路の安定性を保つ砕石", "レールの固定用ボルト", "信号線路の断熱材", "線路周りの雑草防止剤"], "answer": 0, "explanation": "バラストとは線路の下に敷かれて砕石のことを指し、線路の安定性や排水性を確保する役割があります。"}, {"question": "鉄道廃線に伴い消滅した日本最長級の鉄道トンネルはどれか？", "choices": ["八甲田トンネル", "青函トンネル", "霞ヶ関トンネル", "上越線旧線の関越トンネル"], "answer": 3, "explanation": "上越線旧線に存在した関越トンネルは長大で廃線となり、その後の新線に置き換えられ現在は廃止されています。"}, {"question": "廃線跡を活用した「レールマウンテンバイク」の特徴として誤っているものは？", "choices": ["廃線の線路脇に専用コースを設置する", "線路上に特別な車両を走らせる", "走行中のレール上での車輪駆動が基本", "利用者が電動モーターで推進することが多い"], "answer": 0, "explanation": "レールマウンテンバイクは実際に廃線の線路上を専用の車両で走行する形態であり、線路脇にだけ設置するわけではありません。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
