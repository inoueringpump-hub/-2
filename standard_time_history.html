<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>標準時制定史検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>標準時制定史検定</h1>
    <div class="desc">時間制度史の重要な出来事や人物、世界標準時の成立過程、経緯度測量の技術的背景、時間調整技術の発展などに関するマニアックな問題を10問出題します。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "グリニッジ標準時(GMT)の基準子午線が制定された国際会議は何年に開催されたか？", "choices": ["1875年のパリ国際地球会議", "1884年のワシントン子午線会議", "1900年のハーグ会議", "1912年のワシントン経度会議"], "answer": 1, "explanation": "1884年のワシントン子午線会議で、世界の経度基準としてグリニッジ天文台を通る子午線が採用され、これが後にGMTの基準となった。"}, {"question": "世界標準時(UTC)の正式採用はどの年で、どのような制度から発展したか？", "choices": ["1967年、原子時計を基にした国際原子時(TAI)から", "1955年、天文観測による恒星時から", "1972年、太陽時と原子時の調整から", "1984年、衛星時報技術の採用から"], "answer": 2, "explanation": "UTCは1972年に正式に採用され、太陽時の不規則性を補うため原子時計の国際原子時(TAI)に閏秒を挿入しつつ調整する制度として発展した。"}, {"question": "経緯度測量における世界最初の正確な時間標準をもとにした測量プロジェクトは何か？", "choices": ["フランスのメートル原器制作計画", "イギリスのグリニッジ天文台による子午線測定", "アメリカの米国国立標準時計画", "ロシアの測地網整備計画"], "answer": 1, "explanation": "グリニッジ天文台は19世紀に、正確な時間観測を用いて本初子午線の位置を確定し、これを基準とした経度測量プロジェクトを実施した。"}, {"question": "時間調整技術としてUTCにおける閏秒の挿入が始まった年はいつか？", "choices": ["1965年", "1972年", "1980年", "1990年"], "answer": 1, "explanation": "1972年にUTCに閏秒の挿入が開始され、地球の自転不均一性による時間のずれを修正している。"}, {"question": "世界標準時の元となる座標子午線を決定した国際会議で多くの国が支持したのはなぜか？", "choices": ["経済的強国としてのイギリスの影響力が強かったため", "経度測定の標準データが豊富だったため", "子午線の位置が中央に近かったため", "複雑な技術的理由で選ばれたため"], "answer": 0, "explanation": "19世紀終わりの国際会議では、当時海運・経済の中心であったイギリスの影響力が強く、グリニッジ子午線が標準として選定された背景がある。"}, {"question": "経緯度測量において重要な技術革新となったクロンキスト図法の特徴は何か？", "choices": ["角度と距離を正確に測定可能にした", "地球の楕円体形状を数学的に表現した", "経線と緯線の交差点を正確に定義できた", "遠隔地間の時間差測定が容易になった"], "answer": 1, "explanation": "クロンキスト図法は地球の楕円体形状を数学的に近似し、測量や地図作成の精度向上に寄与した。"}, {"question": "世界標準時の前身とされるグリニッジ平均時が公式に認められた国は？", "choices": ["イギリス", "フランス", "アメリカ合衆国", "ドイツ"], "answer": 0, "explanation": "グリニッジ平均時はイギリスのグリニッジ天文台を基準としており、イギリスが公式にこれを認めて運用した。"}, {"question": "経緯度測量で天体観測に重要な基準となったのはどの恒星か？", "choices": ["北極星（ポラリス）", "シリウス", "ベテルギウス", "アークトゥルス"], "answer": 0, "explanation": "北極星は地球の自転軸に近い位置にあり、方位・経緯度測量で方角や緯度の基準として古くから使用された。"}, {"question": "原子時計が時間制度に導入されていった背景として正しいものは？", "choices": ["天文計測の不確実性を克服するため", "経度測量の精度向上を目的として", "世界的標準時の採用を目指して", "閏秒制度の廃止に伴い"], "answer": 0, "explanation": "原子時計は地球の自転不均一や天文時の不確実性を克服し、秒の基準を格段に安定化させるために導入された。"}, {"question": "世界標準時の標準子午線がグリニッジに決定されたのは、どのような技術的要件があったためか？", "choices": ["正確な天文観測設備が存在していたため", "中央ヨーロッパに位置していたため", "標準時を決めるための政治的理由のみ", "衛星観測が可能だったため"], "answer": 0, "explanation": "グリニッジには高度な天文台があり、正確な時刻計測と経度決定に必要な技術的基盤が整っていたため採用された。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
