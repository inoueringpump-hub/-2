<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マニアックな鉱石標本収集検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>マニアックな鉱石標本収集検定</h1>
    <div class="desc">鉱石の種類や成分、結晶構造など鉱物学の専門用語と収集のポイントに関する基礎知識を試すクイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "結晶構造が立方体で有名な鉱石はどれ？", "choices": ["石英（Quartz）", "蛍石（Fluorite）", "方解石（Calcite）", "黄鉄鉱（Pyrite）"], "answer": 1, "explanation": "蛍石は立方体の結晶構造を持ち、その特徴的な形状で識別されやすい鉱石です。"}, {"question": "黒鉛の主成分は何？", "choices": ["酸化鉄（Fe2O3）", "炭素（C）", "シリコン（Si）", "カルシウム（Ca）"], "answer": 1, "explanation": "黒鉛は炭素の一種で、結晶構造は層状に積み重なっているため柔らかい性質があります。"}, {"question": "蛍光性を持つことが多い鉱石は？", "choices": ["蛍石（Fluorite）", "方解石（Calcite）", "石英（Quartz）", "赤鉄鉱（Hematite）"], "answer": 0, "explanation": "蛍石は紫外線を当てると特有の蛍光を発することが知られており、鑑定ポイントの一つです。"}, {"question": "方解石の主な構成元素は何？", "choices": ["硫黄（S）", "カルシウム（Ca）", "鉄（Fe）", "アルミニウム（Al）"], "answer": 1, "explanation": "方解石は炭酸カルシウム（CaCO3）から成り、カルシウムが主要元素です。"}, {"question": "鉱石の硬度が最も高いのはどれ？", "choices": ["金（Au）", "ダイヤモンド（Diamond）", "石膏（Gypsum）", "方解石（Calcite）"], "answer": 1, "explanation": "ダイヤモンドはモース硬度10であり、自然界で最も硬い鉱物です。"}, {"question": "鉄を主成分とする鉱石はどれ？", "choices": ["菱マンガン鉱（Rhodonite）", "黄銅鉱（Chalcopyrite）", "赤鉄鉱（Hematite）", "石灰石（Limestone）"], "answer": 2, "explanation": "赤鉄鉱は主に酸化鉄（Fe2O3）で構成されており、鉄鉱石として重要です。"}, {"question": "結晶構造が六方晶系である鉱石を選んでください。", "choices": ["黒鉛（Graphite）", "磁鉄鉱（Magnetite）", "蛍石（Fluorite）", "石英（Quartz）"], "answer": 3, "explanation": "石英は六方晶系の結晶構造を持ち、多様な形態で産出されます。"}, {"question": "鉱石採集時、蛍石を見つけやすい環境は？", "choices": ["深海底の堆積物", "酸性鉱床の周辺", "花崗岩周辺の鉱脈", "火山性熱水鉱床"], "answer": 3, "explanation": "蛍石は火山性熱水活動に伴う鉱床でよく見られ、鉱脈中に結晶を作ります。"}, {"question": "鉱物の光沢で「金属光沢」を示す代表的な鉱石は？", "choices": ["黄鉄鉱（Pyrite）", "石英（Quartz）", "方解石（Calcite）", "雲母（Mica）"], "answer": 0, "explanation": "黄鉄鉱は金属光沢が強い特徴を持ち、「愚か者の金」としても知られています。"}, {"question": "鉱石中のマンガンを多く含む鉱物は？", "choices": ["菱マンガン鉱（Rhodonite）", "赤鉄鉱（Hematite）", "灰鉄鉱（Siderite）", "方解石（Calcite）"], "answer": 0, "explanation": "菱マンガン鉱は主にマンガンを含む鉱物で、鮮やかな赤色が特徴です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
