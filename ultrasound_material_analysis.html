<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>超音波材料解析検定 クイズ Lv.5</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>超音波材料解析検定 クイズ Lv.5</h1>
    <div class="desc">材料科学と波動解析を駆使した超音波法による非破壊検査の専門知識を問う、難易度5の全10問クイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "超音波を用いた材料内部の欠陥検査におけるパルス反射法の主な原理は何か？", "choices": ["材料に超音波を連続して照射し、透過波の減衰を測定する方法", "材料に単一パルスの超音波を入射させ、反射波の到達時間と強度を解析する方法", "材料を超音波で振動させ、放出される音響エネルギーを計測する方法", "材料の超音波透過率を波長別に分光解析する方法"], "answer": 1, "explanation": "パルス反射法は材料に単一のパルス超音波を入射し、欠陥などで反射される波の到達時間と振幅から内部状態を推定する非破壊検査手法です。"}, {"question": "超音波の散乱強度が粒子径の大きさよりも波長がはるかに大きい場合、適用できる散乱理論は何か？", "choices": ["レイリー散乱理論", "マッハ・ゼンダー散乱モデル", "ミー散乱理論", "非弾性散乱理論"], "answer": 0, "explanation": "粒子径が波長より小さい領域ではレイリー散乱理論が適用され、散乱波強度は粒子径の6乗に比例するとされます。"}, {"question": "超音波の伝搬速度が材料の弾性定数に依存する関係はどれか？", "choices": ["速度は密度の平方根に比例し弾性率に反比例する", "速度は弾性率の平方根を密度の平方根で割った値に比例する", "速度は材料の熱膨張率にのみ依存する", "速度は弾性率には依存せず、材料の硬さだけに依存する"], "answer": 1, "explanation": "超音波の伝搬速度は材料の弾性率（ヤング率やせん断弾性率）の平方根に比例し、密度の平方根で割った値に比例することが材料力学的に知られています。"}, {"question": "非破壊検査における超音波探傷法で用いられるトランスデューサの役割は何か？", "choices": ["超音波のデジタル解析を行う信号処理装置", "超音波波形の周波数を増幅する増幅器", "電気信号と機械的超音波振動を相互変換するセンサー", "欠陥の深さをレーザーで測定する光学装置"], "answer": 2, "explanation": "トランスデューサは電気信号を機械的な超音波振動に変換し、また反射波を受信して電気信号に戻す装置で、超音波探傷法の基本構成要素です。"}, {"question": "超音波の周波数が高いほど材料内部のどの特性に影響を与えるか？", "choices": ["透過深度の増加と空孔サイズの無視", "透過深度の減少と微小欠陥検出能力の向上", "材料の弾性率の変化", "欠陥の化学組成の解析"], "answer": 1, "explanation": "高周波超音波は材料内の散乱や吸収のため透過深度が減少するが、逆に微小な欠陥を高解像度で検出可能となるため、検査目的に応じ周波数選択が重要です。"}, {"question": "フェーズドアレイ超音波検査でビームを電子的に制御する主な利点は何か？", "choices": ["超音波の振幅を自動的に上げることができる", "検査対象外の雑音を完全に除去できる", "試験部を物理的に動かさずにビームの方向や焦点深度を自在に変えられる", "任意の周波数への変更が可能になる"], "answer": 2, "explanation": "フェーズドアレイ超音波探傷は複数の素子の電気遅延時間を調整してビームの方向や焦点位置を電子的に動かせるため、検査精度と効率を向上させます。"}, {"question": "材料中のクラックが超音波波形に与える典型的な変化はどれか？", "choices": ["反射波の振幅が増大し、到達時間に遅れが生じる", "透過波の周波数が上昇する", "ノイズレベルが低下し、波形が平坦になる", "反射波が消失し、信号が完全に遮断される"], "answer": 0, "explanation": "クラックなどの不連続面は反射波の振幅を増大させ、反射波の到達時間にも影響を与え遅れが生じることがあります。これらの情報から欠陥の位置や大きさを推定可能です。"}, {"question": "材料の超音波減衰係数を増大させる要因として正しいものはどれか？", "choices": ["材料の結晶粒界が細かく均一であること", "内部欠陥や微細な散乱体の存在", "周波数が低い超音波の利用", "材料表面の鏡面仕上げ"], "answer": 1, "explanation": "内部欠陥や微細散乱体は超音波の散乱や吸収を促進し、減衰係数を増加させるため、材料評価や欠陥検出で重要な指標とされます。"}, {"question": "時間領域の超音波信号を周波数領域に変換し解析する主な利点は何か？", "choices": ["減衰を完全に排除できる", "欠陥の位置を正確に知ることができる", "欠陥に起因する周波数成分の変化を検出しやすくなる", "信号のノイズを全て除去できる"], "answer": 2, "explanation": "周波数領域解析により、欠陥などによる周波数成分の変化や散乱特性を識別しやすくなり、欠陥の種類推定や材料特性評価に有効です。"}, {"question": "超音波非破壊検査において、生産ラインで高速検査を行う際に重視すべき要素は何か？", "choices": ["最高周波数帯域での波形解析精度", "信号処理のリアルタイム性と検査スキャン速度", "手動でのデータ入力と解析", "検査結果の後処理に専念すること"], "answer": 1, "explanation": "生産ラインでは高速かつ正確なデータ解析が求められ、リアルタイムで信号処理が可能なシステムの導入が検査効率向上には不可欠です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
