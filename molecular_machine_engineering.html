<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>分子機械工学検定マニアッククイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>分子機械工学検定マニアッククイズ</h1>
    <div class="desc">ナノテクノロジーと分子機械設計の最先端を問う高度な問題集。化学反応制御から微細構造まで専門知識を試す全10問。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "ナノスケールの機械部品を構築する際に最も重要な化学結合タイプはどれか？", "choices": ["イオン結合による強固な構造形成", "水素結合を利用した柔軟な組み立て", "共有結合による精密な原子配列の固定", "ファンデルワールス力による非固定的相互作用"], "answer": 2, "explanation": "ナノ分子機械では原子レベルでの精密な配置が必要となるため、共有結合による強固かつ正確な構造形成が最重要である。イオンや水素結合は柔軟性に優れるが精度には劣る。"}, {"question": "分子機械における光駆動型モーターの動作機序として正しいものはどれか？", "choices": ["光刺激によるイオン交換がトルクを生み出す", "光エネルギーで分子骨格の異性化を誘起し運動を発生させる", "光子吸収により電子が励起され熱エネルギーに変換される", "光照射により分子間ファンデルワールス力が増大する"], "answer": 1, "explanation": "光駆動型分子モーターは光刺激による立体異性化（シス-トラン換位など）を誘起し、その構造変化を利用して回転運動を生み出す。"}, {"question": "分子マシンの駆動エネルギーとして『化学反応制御』が選ばれる理由として最も妥当なのはどれか？", "choices": ["化学反応はマクロ機械よりも高速で動作可能だから", "反応条件をコントロールすることで高い運動選択性を実現できるから", "熱エネルギーよりも安定したエネルギー源となるため", "化学反応は外部から独立して自己駆動が可能であるため"], "answer": 1, "explanation": "化学反応の速度や進行方向を制御することで、分子マシンの動作選択性と効率を高めることが可能であり、これが化学反応制御を駆動エネルギーとして用いる主な理由である。"}, {"question": "DNAナノテクノロジーにおいて、分子機械の形状制御に活用される原理は何か？", "choices": ["塩基対形成による指定された折りたたみ構造の設計", "ジーンの発現調節を利用した構造直列化", "酵素反応による分子の触媒結合強化", "タンパク質間相互作用を駆使した組立て"], "answer": 0, "explanation": "DNAナノテクノロジーでは塩基配列設計により指定された塩基対形成を通じて目的の折りたたみや組立構造を精密に制御する。"}, {"question": "分子機械設計において『摩擦障壁』が問題となる主な理由は？", "choices": ["摩擦により分子構造が破壊されるため", "分子運動のエネルギー消費が増大し効率が低下するため", "摩擦が化学反応速度を加速するため", "摩擦が分子の電荷分布を乱すため"], "answer": 1, "explanation": "摩擦障壁は分子運動時にエネルギーの散逸を招き、動作効率を低下させるため、分子機械設計では摩擦の最小化が重要となる。"}, {"question": "分子機械の運動方向性を制御するために用いられる代表的な化学手法は？", "choices": ["キラル中心導入による方向性固定", "イオン交換反応による運動反転", "光重合反応による固定化", "置換基の脱保護反応による活性化"], "answer": 0, "explanation": "キラルな構造を導入することで、分子機械の回転や反復運動に明確な方向性を与え、非対称な動きを実現している。"}, {"question": "ナノスケール分子機械の潤滑挙動に関して正しい記述はどれか？", "choices": ["マクロスケールの潤滑油がそのまま利用可能である", "表面官能基の設計で摩擦係数を著しく減少できる", "真空環境では摩擦が増加する傾向がある", "摩擦は分子レベルでは基本的に存在しない"], "answer": 1, "explanation": "分子レベルの潤滑性は表面の官能基や分子間力の設計によって制御可能であり、摩擦低減に寄与する。"}, {"question": "分子機械における自己修復機能の実現に最も適している化学的メカニズムは？", "choices": ["可逆的共有結合形成", "永久的な共有結合切断", "熱分解反応の誘起", "電子スピン共鳴の活性化"], "answer": 0, "explanation": "可逆的共有結合は損傷時に切断しても条件が整うと再度結合が形成され、自己修復機能の核となる。"}, {"question": "分子機械の構築に際して用いられる錯体化学の利点として正しいものは？", "choices": ["錯体形成により運動方向を固定することができる", "遷移金属錯体の可逆結合により動的組立が可能", "錯体は常に不安定で分子機械の寿命を延ばす", "錯体は自己複製能を持つ"], "answer": 1, "explanation": "遷移金属錯体の可逆性を利用することで、分子機械の動的な組立や解体、修復が可能となる。"}, {"question": "分子機械の設計における『エネルギーランドスケープ』の意義は？", "choices": ["機械の動作経路に応じたエネルギーの地形図を示し動作の可能性や障壁を可視化する", "エネルギーを削減する最適設計を自動化するAI技術のこと", "分子運動を加速するための量子エネルギー体系", "分子間の電荷分布を均一化する理論モデル"], "answer": 0, "explanation": "エネルギーランドスケープは分子機械の各運動状態のエネルギーを示し、動作経路や反応障壁を解析、設計に活用される重要な概念である。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
