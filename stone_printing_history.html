<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>石版印刷史検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>石版印刷史検定</h1>
    <div class="desc">石版印刷の歴史、技術、文化的背景、版画技術に関するマニアックな問題を通じて理解を深めるクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "石版印刷の発明者として知られる人物は誰か？", "choices": ["アロイス・ゼネフェルダー", "ヨハネス・グーテンベルク", "アドルフ・メッシュェル", "バウムガルテン"], "answer": 0, "explanation": "石版印刷は1796年にアロイス・ゼネフェルダーによって発明されました。グーテンベルクは活版印刷の発明者です。"}, {"question": "石版印刷の基本原理である \"脂と水の反発\" を利用する主要な素材は何か？", "choices": ["石灰岩から作られた平滑な石板", "木製のプレス台", "金属製の凸版", "ガラス板"], "answer": 0, "explanation": "石版印刷は脂を含んだインクが馴染む石灰岩の平滑な石板の表面を利用し、水と脂の反発性を応用しています。"}, {"question": "石版印刷が特に発展した19世紀のヨーロッパ都市はどこか？", "choices": ["ベルリン", "ミュンヘン", "ウィーン", "パリ"], "answer": 3, "explanation": "19世紀にパリでは石版印刷の技術革新が進み、芸術印刷やポスターの普及に大きく貢献しました。"}, {"question": "石版印刷の技術を応用した版画技法の名称として正しいものは？", "choices": ["リトグラフ", "カリグラフィー", "エッチング", "シルクスクリーン"], "answer": 0, "explanation": "リトグラフは石版印刷技術を利用した版画技法で、平らな石版に直接描画する方法です。"}, {"question": "石版印刷の制作工程で、最初に行われるのは何か？", "choices": ["石板の研磨と洗浄", "石板にインクを塗る作業", "完成品の乾燥", "印刷物の裁断"], "answer": 0, "explanation": "制作ではまず石版の表面を滑らかに研磨し、汚れを除去して印刷に適した状態にします。"}, {"question": "石版印刷において水が石板に塗られる理由は？", "choices": ["インクが付着しない部分を湿らせるため", "色付けのための染料として使うため", "石板を冷却してインクの乾燥を促進するため", "石板の表面を硬化させるため"], "answer": 0, "explanation": "水は石板の非画像部分に塗られ、インクの付着を防ぐ役割を果たしています。脂分を含むインクは水をはじき、画像部分にのみ付着します。"}, {"question": "石版印刷の大きな特徴である“平版印刷”とは何を指すか？", "choices": ["印刷版の表面全体が平らであること", "凸版を用いた印刷の一種", "印刷版が金属製であること", "立体的な彫刻が施されている版"], "answer": 0, "explanation": "平版印刷は、印刷面と非印刷面が同じ平らな面で、油脂分の親和性の違いを利用して印刷を行う技法です。"}, {"question": "石版印刷技術がポスター文化に与えた影響として正しいものは？", "choices": ["大量生産が可能になり芸術性と普及が拡大した", "ポスターの色数が限定されるようになった", "手描きのポスター技法が主流となった", "金属凸版に取って代わられた"], "answer": 0, "explanation": "石版印刷は色彩表現が豊かで大量生産に適したため、19世紀末のポスター文化の隆盛に多大な影響を与えました。"}, {"question": "19世紀の石版印刷に用いられた石板の主な産地として知られるのは？", "choices": ["ザルツブルク", "フランケンシュタイン", "ゾルンホーフェン", "バイロイト"], "answer": 2, "explanation": "ドイツ南部のゾルンホーフェン地域は高品質の石灰岩が産出され、多くの石版印刷用石板の産地として有名でした。"}, {"question": "石版印刷で使用されるインクの特徴として最適なものは？", "choices": ["油脂系で水と反発しやすい特性を持つもの", "水性顔料で速乾性の高いもの", "膠（にかわ）を主成分とするもの", "水で溶けるアクリル系インク"], "answer": 0, "explanation": "石版印刷のインクは脂性で水と反発する性質を持ち、画像部分にのみ付着しやすく設計されています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
