<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>昆虫採集標本検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>昆虫採集標本検定</h1>
    <div class="desc">昆虫の名称、採集方法、標本作成の専門用語に関する基本的な知識を問うクイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "日本に生息する代表的なカブトムシ属の昆虫は？", "choices": ["オオクワガタ", "ミヤマクワガタ", "コガネムシ", "カブトムシ"], "answer": 3, "explanation": "カブトムシは日本を代表する昆虫で、特に夏季に人気のある甲虫の一種です。オオクワガタやミヤマクワガタはクワガタムシの仲間、コガネムシは別の甲虫類です。"}, {"question": "昆虫採集で使われる代表的な方法で、『ライトトラップ』とは何を指す？", "choices": ["夜間にライトで誘引して集める方法", "網で飛ぶ虫を捕まえる方法", "地面の落ち葉を掘る方法", "餌の果実を置いて集める方法"], "answer": 0, "explanation": "ライトトラップは夜に強い光を使い、昆虫を誘引して採集する方法です。夜行性の昆虫を効率よく集める際に用いられます。"}, {"question": "昆虫の標本作成で『展足（てんそく）』とは何を指す？", "choices": ["昆虫の翅や脚を広げて固定する作業", "昆虫を乾燥機にかけること", "標本箱に昆虫を並べること", "標本にラベルを付けること"], "answer": 0, "explanation": "展足は昆虫の翅（はね）や脚を見やすく広げ、ピンや針を使って固定する工程で、標本の観察や保存に重要です。"}, {"question": "昆虫標本に用いる『ミイラ標本』の特徴は？", "choices": ["有機溶剤で処理して乾燥させた昆虫標本", "液浸標本の一種", "昆虫を樹脂で包んだ標本", "冷凍保存した標本"], "answer": 0, "explanation": "ミイラ標本は乾燥させ、有機溶剤を使用して脂肪分を取り除いて作る標本で、長期保存に適しています。"}, {"question": "昆虫採集で使われる『ピンセット』の役割は？", "choices": ["昆虫を傷つけずに扱うための器具", "昆虫を採集するための捕虫網", "標本を収納するケース", "標本の名前を書く筆"], "answer": 0, "explanation": "ピンセットは繊細な昆虫を傷つけずに扱ったり、展足作業などで細かい部位を調整するために使用します。"}, {"question": "採集した昆虫の標本に記録を付けるための用語『ラベリング』とは？", "choices": ["標本に採集日時や場所を書くこと", "採集した昆虫の分類を決めること", "新しい採集方法を考案すること", "標本を洗浄すること"], "answer": 0, "explanation": "ラベリングは標本に採集日時、場所、採集者名などのデータを記載して保存することで、科学的価値を高めます。"}, {"question": "昆虫採集で使われる『バッタトラップ』はどのような仕組み？", "choices": ["バッタなど地上を跳ねる昆虫を捕まえる箱型の罠", "飛翔昆虫を引き寄せるライトトラップ", "果物を餌にしたトラップ", "水辺で水生昆虫を採集する網"], "answer": 0, "explanation": "バッタトラップは地表に設置され、跳ねたり歩いたりするバッタ類を効率的に捕獲するための仕組みです。"}, {"question": "採集後の昆虫を標本箱に固定するための針は何と呼ばれる？", "choices": ["標本ピン", "捕虫網", "展足棒", "採集バサミ"], "answer": 0, "explanation": "標本ピンは昆虫標本の基本で、昆虫の体を貫いて標本箱に固定する細くて硬い専用の針です。"}, {"question": "昆虫採集でよく使う『ボトルピンセット』の特徴は？", "choices": ["先端が細く凹んでおり小さい昆虫を掴みやすい", "先端が大きく平らで丈夫", "標本を刺すための針先がついている", "採集網の柄に取り付けられる"], "answer": 0, "explanation": "ボトルピンセットは微細な昆虫を掴むために先端が細く、内側が凹んだ形状で、慎重な操作が可能です。"}, {"question": "昆虫の標本で使われる『液浸標本』の保存液として最も一般的なのは？", "choices": ["エタノール", "ホルマリン", "酢酸", "シリコンオイル"], "answer": 0, "explanation": "液浸標本はエタノール（アルコール）に浸すことで、軟体昆虫や柔らかい部分を腐敗させずに保存する方法として一般的です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
