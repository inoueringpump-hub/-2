<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>瓶の王冠検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>瓶の王冠検定</h1>
    <div class="desc">ビール瓶の王冠に関する歴史、種類、製造工程の専門用語を問う初級レベルのクイズです。全10問で基礎知識を楽しく確認しましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "瓶の王冠の発明者とされる人物は誰でしょうか？", "choices": ["アレクサンダー・グラハム・ベル", "ウィリアム・ペリー・ウィンザー", "チャールズ・グッドイヤー", "エルンスト・シュタインブレナー"], "answer": 1, "explanation": "瓶の王冠は1892年にウィリアム・ペリー・ウィンザーによって発明されました。彼は密封性を高めるための金属製の蓋を考案し、その後のビール瓶の規格化に大きく貢献しました。"}, {"question": "王冠に用いられる一般的な金属は何でしょうか？", "choices": ["アルミニウム", "ステンレススチール", "亜鉛メッキ鋼板", "銅"], "answer": 2, "explanation": "瓶の王冠の製造には主に亜鉛メッキ鋼板が用いられます。耐食性と加工性のバランスが良いため、広く採用されています。"}, {"question": "王冠の内部に用いられるシーリング材は何と呼ばれますか？", "choices": ["パッキンフィルム", "ライナー", "シールガスケット", "インナーフィット"], "answer": 1, "explanation": "王冠の内側にはライナーと呼ばれるシーリング材が貼られており、内容物の漏れや酸化を防止しています。"}, {"question": "瓶の王冠の標準的な直径はおよそ何ミリでしょうか？", "choices": ["26mm", "30mm", "38mm", "45mm"], "answer": 0, "explanation": "標準的な瓶の王冠の直径は約26mmで、多くのビール瓶や炭酸飲料瓶に使用されています。"}, {"question": "王冠のプレス加工で使われる主要な工程は何でしょうか？", "choices": ["パンチング", "カールエッジ成形", "リベット留め", "溶接"], "answer": 1, "explanation": "王冠は金属板をカールエッジ成形によって縁を折り曲げ、瓶口に密着させる加工が重要な工程です。"}, {"question": "瓶の王冠が初めて商業的に使われたのはいつ頃でしょうか？", "choices": ["1870年代", "1890年代", "1910年代", "1930年代"], "answer": 1, "explanation": "王冠は1890年代に発明・普及し始め、商業的にも本格的に使用されるようになりました。"}, {"question": "キャップと呼ばれる王冠の別称で、特にクラウン形状を示すのはどれ？", "choices": ["スクリューキャップ", "クラウンキャップ", "プルタブキャップ", "スナップオンキャップ"], "answer": 1, "explanation": "瓶の王冠は「クラウンキャップ」と呼ばれ、縁がクラウン（王冠）状に折り返されている形状から名付けられました。"}, {"question": "瓶の王冠の耐食性を向上させるために多く用いられる表面処理は何？", "choices": ["電気亜鉛めっき", "クロムめっき", "ニッケルめっき", "黒染め"], "answer": 0, "explanation": "亜鉛めっきを施すことで、鋼板の耐食性を高め、長期保存に耐える王冠が製造されています。"}, {"question": "王冠の内側ライナーに使われる代表的な材料は何？", "choices": ["PVCフィルム", "ポリエチレン発泡体", "天然ゴム", "ポリウレタンフォーム"], "answer": 1, "explanation": "ポリエチレン発泡体は密封性能と柔軟性に優れ、瓶の液体が漏れないように王冠の内側に使用されます。"}, {"question": "王冠を瓶に固定するための専用工具は何と呼ばれているでしょうか？", "choices": ["クラッシャー", "キャッププライヤー", "クラウンキャッパー", "ツイストマシン"], "answer": 2, "explanation": "瓶の王冠をしっかりと閉めるための工具は「クラウンキャッパー」と呼ばれ、家庭用から業務用まで様々なタイプがあります。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
