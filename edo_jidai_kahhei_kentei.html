<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>江戸時代貨幣検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>江戸時代貨幣検定</h1>
    <div class="desc">江戸時代の貨幣に関するマニアックな問題を10問収録。貨幣単位や素材、歴史的背景に関する知識を試そう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "江戸時代の一般的な貨幣体系で、金貨・銀貨・銭貨の三種をそれぞれ何と呼ぶか？", "choices": ["三貨制", "三種貨幣制", "三貨幣制度", "三元貨幣制度"], "answer": 0, "explanation": "江戸時代の貨幣体系は「三貨制」と呼ばれ、金貨（小判など）、銀貨（丁銀など）、銭貨（銅銭）から成る3種類の貨幣の併用体制を指します。"}, {"question": "江戸時代の金貨「小判」の素材として主に用いられた金の純度は約何パーセントか？", "choices": ["約75%", "約90%", "約60%", "約99%"], "answer": 1, "explanation": "江戸時代の小判は概ね90％前後の高純度金（約900‰）で鋳造されており、その品質維持が価値の基礎となりました。"}, {"question": "江戸時代の銀貨「丁銀」は主にどのような形状で流通していたか？", "choices": ["板状の銀塊", "棒状の銀貨", "円形の銀貨", "平たい丸形の銀貨"], "answer": 0, "explanation": "丁銀は板状の銀の塊で、重さに応じて計量され流通していました。円形や丸形ではなく平たい板状のため入手や計量が容易でした。"}, {"question": "江戸時代の銭貨の代表的な種類「文銭」は主に何素材で作られていたか？", "choices": ["銅", "銀", "金", "鉄"], "answer": 0, "explanation": "文銭は銅銭の代表的なもので、主に銅または銅合金（赤銅）が用いられました。鉄銭なども一部存在しましたが一般的ではありません。"}, {"question": "江戸時代の貨幣制度で「一分＝何匁（もんめ）に相当するか？」", "choices": ["2匁", "4匁", "5匁", "1匁"], "answer": 1, "explanation": "貨幣単位の中で「一分」は「4匁」とされ、匁はより細かい計量単位として銀などの計量に使われました。"}, {"question": "江戸時代の金貨「一両小判」の重さはほぼ何グラムだったか？", "choices": ["3.75g", "15.5g", "11.3g", "18.7g"], "answer": 2, "explanation": "一両小判は約11.3グラムの金で作られており、この重量とともに価値を保っていました。"}, {"question": "江戸時代、幕府が貨幣改鋳を行う理由として最も一般的なのは？", "choices": ["金銀の価格変動対応", "外国からの輸入制限", "銅銭不足の補充", "偽造貨幣排除のため"], "answer": 0, "explanation": "貨幣改鋳は金銀含有量や重量の調整を目的に行われ、金銀価格の変動に応じて貨幣の価値調整を幕府が行いました。"}, {"question": "江戸時代の貨幣「豆板銀」とは何を指すか？", "choices": ["小型の銀貨板", "銀の貨幣鋳造機", "銀貨の刻印", "銀貨の保管箱"], "answer": 0, "explanation": "豆板銀は小さな銀の板状貨幣で、主に地方の取引や小額支払いに使われました。"}, {"question": "江戸時代に流通した貨幣単位「匁（もんめ）」は何の単位に由来するか？", "choices": ["重量単位", "長さ単位", "価値単位", "貨幣単位"], "answer": 0, "explanation": "匁は元々重さの単位で、主に銀の量を示す単位として貨幣や貴金属取引で用いられました。"}, {"question": "江戸時代の貨幣制度において「金一分」の銀換算値はおおよそ何銀匁とされていたか？", "choices": ["1匁", "40匁", "4匁", "8匁"], "answer": 3, "explanation": "貨幣交換比率で金一分は銀約8匁に相当するとされ、これが実際の交換市場での基準になりました。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
