<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>昆虫擬態パターン検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>昆虫擬態パターン検定</h1>
    <div class="desc">昆虫の擬態にまつわる生態学的知識や擬態の種類、捕食回避のメカニズムについてのマニアックなクイズです。難易度は5で、専門的な内容を含みます。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "バタフライの中でも代表的な捕食者回避のための擬態パターン「バタフライデコイ」とは何を模倣している？", "choices": ["捕食者の天敵である鳥の目の模様", "危険を示す毒蛇の色彩パターン", "羽の一部を破損したように見せる模様", "同種の別個体の翅の模様"], "answer": 2, "explanation": "「バタフライデコイ」は、蝶が羽の一部を破損したように見せることで捕食者の注意を逸らし、致命的な攻撃を避ける擬態です。これは捕食回避において非常に効果的な戦略です。"}, {"question": "バートランド・ラッセルが昆虫擬態研究で提唱した説に最も関連する擬態パターンはどれ？", "choices": ["ベイツ擬態", "ミューラー擬態", "ウォルター擬態", "ベイツミラー擬態"], "answer": 1, "explanation": "ミューラー擬態は有毒や危険な種が類似した警告色を持つことで捕食者に学習されやすくなる現象で、バートランド・ラッセルの研究とは別の理論ですが、昆虫擬態の分類に深く関係しています。"}, {"question": "蜂に似せることで捕食を回避する昆虫の擬態パターンは何と呼ばれるか？", "choices": ["ベイツ擬態", "ミューラー擬態", "ウォルター擬態", "ケイン擬態"], "answer": 0, "explanation": "ベイツ擬態は無毒性の生物が有毒性や攻撃性のあるモデル（この場合は蜂）を模倣することで捕食者を回避する生物の戦略です。"}, {"question": "白昼に活動する昆虫が葉や樹皮の模様に溶け込む擬態を何という？", "choices": ["警戒色擬態", "カモフラージュ擬態", "ミューラー擬態", "擬死擬態"], "answer": 1, "explanation": "カモフラージュ擬態は、背景環境と同化することで捕食者からの視認を避ける擬態の一種で、多くの昆虫が樹皮や葉の模様に似せています。"}, {"question": "オポーナ図られる蝶の翅裏の模様は何のための擬態？", "choices": ["性的魅力向上のため", "捕食者の注意を逸らす目玉模様", "集団識別のための種類特有模様", "体温調節のための色彩"], "answer": 1, "explanation": "オポーナ図られる蝶の翅裏には目玉状の模様があり、捕食者の注意をそらしたり威嚇するための擬態として機能し、捕食回避に寄与します。"}, {"question": "地面で休む夜行性昆虫によく見られる「背景模様に似せた形態擬態」の正式名称は？", "choices": ["アグリー擬態", "ゼロント擬態", "スメイフ擬態", "タンブルウィード擬態"], "answer": 0, "explanation": "アグリー擬態は、昆虫が不規則な形状や色で周囲の背景（枯葉や土壌など）に溶け込むことで捕食者から身を守る戦略です。"}, {"question": "ハナカメムシが花に溶け込むような体色を持つ擬態を生態学的にはなんという？", "choices": ["トリック擬態", "花擬態（フラワーミミクリー）", "捕食者誘導擬態", "アポミミクリー"], "answer": 1, "explanation": "花擬態（英語ではフラワーミミクリー）は、昆虫が花の色や形に似せて擬態し、捕食者から見つかりにくくなるとともに、花に訪れる授粉者を欺くことがあります。"}, {"question": "ベイツ擬態において「モデル」と呼ばれるのはどのような生物？", "choices": ["捕食に適した無毒生物", "有毒や攻撃的で捕食者が避ける生物", "擬態される無生物の環境要素", "模様を持たない捕食者"], "answer": 1, "explanation": "ベイツ擬態でのモデルは、有毒や攻撃的で捕食者に嫌悪される生物で、それを真似る無毒の模倣者が捕食を避ける狙いを持っています。"}, {"question": "ミューラー擬態で複数種の毒性昆虫が似た模様を持つ理由は？", "choices": ["相互に捕食者の学習効果を強化するため", "捕食を競合するための兆候", "繁殖行動のために識別しやすくするため", "擬態ではなく遺伝的収斂の偶然"], "answer": 0, "explanation": "ミューラー擬態は、有毒種同士が似た外見を持つことで捕食者の学習効果を高め、双方にとって捕食リスクの低減が期待できます。"}, {"question": "カマキリの擬態に特徴的な「捕食待ち伏せ型擬態」の主な機能は？", "choices": ["空中飛翔時の色彩保護", "獲物に気付かれず接近するための葉や枝の模倣", "熱吸収のための黒色化", "自分自身を有毒に見せかける警戒色"], "answer": 1, "explanation": "カマキリは葉や枝に似た形態と色彩を持ち、獲物に気づかれずに接近して捕食するための待ち伏せ型擬態を進化させており、捕食成功率を高めています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
