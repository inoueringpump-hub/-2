<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古書修復技術検定クイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古書修復技術検定クイズ</h1>
    <div class="desc">古書修復や保存に関する基礎知識を問う全10問の入門レベルクイズです。木版印刷、製本、紙の保存技術に関する専門用語に挑戦しましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "木版印刷において、彫刻刀で彫る部分の呼び名は何ですか？", "choices": ["凹版部分", "凸版部分", "網点部分", "朱墨部分"], "answer": 1, "explanation": "木版印刷は凸版印刷の一種で、彫刻刀で彫らずに残した部分（凸部分）が印刷されます。彫った凹部分にはインクがつきません。"}, {"question": "製本で、本文のページをまとめて縫い合わせる単位を何と呼びますか？", "choices": ["見返し", "折丁（おりちょう）", "栞（しおり）", "背表紙（せびょうし）"], "answer": 1, "explanation": "折丁とは、本文の紙を折りたたんだ一つの単位で、複数の折丁をまとめて製本します。"}, {"question": "紙の劣化を防ぐために用いられる「酸性劣化」の防止策として適するものはどれ？", "choices": ["乾熱処理", "アルカリ性緩衝処理", "紫外線照射", "湿度上昇処理"], "answer": 1, "explanation": "酸性劣化は紙中の酸が原因で起こるので、アルカリ性緩衝処理で酸を中和し、紙の分解を防ぎます。"}, {"question": "古書の保存で用いられる「離隔箱（りかくばこ）」の目的は何ですか？", "choices": ["通気性の調整", "書簡の展示用", "書物同士の直接接触防止", "修復材料の保管"], "answer": 2, "explanation": "離隔箱は古書を収納し、書物同士が直接触れて傷むのを防ぐ役割を持ちます。"}, {"question": "製本で使用される和紙の「抄造（しょうぞう）」とは何を指しますか？", "choices": ["紙を薄くする加工", "漉き工程のこと", "紙の染色技法", "紙を圧縮する工程"], "answer": 1, "explanation": "抄造は紙の原料である繊維を水中で均一に広げてから紙を漉き取る工程を指します。"}, {"question": "木版画の刷り工程で使われる「バレン」とは何ですか？", "choices": ["インクのこと", "刷りを均一にする道具", "紙を折る道具", "刷り版を乾かす台"], "answer": 1, "explanation": "バレンは手で持って刷るときに紙の上から圧力をかけてインクを移すための道具です。"}, {"question": "日本の伝統的な装丁で表紙の芯材としてよく用いられるものは？", "choices": ["厚手の和紙", "薄い木材板", "厚紙（ボール紙）", "革"], "answer": 2, "explanation": "伝統装丁では厚紙（ボール紙）を芯材として用いることが多く、丈夫で成形しやすい特徴があります。"}, {"question": "古書の紙に見られる「青みがかった繊維」は何の材料の可能性が高いですか？", "choices": ["楮（こうぞ）", "麻（あさ）", "グラファイト", "藍染"], "answer": 0, "explanation": "楮紙は繊維に青白さがあり、和紙の主要な原料のひとつです。麻はより黄みがかった色調です。"}, {"question": "活版印刷における鉛合金製の文字ブロックのことを何と呼びますか？", "choices": ["活字（かつじ）", "版木（はんぎ）", "原版（げんぱん）", "凸版（とっぱん）"], "answer": 0, "explanation": "活字は鉛合金でできた文字ブロックで、活版印刷に用いられます。"}, {"question": "紙の表面を平滑にして書きやすくする「表面加工」の一つで、和紙によく用いられる技法は？", "choices": ["漉き込み加工", "コーティング", "抄紙加工", "水刷り加工"], "answer": 3, "explanation": "水刷り加工は和紙表面を水で軽くこすり、繊維を整えて平滑にする伝統的な技法です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
