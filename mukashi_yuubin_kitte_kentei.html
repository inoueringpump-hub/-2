<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マニアックな昔の郵便切手検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>マニアックな昔の郵便切手検定</h1>
    <div class="desc">切手収集の奥深い世界へ。歴史やデザイン、発行年に関する難問10問で古典切手の知識を試そう！</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "1840年に発行された世界初の郵便切手「ペニー・ブラック」の背景色は何色？", "choices": ["青色", "赤色", "黒色", "緑色"], "answer": 2, "explanation": "ペニー・ブラックは世界初の郵便切手であり、その名の通り、背景は黒色でした。この切手はイギリスで発行されました。"}, {"question": "日本で初めて発行された郵便切手は何年のこと？", "choices": ["1871年", "1880年", "1890年", "1900年"], "answer": 0, "explanation": "日本初の切手は1871年（明治4年）に発行された「竜文切手」です。当時はまだ洋風デザインではなく和風の竜のデザインでした。"}, {"question": "アメリカの「インディアン・ヘッドセント」切手に描かれている人物像は誰のイメージに基づくか？", "choices": ["ジョージ・ワシントン", "ネイティブ・アメリカン", "アブラハム・リンカーン", "トーマス・ジェファーソン"], "answer": 1, "explanation": "インディアン・ヘッドセント切手はネイティブ・アメリカンの伝統的なヘッドギア（羽根飾り）を付けた肖像を使っており、特定個人ではなくイメージとして描かれています。"}, {"question": "1949年に発行されたイギリスの切手に描かれている象徴的な人物は誰？", "choices": ["ウィンストン・チャーチル", "ビクトリア女王", "ジョージ6世", "エリザベス2世"], "answer": 3, "explanation": "1949年以降発行の多くのイギリス切手には当時の君主であるエリザベス2世の肖像が使われています。"}, {"question": "ドイツの「青いマルク切手」として知られる有名な切手はいつ発行されたか？", "choices": ["1849年", "1860年", "1872年", "1890年"], "answer": 0, "explanation": "「青いマルク切手」はプロイセン時代の1849年に発行されたもので、ドイツ切手の中でも非常に有名な収集対象です。"}, {"question": "フランスで初めて発行された切手のデザインモチーフは何？", "choices": ["コルヌコピア（豊穣の角）", "マリアンヌ（共和制の女性象徴）", "鷲（国家の象徴）", "ライオン（力の象徴）"], "answer": 1, "explanation": "フランスの最初期切手には共和制のシンボルであるマリアンヌが描かれ、自由と民主主義を象徴しています。"}, {"question": "切手の発行年を示す「ペルフォレーション（穴あけ加工）」が初めて導入されたのはいつか？", "choices": ["1847年", "1854年", "1862年", "1878年"], "answer": 1, "explanation": "切手の分離を容易にするペルフォレーションはイギリスで1854年に初めて導入され、それ以降世界中に広まりました。"}, {"question": "世界初の三色刷り切手を発行した国はどこ？", "choices": ["イギリス", "フランス", "スイス", "アメリカ"], "answer": 2, "explanation": "スイスは1854年に世界初の三色刷り切手を発行し、精巧なデザイン技術で知られています。"}, {"question": "ギリシャでの切手発行開始は何年か？", "choices": ["1861年", "1870年", "1880年", "1895年"], "answer": 0, "explanation": "ギリシャは1861年に最初の切手「ヘルメスの頭像」を発行し、神話的モチーフも多用されました。"}, {"question": "切手収集で「アルバムの女王」と称される切手の正式名称は？", "choices": ["ティファニー・ブルー切手", "ブルー・マルク切手", "レッド・デビルカット切手", "ブルー・ムーン切手"], "answer": 1, "explanation": "「ブルー・マルク切手」は高額で希少な切手として知られ、コレクターの間で「アルバムの女王」とも称されることがあります。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
