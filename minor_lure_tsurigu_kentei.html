<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイナールアー釣具検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>マイナールアー釣具検定</h1>
    <div class="desc">マニアックなマイナールアーや釣具に関する知識を試す難易度5のクイズです。歴史やフィッシングテクニックも含めた10問で挑戦してください。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "日本で初めて作られたマイナールアーの代表例とされるルアーはどれか？", "choices": ["ベイトブレス・ジリオンミノー", "スミス・ウィグルワーム", "ダイワ・ミノータイガー", "ヤマリア・スピンストリーム"], "answer": 3, "explanation": "ヤマリア・スピンストリームは日本における初期のマイナールアーの一つで、独特の動きで知られています。他の選択肢は海外発や後発のモデルです。"}, {"question": "トリックアートの手法を応用してルアー表面に光学的ハログラムを施す技術を開発したのはどのメーカーか？", "choices": ["タックルハウス", "ダイワ", "ナカジマ工房", "メガバス"], "answer": 0, "explanation": "タックルハウスは独自の光学ハログラム技術により、光の屈折を利用して魚の目を引くルアーを開発しました。"}, {"question": "マイナールアー業界で長く続く「スプーン型ルアー」の代表的な特徴は何か？", "choices": ["縦に細長い形状で浮上性が高い", "円盤型で水中を回転しながら泳ぐ", "鉛の反射を活かした平べったい形状", "細かい模様を持ち水中で光るエポキシコーティング"], "answer": 2, "explanation": "スプーン型ルアーは鉛の反射を活かした平らな形状で、引くと独特の波動と煌きを発することで魚を誘います。"}, {"question": "ミノー型ルアーの泳ぎを特徴づける技術として、リップ（ビル）の形状調整による効果は何か？", "choices": ["浮上力の増加とロッドアクションの強調", "潜航深度調整と泳ぎの幅の制御", "ラインの摩擦軽減と遠投性能向上", "水流切断のための音波発生"], "answer": 1, "explanation": "リップ（ビル）の角度や大きさを変えることで潜航深度や泳ぎの波幅、速さをコントロールできます。深く潜らせたり浅く泳がせたりの調整が可能です。"}, {"question": "ウェイトバランスを変えてルアーのアクションを多重化する技術「バランスチューニング」を最も積極的に取り入れたブランドは？", "choices": ["シマノ", "オービス", "メガバス", "エバーグリーン"], "answer": 2, "explanation": "メガバスはウェイトの位置を変更し変速的なアクションを採用。独自のバランスチューニングでルアー動作の多様化に成功しています。"}, {"question": "古くからルアーに使われる素材であり、環境保護の観点から近年は使用制限が進んでいるのはどれか？", "choices": ["天然木材", "硬質プラスチック", "鉛", "シリコン"], "answer": 2, "explanation": "鉛は比重が高く扱いやすいが環境汚染の原因となるため、使用制限や代替素材への切り替えが進んでいます。"}, {"question": "ルアーフィッシングにおける「ジグヘッド」とは何を指すか？", "choices": ["フックのみのペイント処理が特徴のルアー", "ヘッドに鉛などの重りが一体化したルアーの一部品", "リールの巻き取りスピードを示す単位", "浮力を持たせるための空気室が内蔵されたルアー"], "answer": 1, "explanation": "ジグヘッドは鉛などの重りを内蔵し、フックと一体化したパーツで、泳がせ方や沈下速度の調整に使われます。"}, {"question": "フィッシングテクニック「スローロール」とは何を意味するか？", "choices": ["ルアーを超高速で巻き上げる技術", "ナチュラルにルアーを泳がせるためにゆっくり一定速度で巻く方法", "ゆっくりとロッドを上下に動かしながら巻き取る動作", "ラインを緩めて自然に流す釣り方"], "answer": 1, "explanation": "スローロールはルアーをゆっくり一定速度で巻き、リアクションバイトを引き出すテクニックです。小魚の群れを模します。"}, {"question": "ルアーのフックを保護し、魚の口への掛かりを促進するために付けられる小さな針状部品は何と呼ばれるか？", "choices": ["バーブ", "ガイド", "スプリットリング", "アイレット"], "answer": 0, "explanation": "バーブはフックの返し部分で、魚の口から針が外れにくくする役割を持ちます。"}, {"question": "日本のマイナールアー市場で近年注目されているエコ素材として正しいのはどれか？", "choices": ["ナチュラルラバー", "生分解性プラスチック", "カーボンファイバー", "メタル合金"], "answer": 1, "explanation": "環境負荷を減らすために生分解性プラスチックの採用が拡大しており、マイナールアー業界でも注目されています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
