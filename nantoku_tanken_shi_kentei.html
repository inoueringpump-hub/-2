<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>南極探検史検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>南極探検史検定</h1>
    <div class="desc">南極大陸の発見から現代に至るまでの探検史、地理的特徴、気象条件に関するマニアックな問題を集めた難易度5の検定です。歴史学的視点と探検隊の苦難、地理的知識、過酷な気象への理解を要求します。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "南極大陸が初めて公式に探検された年として一般に認められているのはいつか？", "choices": ["1773年、ジェームズ・クック船長の航海中", "1820年、ベルリングスハウゼンとラザレフのロシア探検隊", "1901年、スコット率いる英国南極探検隊の出航年", "1911年、アムンセンが南極点に到達した年"], "answer": 1, "explanation": "1820年、ロシアの探検家ベルリングスハウゼンとラザレフが南極大陸の周辺を航海し、南極大陸を最初に目撃したと広く認められています。ジェームズ・クックの航海は1773年ですが、南極大陸の発見には至っていません。"}, {"question": "ロバート・ファルコン・スコットの南極探検で最も大きな悲劇とされるのは何か？", "choices": ["越冬基地の火災による全滅", "南極点到達後の帰還途中に隊員全員が死亡", "爆風により探検装備をほぼ失ったこと", "氷山に囲まれて漂流し遭難したこと"], "answer": 1, "explanation": "スコット隊は1912年、南極点に到達しましたが、帰還途中の極度の悪天候と栄養不足によりスコット自身を含む全隊員が死亡しました。これは探検史上最も知られる悲劇の一つです。"}, {"question": "南極点への最初の到達者とされるノルウェーの探検家は誰か？", "choices": ["ロアール・アムンセン", "フリチョフ・ナンセン", "カール・ワイス", "オットー・ノルデンシェルド"], "answer": 0, "explanation": "1920年代以前の1911年、ロアール・アムンセン率いるノルウェー探検隊が世界で初めて南極点に到達しました。ナンセンは北極圏の探検で知られます。"}, {"question": "南極の最も著名な気象現象「カタバ風」とは何か？", "choices": ["氷山が割れて水蒸気を大量に発生させる現象", "南極大陸に吹き降りる強力な乾燥した冷たい風", "南極圏周辺で起こる放射冷却による霧の発生", "南極周辺の海水温の急激な変動に伴う嵐"], "answer": 1, "explanation": "カタバ風は南極大陸の高地から海岸へ吹き降ろす強力で乾燥した冷風で、気温の急激な低下や雪嵐を引き起こすため探検隊に影響を与えました。"}, {"question": "アーネスト・シャクルトンの「エンデュアランス号」探検が開始された年はいつか？", "choices": ["1907年", "1914年", "1921年", "1933年"], "answer": 1, "explanation": "1914年、シャクルトンは南極横断を目指してエンデュアランス号で出航しましたが、氷に閉じ込められて船が破壊されるなど過酷な体験をしました。"}, {"question": "南極大陸の氷床の厚さが最も厚いとされる地点の平均的な厚さはどの程度か？", "choices": ["約500メートル", "約1,000メートル", "約2,500メートル", "約4,000メートル"], "answer": 3, "explanation": "南極大陸の氷床は最大で約4,000メートル（4km）もの厚さがある場所もあり、これは何万年もの積雪が圧縮された結果です。"}, {"question": "歴史上初の越冬南極探検隊が使用した主要な輸送手段は何か？", "choices": ["犬ぞり", "モーター駆動の雪上車", "人力搬送", "馬車"], "answer": 0, "explanation": "初期の越冬隊は犬ぞりを主に利用して南極内陸を移動しました。馬車は不適、当時の機械雪上車は普及していませんでした。"}, {"question": "南極観測基地で最も厳しい冬期に記録される気温は一般にどの範囲か？", "choices": ["-20℃から-40℃", "-40℃から-60℃", "-60℃から-80℃", "-80℃以下"], "answer": 2, "explanation": "南極内陸の基地では冬期に-60℃から-80℃にまで気温が下がることがあり、これらの低温は人間の活動を極めて困難にします。"}, {"question": "南極大陸の発見に貢献した探検船「ヴィスル号」の国籍は？", "choices": ["イギリス", "ノルウェー", "ロシア", "アメリカ合衆国"], "answer": 2, "explanation": "ヴィスル号はロシアの探検船で、1820年にベルリングスハウゼンとラザレフの探検に用いられ、南極大陸周辺の探検に貢献しました。"}, {"question": "南極探検の歴史的意義の一つに挙げられる「南極条約」が締結されたのは何年か？", "choices": ["1945年", "1959年", "1972年", "1984年"], "answer": 1, "explanation": "1959年に採択された南極条約は南極大陸の平和利用と科学協力を定め、国際的な管理体制を築きました。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
