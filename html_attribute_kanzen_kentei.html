<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HTML属性完全検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>HTML属性完全検定</h1>
    <div class="desc">HTMLの属性に関する詳細な仕様や特殊な使用例についての上級者向けクイズゲームです。各問題は難易度4で、マニアックな内容を扱っています。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "HTMLの<a>要素におけるrel属性の\"noopener\"値の主な目的は何ですか？", "choices": ["リンク先ページの表示言語を指定するため", "新しいタブで開いたページから元のページへのアクセスを防ぐため", "リンク先のSEO評価をあげるため", "リンクがクリックされた回数をカウントするため"], "answer": 1, "explanation": "rel=\"noopener\"は、リンクを新しいタブで開く際に、開いたページからwindow.openerを介して元のページのJavaScriptにアクセスできないようにし、セキュリティやパフォーマンスの向上を目的としています。"}, {"question": "input要素のtype属性で、数字だけでなく「e」や「-」記号も入力可能にできるのはどれですか？", "choices": ["number", "range", "text", "tel"], "answer": 0, "explanation": "type=\"number\"は整数や小数だけでなく、指数表記に使われる\"e\"や負の数のマイナス記号も入力可能です。"}, {"question": "img要素のdecoding属性で\"async\"を指定した場合の動作は？", "choices": ["ブラウザのメインスレッドで即座に画像デコードを行う", "画像のデコードをページ読み込み完了まで遅延させる", "画像デコードを非同期で行い、遅延を最小化する", "画像のデコードをキャンセルし、代替テキストのみ表示する"], "answer": 2, "explanation": "decoding=\"async\"は画像のデコードを非同期的に行い、ページ全体の読み込みパフォーマンスを改善し、ブロッキングを減らします。"}, {"question": "form要素のnovalidate属性の指定により影響を受けるのは？", "choices": ["フォーム送信時のクライアント側の検証の無効化", "サーバー側での検証の強制", "すべてのフォームコントロールのdisabled状態", "フォーム送信時のPOSTメソッド強制"], "answer": 0, "explanation": "novalidate属性をformに付けると、submit時のブラウザによる標準クライアント検証がスキップされ、サーバー側での検証は影響を受けません。"}, {"question": "textarea要素のwrap属性で\"hard\"を指定するとどうなりますか？", "choices": ["ユーザーの改行が送信時に強制的に反映される", "改行コードが送信時にすべて削除される", "自動改行がされず、水平スクロールが発生する", "改行コードが\nから\r\nに変換される"], "answer": 0, "explanation": "wrap=\"hard\"を指定すると、textarea内の見た目の改行だけでなく、フォーム送信時にも改行コードが挿入され、送信データとして反映されます。"}, {"question": "script要素の属性asyncとdeferの違いで正しいのはどれか？", "choices": ["asyncはスクリプトの実行がHTML解析完了後になるがdeferはそうではない", "asyncはスクリプト実行を並列に行いdeferはHTML解析完了後に実行される", "asyncはスクリプトの同期実行でdeferは非同期実行である", "両者は全く同じ動作をする"], "answer": 1, "explanation": "asyncはスクリプトを非同期でダウンロードし準備ができたらすぐに実行、deferはダウンロードは非同期でもHTMLの解析完了後に実行される特性があります。"}, {"question": "input要素のautocomplete属性における\"section-\"プレフィックスの用途は？", "choices": ["特定のセクションのオートコンプリート候補をグループ化するため", "オートコンプリート無効化用の特別な記述", "ブラウザの履歴検索領域を制限するため", "アクセシビリティ強化のためのARIA属性指定用"], "answer": 0, "explanation": "autocomplete=\"section-xxx xxx\"のように書くと、フォーム複数セクションで名前などの入力候補を分けて管理・グループ化でき、ユーザーの入力補助が向上します。"}, {"question": "details要素のopen属性の指定で起こる動作として正しいのは？", "choices": ["初期表示時に内容を折りたたむ", "初期表示時に内容を展開して表示する", "要素を非表示にする", "初回クリック時のみトグル動作が無効になる"], "answer": 1, "explanation": "open属性をdetails要素に指定すると、ページ読み込み時点で内容が展開されて表示されるようになります。"}, {"question": "input要素のpattern属性はどのような場合に検証が行われますか？", "choices": ["typeが\"text\"や\"search\"等の文字列入力系で、かつ値が空でない時", "すべてのinput要素の種類で必ず検証される", "typeが\"checkbox\"や\"radio\"の時のみ", "pattern属性がある場合でも検証されない"], "answer": 0, "explanation": "pattern属性はtextやsearch、tel、url、emailなど文字列入力系で、かつ値が空でない場合に正規表現による検証が行われます。チェックボックス等では無効です。"}, {"question": "a要素にdownload属性を指定した場合の動作は？", "choices": ["リンク先を新しいタブで開くよう指示する", "クリック時にサーバー側の認証をバイパスする", "指定したファイル名でリンク先をダウンロードさせる", "SEO的にリンク評価を無効化する"], "answer": 2, "explanation": "download属性をa要素に付けると、クリック時にリンク先リソースを新しい名前で保存するダウンロード動作を促し、ブラウザが通常ナビゲーションするのを防ぎます。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
