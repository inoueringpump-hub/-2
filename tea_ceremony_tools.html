<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マニアックな茶道具製作技術検定クイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>マニアックな茶道具製作技術検定クイズ</h1>
    <div class="desc">茶道具製作に関わる伝統工芸技術、陶磁器製法、茶文化、素材知識を深掘りした難易度5の専門クイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "唐津焼の特徴的な施釉技法として知られる「御本手（おほんで）」とはどのようなものか？", "choices": ["鉄分を多く含む釉薬を厚くかけて茶褐色の斑点を出す技法", "釉薬をかけず素地の色を活かして焼成する焼締め技法", "藁灰釉を駆使し青味がかった釉調に仕上げる技法", "灰釉を厚くかけ土肌を隠す白濁釉技法"], "answer": 0, "explanation": "唐津焼の御本手は鉄分を含む釉薬を厚くかけ、茶褐色の斑点が表れるのが特徴で、素朴ながらも温かみのある表情を生みます。焼き締めなどとは異なる、釉薬の表現技法の一つです。"}, {"question": "茶杓（ちゃしゃく）製作に使われる素材「桑（くわ）」が好まれる理由はどれか？", "choices": ["木目が粗く乾燥に強いため", "軽量で適度な硬さと加工のしやすさを兼ね備えているため", "耐水性に優れ湿気に強い素材特性があるため", "香りが良く使うほどに色が深まる性質があるため"], "answer": 1, "explanation": "桑は適度な硬さと軽さを持ち、加工し易い素材であることから茶杓づくりに適しています。また、品質の安定性も高いことが古くから評価されています。"}, {"question": "釉薬に用いられる「辰砂（しんしゃ）」はどのような特徴を持つ顔料か？", "choices": ["銅を多く含み、鮮やかな赤色を発色する", "鉄分が主成分で茶褐色に発色する", "コバルトが主成分で青色を表現する", "マンガン含有で紫黒色になる顔料"], "answer": 0, "explanation": "辰砂は銅を多く含む鉱物を原料とし、高温焼成によって鮮やかで深みのある赤色を釉面に発色します。特に中国の陶磁器では古くから珍重されました。"}, {"question": "茶碗の高台（こうだい）作りにおいて「削ぎ出し」技法が意味するのは？", "choices": ["釉薬を高台部分だけ剥がす技法", "成形後に轆轤で余分な土を削り整えること", "高台部分に隙間を入れて乾燥を早めること", "高台に装飾彫刻を施す伝統技法"], "answer": 1, "explanation": "削ぎ出しは轆轤で成形後、高台周辺の余分な土を削って形を整え、安定した置き心地と美しい高台を作る重要な技術です。"}, {"question": "茶釜の鉄素材に「南部鉄器」が代表的ですが、その鉄鋳物が茶釜として優れている理由は？", "choices": ["七宝焼で装飾され耐錆性が高いため", "高い炭素含有量で非常に硬いから", "厚みが均一で熱伝導と保温性に優れているため", "鋳型に粘土を用い軽量化を図ったため"], "answer": 2, "explanation": "南部鉄器の茶釜は厚みが均一で密度が高く、熱をじんわり伝えて保温性に優れている点が茶席での湯の扱いに適しています。"}, {"question": "茶入れの蓋に用いられる「象牙（ぞうげ）」が伝統的に好まれた理由は？", "choices": ["美しい白色で湿気を遮断する効果が高いため", "経年で色艶が増し割れにくく耐久性があるため", "香りが茶葉に移らず変質させないため", "軽量で持ち運びに便利なため"], "answer": 1, "explanation": "象牙は硬く割れにくく、長年使用しても安定した状態を保てるため、茶入れの蓋として雅な風合いと実用性を持ち合わせる素材として珍重されてきました。"}, {"question": "「志野焼（しのやき）」の主な特徴はどれか？", "choices": ["鮮やかな青磁釉がかかる華やかさ", "白釉が厚くかかり、やや黄味を帯びた柔らかい表情", "鉄錆を活かした黒釉の力強さ", "絵付けを施さない素地そのままの焼締め技法"], "answer": 1, "explanation": "志野焼は白釉が厚く掛かり、釉薬の中で鉄分が還元焔で変化して淡い黄味を帯びた柔らかな表情が魅力で、桃山時代の茶陶として知られています。"}, {"question": "茶杓の節の「糸節」とは何を指すか？", "choices": ["竹の節に沿った装飾的な溝のこと", "竹の細い繊維が表面に現れた状態", "竹を割った際に残る節の繊維が飛び出した箇所", "竹の中の節よりも細く浅い節の凹凸のこと"], "answer": 3, "explanation": "糸節は竹の中にある節が細く浅い凹凸として現れたもので、茶杓の作り手はその特徴を活かして美的ポイントとします。"}, {"question": "茶道具の「楽焼（らくやき）」に使われる土の特徴は？", "choices": ["高温焼成に耐え流水穴を持つ石英を多く含む", "赤土を主とし低温で軟らかく焼き上げる", "鉄分が少なく白色を帯びる粘土を用いる", "真珠質グレインを含み硬質で透明感がある"], "answer": 1, "explanation": "楽焼は主に赤土を使い約800〜900度の低温で焼成するため、軟らかく素朴な風合いが生まれ、茶席での手触りや見た目に親しみを与えます。"}, {"question": "茶釜の蓋摘み（ふたつまみ）につかわれる「唐銅（からかね）」の特性は？", "choices": ["銅と錫の合金で耐熱性と緻密な鋳造が可能である", "純鉄製で強度が高く錆に強い", "銀合金で装飾性が高いが熱に弱い", "真鍮製で加工が容易で光沢が強い"], "answer": 0, "explanation": "唐銅は銅と錫の合金で耐熱性が高く、細かい鋳造が行いやすいため茶釜の蓋摘みなど耐熱かつ凝った形状の部品に適しています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
