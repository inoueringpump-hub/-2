<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>異世界言語構造検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>異世界言語構造検定</h1>
    <div class="desc">架空言語学の中でも特に異世界の文法体系・文字体系・音韻論に焦点を当てた高度なクイズです。未知の言語の構造を読み解く力を試します。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "架空言語「リュクシアン」の主語が動詞の前に必ず置かれる文法特徴は何と呼ばれるか？", "choices": ["SVO構造", "SOV構造", "VSO構造", "VOS構造"], "answer": 2, "explanation": "リュクシアン語は主語（S）が動詞（V）の直後ではなく、動詞の前に置かれるためVSOの語順に分類されます。VSOは英語やスペイン語などでよく見られますが、架空言語でもよく用いられる構造です。"}, {"question": "「ゼルナ語」において、名詞の性を示すために接尾辞が変わる文法体系は何と呼ばれるか？", "choices": ["膠着語法", "屈折語法", "孤立語法", "語順依存法"], "answer": 1, "explanation": "ゼルナ語では名詞の性を表すために語尾が変化する屈折語法を用いています。これはラテン語などで見られ、語形変化によって意味や文法機能を示す方法です。"}, {"question": "架空文字「スフィア文字」の書記体系が一文字で音節全体を表す特徴を示す用語は？", "choices": ["音素文字", "表音文字", "音節文字", "表意文字"], "answer": 2, "explanation": "スフィア文字は一文字が音節全体を表す音節文字（シラバリー）に分類され、例えば日本語のかな文字に似た体系です。"}, {"question": "「アルドラ語」で用いられる鼻音が他の子音に影響される現象で、音韻変化の一種とされるものは何か？", "choices": ["硬口蓋化", "鼻音同化", "声門破裂", "摩擦音化"], "answer": 1, "explanation": "鼻音同化は鼻音が隣接する他の子音の影響を受けて発音が変化する現象で、アルドラ語でも鼻音の前後での変化が顕著です。"}, {"question": "架空言語「クァルサル」の文法で、動詞の時制を表すために動詞の語根そのものが変化する特徴を指す言葉は？", "choices": ["アグルーティネーション", "屈折変化", "接辞付加", "語順変化"], "answer": 1, "explanation": "クァルサル語は屈折変化を持ち、時制や人数などに応じて動詞の語根が形を変えるため、意味や文法機能が語形の変化に反映されます。"}, {"question": "「ヴェリク語」の声調体系は三段階（高・中・低）であるが、これが言語学的に示すのは何か？", "choices": ["モーラ制声調", "ピッチアクセント", "複雑声調", "単調声調"], "answer": 2, "explanation": "ヴェリク語の三段階声調は複雑声調（トーン言語）に分類され、声調の高さで意味を区別し、単純なアクセント言語と異なります。"}, {"question": "架空言語「ダルヴァン」で用いられる特殊な仮名のような表音記号は何と呼ばれるか？", "choices": ["セム文字", "シラバリー", "アルファベット", "デーヴァナーガリー"], "answer": 1, "explanation": "ダルヴァン語では一文字が一音節を表すシラバリー（音節文字）を使用しています。これは日本語の仮名のように一文字で音節を示す表記法です。"}, {"question": "「トリフェン語」の動詞活用体系は非常に複雑で、主語の人称・数・時制・相・法など複数の文法情報を一つの動詞形に統合する体系は？", "choices": ["膠着語体系", "屈折語体系", "孤立語体系", "分析語体系"], "answer": 1, "explanation": "トリフェン語の動詞活用は屈折語体系で、1つの動詞形に多様な文法的意味が含まれます。屈折語は語形変化が豊富で意味を内包します。"}, {"question": "架空文字体系「ポラニム文字」が表意文字の特徴として持つのはどれか？", "choices": ["1文字が意味単位を表す", "1文字が単一音素を表す", "1文字が音節を表す", "1文字が無意味な装飾"], "answer": 0, "explanation": "表意文字は1文字が意味単位（概念や単語）を示し、漢字などが実例です。ポラニム文字も意味を直接示す構造を持っています。"}, {"question": "内声調（内声・裏声）を多用する架空言語「ミューネス語」で観察される音韻論的特徴は？", "choices": ["声門閉鎖音の頻繁な使用", "変音と無声音の融合", "二重母音の省略", "音節末子音の脱落"], "answer": 0, "explanation": "ミューネス語では声門閉鎖音が頻繁に使われ、内声調の生成に関連して音韻体系に独特の影響を与えています。これは言語音の特殊な特徴として注目されます。 "}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
