<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>軍事暗号史検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>軍事暗号史検定</h1>
    <div class="desc">軍事暗号の歴史、理論、解読技法、および戦時情報戦に関する高度な知識を問う難易度5の専門クイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "第二次世界大戦中、連合国がナチス・ドイツのエニグマ暗号を解読するために使用した、初期の機械式解読装置の名称は？", "choices": ["Z3暗号機", "Bombe", "Enigma Machine", "Lorenz SZ-40"], "answer": 1, "explanation": "Bombeはアラン・チューリングらが開発した機械で、ドイツのエニグマ暗号機の設定を探索・解読するために用いられた。"}, {"question": "古代ローマ時代に使用された、有名なシーザー暗号の変換方式は何文字のずらし？", "choices": ["2文字ずらし", "3文字ずらし", "5文字ずらし", "7文字ずらし"], "answer": 1, "explanation": "シーザー暗号は文字を3文字分ずらすことで暗号化する単純な置換暗号である。"}, {"question": "アメリカと日本の間で交わされた『マジック』という暗号文解析は、どの機関が主導した？", "choices": ["USSコード問題班", "FRONTIERインターセプト作戦", "アーサー・J・エルドリッジ暗号局", "アメリカ海軍の通信諜報局"], "answer": 3, "explanation": "アメリカ海軍の通信諜報局（OP-20-G）が中心となって日本海軍の暗号通信を解読し、『マジック』と呼ばれた。"}, {"question": "ヴィジュネル暗号で使われる鍵は何のような役割を果たす？", "choices": ["簡単な置換表", "多アルファベット暗号化のパターン決定", "一方向ハッシュ関数", "非対称公開鍵"], "answer": 1, "explanation": "ヴィジュネル暗号では鍵文字列によって異なるシーザー暗号が連続し、多アルファベット置換が行われる。"}, {"question": "ナチス・ドイツのLorenz暗号機（SZ-40）は、どのようなタイプの暗号機か？", "choices": ["電気機械式多アルファベット暗号機", "純粋な手作業置換式暗号", "業務用単純換字暗号機", "無線波高頻度ジェネレータ"], "answer": 0, "explanation": "Lorenz SZ-40は電気機械的なロールスロイス式多アルファベット暗号機で、上位司令部間の通信に使われた。"}, {"question": "第一次世界大戦で活躍したトリビアルな通信暗号は何と言われた？", "choices": ["ブラックコード", "プレゼンテーション暗号", "ニヒリスティックコード", "プレリュードコード"], "answer": 0, "explanation": "ブラックコードは第一次世界大戦で用いられた簡易的な軍用暗号コードの一つとして知られている。"}, {"question": "『ワンタイムパッド』暗号の安全性が理論的に証明される理由は？", "choices": ["鍵が長く使われるため", "鍵が完全にランダムかつ鍵長がメッセージ長と一致し再利用されないため", "暗号文の計算困難性による", "非対称暗号で鍵分配が安全なため"], "answer": 1, "explanation": "ワンタイムパッドは完全にランダムな鍵を一度限り使い、メッセージと同じ長さの鍵を用いることで、理論的に解読不能とされる。"}, {"question": "第二次世界大戦の情報戦における英国の『Ultra』機密情報は何から得られた？", "choices": ["日本のパープル暗号機の解読", "ドイツ軍のエニグマ解読", "ソ連のワルシャワ協定文書", "フランス抵抗組織の通信傍受"], "answer": 1, "explanation": "『Ultra』はドイツのエニグマ暗号を解読して得た連合国側の高度機密情報コードネームであった。"}, {"question": "暗号解読における「頻度分析法」とは何を利用した解読技法？", "choices": ["文字や記号の出現頻度の統計的偏り", "熱力学的変化の観察", "電波信号の強度と時間差", "数学的素因数分解"], "answer": 0, "explanation": "頻度分析法は単純置換暗号などで使用される解読技法で、文字の使用頻度の偏りに注目して解明を試みる。"}, {"question": "エニグマ暗号機の解読に成功したポーランド、イギリス、フランスの貢献の中で特に重要だったのは？", "choices": ["ポーランドが最初の機械的解析法を開発し、それが後に英Bombeに繋がった", "イギリスがエニグマ機械を初めて捕獲した", "フランスが通信傍受技術を提供した", "戦後に解読技術を流出させなかった"], "answer": 0, "explanation": "ポーランドの数学者たちはエニグマを解析する初期の機械的手法を開発し、その成果が英Bombeの開発基盤となった。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
