<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>人工衛星軌道力学検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>人工衛星軌道力学検定</h1>
    <div class="desc">人工衛星の軌道力学、ロケット工学、追跡制御、宇宙環境に関する高度で専門的な問題を出題します。難易度5のマニアックな検定に挑戦してみましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "ケプラーの第三法則において、人工衛星の公転周期Tと軌道半長軸aの関係を正しく表しているのはどれか？", "choices": ["T^2はa^3に比例する", "Tはa^2に比例する", "Tはaに比例する", "T^3はa^2に比例する"], "answer": 0, "explanation": "ケプラーの第三法則は、惑星や人工衛星の公転周期の二乗T^2が軌道の半長軸aの三乗a^3に比例することを示す。これは軌道力学の基礎法則の一つで、衛星の軌道設計に必須の関係式。"}, {"question": "衛星の軌道傾斜角が地球の自転軸と同期した特定の値になる軌道は何と呼ばれるか？", "choices": ["太陽同期軌道", "極軌道", "静止軌道", "地球同期軌道"], "answer": 0, "explanation": "太陽同期軌道は、衛星の軌道傾斜角を調整し、地球の自転に対して常に同じ太陽の照射条件を維持する軌道。地球観測衛星で多く使用される。"}, {"question": "ロケットの比推力（Isp）とは何を示す指標か？", "choices": ["単位推進剤あたりの推力効率", "ロケットの最大推力", "推進剤の爆発エネルギー", "エンジンの燃焼温度"], "answer": 0, "explanation": "比推力(Isp)は、単位質量の推進剤を消費した際に発生する推力効率のこと。単位は秒で、ロケット性能の重要指標。値が大きいほど効率的である。"}, {"question": "衛星追跡制御において、リアルタイムで行われる地上局からの追尾方法として最も適切なのはどれか？", "choices": ["全自動円錐スキャン追尾", "手動方位角調整追尾", "パッシブレーダー測定追尾", "双方向レーザー距離計測追尾"], "answer": 0, "explanation": "全自動円錐スキャン追尾は地上局アンテナが自動的に円錐状にスキャンし、衛星信号を検出して精密追尾する手法。リアルタイム運用に適している。"}, {"question": "地球低軌道（LEO）人工衛星の軌道高度はおおよそどの範囲か？", "choices": ["160km〜2,000km", "2,000km〜35,786km", "35,786km〜42,000km", "10,000km〜20,000km"], "answer": 0, "explanation": "地球低軌道(LEO)は一般的に地上高度約160kmから2,000kmまでの範囲で、人工衛星の中で最も軌道が地表に近い。地球観測、通信に多用される。"}, {"question": "ジオシンクロナス軌道と地球静止軌道の違いは何か？", "choices": ["軌道周期が地球自転周期か否か", "軌道平面の傾きの有無", "軌道の離心率の値", "軌道半径の違い"], "answer": 2, "explanation": "地球静止軌道は特別なジオシンクロナス軌道で、赤道面上にあり真円（離心率ほぼ0）である。一方、ジオシンクロナス軌道は周期が地球自転1日であっても軌道離心率や傾斜角が異なる場合がある。"}, {"question": "宇宙放射線環境が衛星システムに与える主な影響はどれか？", "choices": ["電子機器の単一イベント効果（SEE）の誘発", "軌道周期の短縮", "打ち上げロケットの推力低下", "衛星表面の温度急上昇"], "answer": 0, "explanation": "宇宙放射線は電子機器に対して単一イベント効果（SEE）を引き起こし、ビット反転や機器故障の原因となる。軌道や推力、温度とは直接関係しない。"}, {"question": "多段ロケット設計で、最も効率的にペイロードを高軌道に到達させるために考慮すべき要素は？", "choices": ["各段の質量比と比推力の最適化", "燃料の色と燃焼音の大きさ", "打ち上げ時間の気象条件の全無効化", "搭載機器の地上試験時間"], "answer": 0, "explanation": "多段ロケットでは、各段の質量比（推進剤重量対構造重量）とエンジンの比推力を最適化することで効率的な軌道投入が可能になる。燃料色や燃焼音は無関係。"}, {"question": "ランベルトの定理は軌道投入においてどのような問題解決に役立つか？", "choices": ["2点間の軌道遷移に必要なΔvを計算する", "ロケット打ち上げ時の推力分布を定義する", "軌道上の衛星の熱制御の解析", "衛星の姿勢制御のフィードバック制御設計"], "answer": 0, "explanation": "ランベルトの定理は、2点間の軌道間移動に必要な速度変化Δvを計算でき、軌道遷移や軌道変更計画に不可欠な理論である。"}, {"question": "宇宙空間での衛星の軌道減衰の主な要因として正しいものはどれか？", "choices": ["大気の残留抵抗による減速", "太陽光圧による強制軌道上昇", "地球磁場による加速効果", "宇宙塵の衝突による速度増加"], "answer": 0, "explanation": "低軌道では、地球の上層大気の残留ガスによる空気抵抗が衛星軌道のエネルギーを奪い、徐々に軌道が低下・減衰する主要因である。その他は軌道減衰の直接因ではない。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
