<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>特殊効果映画技術検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>特殊効果映画技術検定</h1>
    <div class="desc">映画撮影、映像効果技術、CG合成、トリック撮影など、特殊効果に関する高度な知識を問うマニアックなクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "映画『メメント』で用いられた特殊効果技術で、時間の逆行を表現するために効果的に用いられた編集技法は何？", "choices": ["スプリットスクリーン編集", "逆再生編集", "ジャンプカット編集", "マッチカット編集"], "answer": 1, "explanation": "『メメント』では物語を逆順に進めるために逆再生編集が使われ、時間の逆行感を視覚的に表現した。逆再生編集は映像を逆向きに再生する技法で、時間軸の操作を効果的にする。"}, {"question": "クロマキー合成で最も一般的に使われる背景色は何色か？", "choices": ["赤色", "緑色", "青色", "黄緑色"], "answer": 1, "explanation": "クロマキー合成では背景に緑色が多用される。これはカメラのイメージセンサーの感度が高いこと、人物の肌色と反対色であり被写体抽出が容易なためである。"}, {"question": "映画のミニチュア撮影で、遠近感を強調するために利用される技法は何と呼ばれるか？", "choices": ["ティルトシフト撮影", "バレットタイム撮影", "スタビライザー撮影", "スローモーション撮影"], "answer": 0, "explanation": "ティルトシフト撮影はレンズを傾けることで被写界深度を操作し、ミニチュア模型の遠近感を強調する効果がある。これにより本物の風景のような錯覚を作り出す。"}, {"question": "CG合成において、実写映像の光源条件に合わせてCGオブジェクトの陰影や反射を調整する技術は何？", "choices": ["モーションキャプチャー", "HDRIライティング", "リトポロジー", "ボーンウェイトペインティング"], "answer": 1, "explanation": "HDRIライティングはハイダイナミックレンジイメージを用いて実際の光環境を再現し、CGオブジェクトの陰影や反射を自然に見せる技術である。"}, {"question": "ウルトラワイドレンズを使ったトリック撮影で、被写体の一部を誇張し遠近感を異常に強調する効果を何というか？", "choices": ["フォースパースペクティブ", "バレエティック効果", "シュールレアリズム効果", "ハイキー効果"], "answer": 0, "explanation": "フォースパースペクティブはウルトラワイドレンズなどで遠近感を極端に誇張し、被写体の一部を強調して異質なイメージを作り出す技法で、トリック撮影に多用される。"}, {"question": "コマ撮りアニメーションの一種で、実写映像にCGを逐次的に合成して動きを同期させる手法を何という？", "choices": ["モーションコントロール撮影", "モーショングラフィックス", "クロマキー撮影", "リギング"], "answer": 0, "explanation": "モーションコントロール撮影は精密に制御されたカメラの動きを使い、実写とCGの動きを同期させることで、綿密なコマ撮り合成を可能にする。"}, {"question": "映画で使用されるグリーンスクリーン映像のノイズや染みを除去し、合成をより自然に見せるための事前処理技術はどれ？", "choices": ["ラベリング", "デジタルスプレッティング", "プリマルチプライ処理", "キーヤーによるスペルリング"], "answer": 2, "explanation": "プリマルチプライ処理はアルファチャンネルのカラー成分に乗算処理を施し、グリーンスクリーンの微細なノイズや染みを除去して自然な合成を実現する。"}, {"question": "1950年代の特撮映画での爆発シーン撮影で、多く用いられた安全かつ効果的な技術は何？", "choices": ["ミニチュア爆破撮影", "実物大型爆破", "コンピュータグラフィックス", "オプティカルプリント"], "answer": 0, "explanation": "当時は実物の大規模爆破が困難だったため、ミニチュア模型を爆破して撮影し、スロー再生などで迫力のある爆発シーンを作った。"}, {"question": "映像合成において、異なる画面サイズ・解像度の素材を統一するために用いる技術は何？", "choices": ["リサイズ", "マッチムーブ", "ロトスコープ", "トラッキング"], "answer": 0, "explanation": "リサイズは異なる素材の解像度や画面サイズを揃える処理で、合成映像の違和感を軽減し、シームレスな映像作品作りに欠かせない。"}, {"question": "映画『ブレードランナー2049』で使われた、リアルなホログラム表現に多用された映像技術は何？", "choices": ["ボリュメトリックディスプレイ", "ディープラーニング合成", "ライトフィールドレンダリング", "パーティクルシステム"], "answer": 2, "explanation": "ライトフィールドレンダリングは多方向からの光情報を扱い、リアルなホログラムや透明感のある映像表現に適した技術として『ブレードランナー2049』で活用された。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
