<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古代文字解読検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古代文字解読検定</h1>
    <div class="desc">古代文字や象形文字に関するマニアックな知識を問うクイズです。考古学的背景や文字の解読方法について深堀りしましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "古代エジプトのヒエログリフにおいて、“アンケト”と呼ばれるシンボルは何を象徴している？", "choices": ["生命と再生のシンボルとしてのアンケトの女神像", "王権と支配を示すファラオの冠の象形文字", "太陽神ラーの光を表す光線の図案", "砂漠の風を象徴する波状線の模様"], "answer": 0, "explanation": "アンケトは紀元前のエジプトで生命や再生を象徴する女神として表現され、ヒエログリフにおいても生命の象徴として用いられました。特に彼女の女神像のシンボルがよく認識されています。"}, {"question": "楔形文字の最初期の使用目的として最も適切なのは何か？", "choices": ["宗教的儀式に用いられる呪文の記録", "経済取引や物品の管理の記録", "歴史的記念碑の碑文", "詩歌や叙事詩の創作記録"], "answer": 1, "explanation": "楔形文字は紀元前4千年紀の古代メソポタミアで主に経済的な記録、つまり物品や取引の管理目的で発明され、その後徐々に複雑な用途にも発展しました。"}, {"question": "インダス文字の最大の未解読の特徴は何か？", "choices": ["文字数が極端に多く膨大であること", "解読のための二次資料やバイリンガル碑文が存在しないこと", "象形文字の使用が極端に少ないこと", "数詞以外の記号が全く見つかっていないこと"], "answer": 1, "explanation": "インダス文字解読の最大の障壁は、解読の決め手となるようなバイリンガル碑文や確固たる解読の手がかりとなる二次資料が発見されていないためで、これにより文字体系や言語が特定できずにいます。"}, {"question": "マヤ文字の「音節文字」と「表意文字」の区別において特徴的なのは何か？", "choices": ["表意文字は1文字で1単語を表し、音節文字は音一つを表す", "音節文字は神聖な言葉に限られ、表意文字は日常語に使われる", "両者は形態的に完全に区別できず混用される", "表意文字は絵文字的で音節文字は幾何学的に描かれる"], "answer": 0, "explanation": "マヤ文字は音節文字と表意文字を組み合わせる複雑な表記体系で、表意文字は1つの文字で1つの意味（単語や概念）を示し、音節文字は1音節を表現します。これは解読上の重要ポイントです。"}, {"question": "古代中国の甲骨文字の主な書記対象は何か？", "choices": ["農業の収穫量記録", "戦争の勝敗報告", "占い結果の記録と王室の祭祀", "市民の日常生活の記録"], "answer": 2, "explanation": "甲骨文字は殷（商）王朝時代に主に亀甲や獣骨に刻まれ、王室の占い結果や祭祀儀式に関する記録として残された初期の中国文字です。"}, {"question": "古代ミノア文明の「線文字B」が解読された主な成果は何か？", "choices": ["宗教的テキストの解読", "日常生活の多言語表記の発見", "宮廷の経済台帳であることの証明", "古代ヨーロッパ神話の解明"], "answer": 2, "explanation": "線文字Bはクレタ島のミノア文明後期に用いられた文字で、ミケーネ文明が漢字的な性質で経済的台帳や物品管理に使っていたことが解読で明らかになりました。"}, {"question": "「トログリフ」として知られる古代文字はどの文化圏に属しているか？", "choices": ["古代メソポタミア", "古代ギリシア", "古代エジプト", "古代マヤ"], "answer": 1, "explanation": "トログリフは古代ギリシアの建築装飾に見られる用語で文字ではありませんが、文字の特徴として転用されることがあり、古代ギリシア文化圏に属します。"}, {"question": "スカンジナビアのルーン文字はどんな用途で主に使われたか？", "choices": ["宗教的祭祀文書の記録", "墓碑銘や記念碑への刻印", "王の勅令発布のための公式文書", "王朝の法律書の執筆"], "answer": 1, "explanation": "ルーン文字は北欧のヴァイキング時代に主に墓碑銘や記念碑への刻印などに使われ、文字自体が宗教的な魔除けの意味合いも持ちながら、記録媒体として使われました。"}, {"question": "楔形文字体系で「トリル」の位置づけが意味するのは何か？", "choices": ["三重の線を持つ特殊な音節文字", "宗教的な三位一体の概念", "交易記録の3種類の物品分類", "三世代に渡る王朝の連続性"], "answer": 0, "explanation": "楔形文字における「トリル」は三つの楔形線の組み合わせを指し、特定の音節や概念を表す記号の一つです。単なる装飾でなく意味のある音節文字です。"}, {"question": "古代シュメール人が楔形文字を粘土板に刻む際に使った道具は何か？", "choices": ["鋭い骨製の針", "葦の茎の先端を切った棒", "金属の小型鋤", "石製の彫刻刀"], "answer": 1, "explanation": "楔形文字は葦の茎の先端を斜めに切った道具を使い、軟らかい粘土板に刻む形で記録されました。これにより独特の楔形の形状が生まれました。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
