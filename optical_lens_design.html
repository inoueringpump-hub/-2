<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>光学レンズ設計検定マニアッククイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>光学レンズ設計検定マニアッククイズ</h1>
    <div class="desc">光学設計理論、レンズ収差、屈折率、光路設計に関する高度な専門知識を問う難易度5のクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "球面収差を最小化するためにレンズ設計で一般的に用いられる方法はどれか？", "choices": ["単一の凸レンズのみを使用する", "複数のレンズを組み合わせて非点収差を補正する", "非球面レンズを用いて光線の屈折を制御する", "屈折率の低いガラスのみを使用する"], "answer": 2, "explanation": "非球面レンズはレンズの曲率を面ごとに最適化できるため、球面収差を効果的に抑制でき、通常の球面レンズよりも収差補正に優れています。"}, {"question": "アッベ数が大きいガラス材料の特徴として最も正しいものはどれか？", "choices": ["高い分散を持ち、色収差が大きい", "低い分散で色収差が小さい", "高い屈折率を持ち、焦点距離が短い", "熱膨張率が大きく温度特性が悪い"], "answer": 1, "explanation": "アッベ数は材料の分散度合いの逆数であり、大きい値は分散が低く色収差が抑えられることを示します。"}, {"question": "テレセントリック光学系の主な特徴はどれか？", "choices": ["視野の中心でのみ像面歪みがゼロである", "像面に入射角度が一定となり測定精度が向上する", "入射角度が広範囲で変化し色収差が増加する", "光路長が短いため設計が簡単になる"], "answer": 1, "explanation": "テレセントリック光学系では像面に対して入射光線がほぼ並行となるため、視野全体で入射角度が一定となり、寸法測定や計測精度が向上します。"}, {"question": "屈折率の異なる2つの材質の境界で光が反射する現象を何と呼ぶか？", "choices": ["全反射", "屈折", "反射光散乱", "フレネル反射"], "answer": 3, "explanation": "フレネル反射は異なる屈折率の媒質境界で光の一部が反射する現象で、入射角や偏光状態に依存した反射率が特徴です。"}, {"question": "光学系におけるコマ収差の原因として正しいものはどれか？", "choices": ["非球面形状の乱れ", "軸上光線の屈折率変化", "軸から外れた斜入射光線の不均一屈折", "レンズ表面の散乱による光路の乱れ"], "answer": 2, "explanation": "コマ収差は光軸から外れた光線が非対称に屈折して像が星形に歪む収差で、斜入射光線の不均一屈折が主な原因です。"}, {"question": "アポクロマートレンズ設計で主に補正する収差は何か？", "choices": ["軸上色収差と球面収差を同時に補正", "色収差を複数波長で補正する", "非点収差のみを補正する", "コマ収差のみに特化している"], "answer": 1, "explanation": "アポクロマートレンズは異なる3波長で色収差を補正し、二色アポクロマート以上の色収差補正性能を持ちます。"}, {"question": "光路長の等価性が重要となる光学設計の原理は何か？", "choices": ["ハイネの原理", "フェルマーの原理", "フックの法則", "マクスウェル方程式"], "answer": 1, "explanation": "フェルマーの原理は光が通る経路は光路長が極値（最短または最長）となることを述べており、光学設計の基礎となります。"}, {"question": "レンズ群の間隔を調整して焦点距離を自由に変化させる光学系を何と呼ぶか？", "choices": ["ズームレンズ", "テレフォトレンズ", "マクロレンズ", "魚眼レンズ"], "answer": 0, "explanation": "ズームレンズは複数レンズ群を移動させて焦点距離を連続的に変化でき、焦点距離の可変性を持つ光学系です。"}, {"question": "両凸レンズの中心厚さが薄いほど球面収差が", "choices": ["増加する", "減少する", "変化しない", "プラズマ周波数に依存する"], "answer": 0, "explanation": "中心厚さが薄い両凸レンズは曲率が鋭くなるため球面収差が増加しやすい傾向があります。"}, {"question": "光学設計において屈折率の波長依存性を記述する式はどれか？", "choices": ["ブランストークス方程式", "クッレムス・クラッヘル方程式", "ディスペーション方程式", "コマンドン・ツァイス方程式"], "answer": 1, "explanation": "クッレムス・クラッヘル方程式は屈折率の波長依存性をモデル化しており、光学ガラスの分散特性解析に用いられます。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
