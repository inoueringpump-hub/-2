<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>微生物培養理論検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>微生物培養理論検定</h1>
    <div class="desc">微生物学と培養技術、培地成分、増殖条件に関する高度な知識を問う難易度5の問題集です。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "微生物の生育において最適なpH範囲は一般にどのような特徴を持つか？", "choices": ["pH2-3の極酸性環境を好む", "pH6-8の中性付近を好む", "pH9-11のアルカリ性環境を好む", "pH4.5-5.5の酸性環境を好む"], "answer": 1, "explanation": "多くの微生物は中性に近いpH6-8の範囲で最も良好に増殖する。これは細胞内酵素の活性がこの範囲で最適化されているためである。極端な酸性やアルカリ性環境を好む特異な微生物も存在するが、一般的には中性付近が標準的な培養条件となる。"}, {"question": "液体培地における撹拌の主な目的は何か？", "choices": ["酸素供給と微生物同士の接触促進", "培地の温度均一化および酸素供給", "微生物の浮遊を防止するため", "栄養素の沈殿を促進するため"], "answer": 1, "explanation": "液体培地の撹拌は温度のムラを防ぎ、酸素を均一に供給するために行う。これにより微生物の均一な生育環境を確保し、増殖を促進する。"}, {"question": "微生物培養において「滅菌」が目的とするものは何か？", "choices": ["すべての微生物を除去すること", "特定の病原体だけを除去すること", "微生物数を抑制して増殖を遅らせること", "ウイルスだけを除去すること"], "answer": 0, "explanation": "滅菌は対象物からすべての生存可能な微生物を完全に除去することであり、汚染の根本的な除去を目指す。消毒や抗菌は微生物数を減少させたり活動を抑制したりするが、滅菌とは本質的に異なる。"}, {"question": "硫黄含有アミノ酸を含む培地成分として代表的なものはどれか？", "choices": ["グルタミン酸", "システイン", "トレオニン", "アラニン"], "answer": 1, "explanation": "システインは硫黄原子を含むアミノ酸で、タンパク質のジスルフィド結合形成に重要な役割を担う。培養培地では必要に応じて添加されることがある。"}, {"question": "微好気性微生物の培養に適した酸素濃度は一般的にどの範囲か？", "choices": ["0%～1%の非常に低い酸素", "100%の純酸素", "5%～15%の制限された酸素", "21%の大気中酸素濃度"], "answer": 2, "explanation": "微好気性微生物は低濃度の酸素で最適に増殖するため、5%～15%程度の酸素環境が適している。完全な無酸素や高酸素分圧は増殖を阻害する。"}, {"question": "培地における寒天（アガー）の役割は何か？", "choices": ["液体培地の栄養素として利用される", "液体培地を固化して表面培養を可能にする", "微生物の抗生物質耐性を高める", "pHの安定化剤として作用する"], "answer": 1, "explanation": "寒天は水に溶かして冷却すると固まる性質があり、培養培地を固化して微生物の表面での増殖やコロニー形成を可能にする。栄養源としては一般的に利用されない。"}, {"question": "嫌気性条件での微生物培養において最も適切な方法はどれか？", "choices": ["培養瓶内の空気を完全に除去し、窒素ガスで置換する", "培地を常に撹拌して酸素供給を増加させる", "培地に酸素を多く溶解させて酸化還元電位を高める", "培養温度を高く設定し酸素の溶解度を下げる"], "answer": 0, "explanation": "嫌気性培養では培養容器内の酸素を除去し、窒素や二酸化炭素などの不活性ガスで置換して酸素を遮断する。これにより酸素感受性の微生物を生育可能にする。"}, {"question": "微生物の栄養要求性を判別するために使用される培地のタイプは？", "choices": ["選択培地", "一般培地", "指示培地", "定義培地"], "answer": 3, "explanation": "定義培地は成分が正確に決められている培地であり、微生物の特定栄養素の必要性（栄養要求性）を調べるのに用いられる。"}, {"question": "微生物培養において、増殖曲線の対数増殖期の特徴はどれか？", "choices": ["細胞数がほとんど変化しない安定期", "細胞死が増加する減少期", "細胞数が指数関数的に増加する期間", "培地中の栄養素が枯渇する停滞期"], "answer": 2, "explanation": "対数増殖期（指数増殖期）は微生物が最も活発に分裂増殖し、細胞数が指数関数的に増加する期間を指す。"}, {"question": "微生物培養における好熱性菌の最適培養温度は通常どの範囲か？", "choices": ["10～25℃の低温範囲", "35～40℃の人間体温付近", "50～70℃の中高温範囲", "80～100℃の高温範囲"], "answer": 2, "explanation": "好熱性菌は50～70℃の高温環境で最適に生育する微生物群で、温泉などの自然環境や産業利用において重要な役割を持つ。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
