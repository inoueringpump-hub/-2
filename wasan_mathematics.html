<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和算理論検定クイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>和算理論検定クイズ</h1>
    <div class="desc">江戸時代の数学文化である和算の理論と算法古典に関する難易度5の専門的クイズゲームです。和算の理論、数式、歴史を深掘りします。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "円周率を独自に計算し江戸和算界に影響を与えた和算家は誰か？", "choices": ["関孝和", "吉田光由", "安井算哲", "藤田朴斎"], "answer": 0, "explanation": "関孝和は円周率を高精度で計算し、関西和算を代表する数学者として知られています。彼の計算は江戸時代の数学技術を大きく進展させました。"}, {"question": "和算で「開平算」とは主に何を求める算法か？", "choices": ["平方根の計算", "立方根の計算", "因数分解", "対数の計算"], "answer": 0, "explanation": "開平算は平方根を求める算法であり、和算の基本的な計算技術の一つとして発展しました。"}, {"question": "『算法全集』などの和算古典で用いられる三角形の面積の計算公式は？", "choices": ["底辺×高さ÷2", "ヘロンの公式", "正接の和の定理", "余弦定理"], "answer": 1, "explanation": "和算の古典にはヘロンの公式が用いられ、三辺の長さから三角形の面積を計算する方法が詳述されています。"}, {"question": "和算の伝統的用語「割算（わりそろ）」とはどの計算方法か？", "choices": ["分数計算の算法", "平方根の近似算法", "掛け算の繰り上げ計算", "立方体体積の計算"], "answer": 0, "explanation": "割算は分数を含む割り算や分数計算の算法を指し、和算特有の用語として使われています。"}, {"question": "関孝和が導入したとされる元となる方程式の考え方は？", "choices": ["代数方程式", "微分方程式", "整数論の問題", "連立方程式"], "answer": 3, "explanation": "関孝和は連立方程式の解法を和算に導入し、代数的手法の発展に寄与しました。"}, {"question": "和算の数表に見られる「正負の数」の扱いで正しい説明は？", "choices": ["正の数は赤字、負の数は黒字で区別された", "負の数は古典的には存在しなかった", "正負は概念として明確に分けられていた", "負の数は関孝和以前には無視されていた"], "answer": 0, "explanation": "和算の数表では通常、正の数と負の数を色で区別し、正の数は赤字で表されることがありました。"}, {"question": "和算における「条理」という用語が表す概念は？", "choices": ["数学的理由や理論的根拠", "計算手順の略称", "計算誤差の種類", "特定の数式記号"], "answer": 0, "explanation": "条理は数学的な道理や理論的根拠を意味し、和算での証明や解説に用いられました。"}, {"question": "和算の算法書に見られる「正徳方程式」は主に何の問題に用いられたか？", "choices": ["数値の開平方根計算", "一次方程式の解法", "円周問題の解析", "初歩的代数問題"], "answer": 3, "explanation": "正徳方程式は江戸期和算で代数的問題を解く初歩的代数問題の解法を示しています。"}, {"question": "和算で用いられた「割稽古」の意味は？", "choices": ["割り算の演習問題", "整数分割問題", "合同算の一種", "図形分割の技法"], "answer": 0, "explanation": "割稽古は割り算、分割の計算を集中的に練習するための演習問題群を指します。"}, {"question": "江戸時代の和算家が影響を受けた中国算学書『算法統宗』の特徴は？", "choices": ["比例計算や平方根計算法の体系化", "三角関数の詳細説明", "微分積分の導入", "整数論に特化した論述"], "answer": 0, "explanation": "『算法統宗』は比例や平方根計算法を体系化し和算に大きな影響を与えました。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
