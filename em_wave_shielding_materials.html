<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>電磁波シールド材料検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>電磁波シールド材料検定</h1>
    <div class="desc">電磁波シールド材料の特性、原理、適用技術に関する専門的な理解を問う難易度5のマニアックなクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "電磁波シールド材料における『誘電損失』の主な影響は何か？", "choices": ["電磁波の反射率を高める", "電磁波の伝搬を速度遅延させる", "電磁波のエネルギーを熱に変換して吸収する", "電磁波の周波数を変換する"], "answer": 2, "explanation": "誘電損失は材料内で電磁波のエネルギーを熱に変換し、結果として電磁波の吸収特性を向上させます。これはシールド効果を高める重要なメカニズムです。"}, {"question": "金属ベースの電磁波シールド材料が持つ主要な利点は何か？", "choices": ["軽量で柔軟性が高い", "高い反射率と導電性を有する", "優れた誘電損失特性を持つ", "低周波数帯域での透過性が高い"], "answer": 1, "explanation": "金属材料は高い導電率により電磁波を効率よく反射し、優れたシールド性能を実現します。そのため反射率が高いことが主な利点です。"}, {"question": "カーボン系材料が電磁波シールドに用いられる際の特徴として正しいものはどれか？", "choices": ["局所的な磁気特性に優れている", "優れた誘電緩和による損失効果を示す", "極めて高い熱伝導率のみを有する", "全周波数帯域で同等のシールド性能を示す"], "answer": 1, "explanation": "カーボン系材料は誘電損失による電磁波吸収を主体としており、誘電緩和の効果によって広い周波数帯で吸収性能を発揮します。"}, {"question": "鉄系フェライト磁性材料の主な電磁波防御メカニズムは何か？", "choices": ["誘電損失の増大による吸収", "磁気損失による電磁エネルギーの減衰", "高反射率による電磁波の遮蔽", "表面プラズモン共鳴効果"], "answer": 1, "explanation": "鉄系フェライト材料は高い磁気損失を示し、これにより電磁波の磁界成分が減衰してシールド効果を発揮します。"}, {"question": "電磁波シールド材料におけるスキン効果の影響が最も顕著になる条件は？", "choices": ["低周波数かつ高導電率材料", "高周波数かつ高導電率材料", "低周波数かつ低誘電率材料", "高周波数かつ絶縁材料"], "answer": 1, "explanation": "スキン効果は高周波数において導電率の高い材料の表面近傍に電流が集中し、これがシールド性能に大きく影響します。"}, {"question": "電磁波シールド材料でのミクロな多層構造の主な効果は何か？", "choices": ["機械的強度の向上", "電磁波の反射・吸収特性の最適化", "熱膨張の抑制", "耐薬品性の改善"], "answer": 1, "explanation": "多層構造は異なる層の特性を組み合わせ、反射と吸収を効果的に制御してシールド効果を高める役割を持ちます。"}, {"question": "導電性ポリマーを用いた電磁波シールド材料の課題として正しいものは？", "choices": ["高温下での導電率低下が顕著である", "非常に重く取り扱い困難である", "磁気損失が極めて高い", "反射率が金属材料より極端に高い"], "answer": 0, "explanation": "導電性ポリマーは高温条件で導電率が低下しやすく、シールド性能の安定性に課題があります。"}, {"question": "電磁波シールド性能に対して、材料の厚みが増すと一般にどのような影響を及ぼすか？", "choices": ["全ての周波数帯で性能が必ず劣化する", "一定周波数範囲で吸収率が向上する", "反射率が極端に減少する", "透過率が高まる"], "answer": 1, "explanation": "厚みを増すことで電磁波の吸収パスが長くなり、特定の周波数帯での吸収率が向上することがありますが、反射率への影響は限定的です。"}, {"question": "電磁界解析にて用いられるシールド効果評価のパラメータ『SE（シールド効果）』は一般にどのように定義されるか？", "choices": ["シールド材料の誘電率の対数値", "透過電磁波強度に対する入射電磁波強度の比率のデシベル値", "材料の磁化率の非線形性指標", "電磁波の波長と材料厚みの比率"], "answer": 1, "explanation": "シールド効果(SE)は電磁波の入射強度と透過強度の比の対数（デシベル）で表し、シールド性能の定量的評価に用います。"}, {"question": "電磁波シールド材料選択時の考慮点として不適切なものはどれ？", "choices": ["使用する周波数帯域との適合性", "環境耐久性と腐食抵抗性", "材料の色調と美観の優先度", "機械的条件と設置環境"], "answer": 2, "explanation": "材料選択では性能と環境適合性が重要視され、色調や美観は通常電磁波シールド効果に直接影響しないため優先度は低いです。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
