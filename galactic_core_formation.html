<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>銀河コア形成理論検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>銀河コア形成理論検定</h1>
    <div class="desc">天体物理学の最先端理論に基づく、銀河核構造とブラックホール形成を理解するためのハイレベルクイズです。暗黒物質の役割も含めて、銀河コア形成の多面的なメカニズムを問います。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "現在最も支持されている銀河中心巨大ブラックホールの成長理論として正しいものはどれか？", "choices": ["ブラックホールは超新星爆発の残骸が集まって形成される。", "ブラックホールは星間ガスの降着と銀河同士の合体による質量増加で成長する。", "銀河中心には恒星やガスは存在せず、暗黒物質だけでブラックホールが形成される。", "ブラックホールは宇宙膨張の非均一性によって直接形成される。"], "answer": 1, "explanation": "巨大ブラックホールは主に周囲の星間ガスを吸収する降着過程や、銀河同士の合体による中心核の連結・質量増加で成長すると考えられています。超新星爆発の残骸単独や暗黒物質のみでは説明できません。"}, {"question": "銀河の核構造に大きな影響を及ぼすとされる暗黒物質の役割として最も適切なのは？", "choices": ["暗黒物質は銀河中心の星形成を直接促進する。", "暗黒物質の密度分布は銀河の重力ポテンシャルを決定し、核構造形成の基盤となる。", "暗黒物質は電磁波を強く放出し、ブラックホールの進化を加速させる。", "暗黒物質は銀河の外縁にのみ存在し、核形成には無関係である。"], "answer": 1, "explanation": "暗黒物質の重力効果により銀河の重力ポテンシャルが形成され、そこでガスの収縮や星形成が促進されます。暗黒物質自身は電磁波をほとんど放出せず、銀河外縁に限定された存在ではありません。"}, {"question": "超大質量ブラックホールの付近で観測される「イベントホライズンテレスコープ」により得られた情報は何を示しているか？", "choices": ["ブラックホールの磁場の直接観測。", "ブラックホールの事象の地平面（イベントホライズン）の影像取得。", "ブラックホール周囲の高エネルギー放射線のスペクトル分析。", "ブラックホールの温度とエントロピーの正確な測定。"], "answer": 1, "explanation": "イベントホライズンテレスコープは銀河中心などの超大質量ブラックホールの事象の地平面の影像化に成功し、ブラックホールの存在を直接視覚的に示しました。"}, {"question": "銀河コア形成において「フィードバック効果」とは何を指すか？", "choices": ["銀河中心からの光子放射によるガス温度の上昇。", "ブラックホールの降着円盤から放出されるエネルギーが周囲の星形成に影響を与える現象。", "銀河系外物質の銀河中心への増加。", "銀河系外の銀河同士が重力相互作用すること。"], "answer": 1, "explanation": "フィードバック効果はブラックホール活動や星形成によるエネルギー放出が周囲のガスに影響を与え、星形成の制御や銀河核の形態進化を導く現象です。単なる光子放射や銀河同士の重力相互作用とは異なります。"}, {"question": "暗黒物質が「密度コア」ではなく「密度くさび状（cusp）」の分布を示すという議論は何に関係しているか？", "choices": ["銀河核の明るさ分布の観測と暗黒物質理論の整合性問題。", "宇宙背景放射の温度揺らぎの説明。", "超新星爆発の発生頻度と分布。", "重力波の発生源解析。"], "answer": 0, "explanation": "暗黒物質の密度プロファイルに関する「コア・カスプ問題」は、観測される銀河核の明るさ分布と理論的に予測される暗黒物質分布の不一致問題を指し、銀河核形成理論の重要な課題です。"}, {"question": "銀河コア内部における星の軌道分布が「トーラス状」になりやすい理由として最も適切なのは？", "choices": ["ブラックホールの磁力線が星の軌道を固定するため。", "円盤状のガス降着と角運動量保存による組織的な軌道形成。", "超新星爆発により星が特定方向のみ移動するため。", "暗黒物質の放射圧によって星の軌道が偏向されるため。"], "answer": 1, "explanation": "銀河コアにおけるガスの円盤降着過程と角運動量保存則によって、星やガスは円盤やトーラス状の軌道をとりやすくなります。磁力線や放射圧が直接軌道固定する証拠はありません。"}, {"question": "ブラックホール周辺でのジェット形成におけるマグネトハイドロダイナミクスの役割は何か？", "choices": ["高エネルギー電子の生成源。", "降着円盤の光度を決定する要因。", "磁場を介して降着円盤からエネルギーを抽出し、ジェットを加速・集束する。", "暗黒物質の分布を変える駆動力。"], "answer": 2, "explanation": "マグネトハイドロダイナミクス(MHD)は磁場と流体の相互作用を扱い、ブラックホールの降着円盤から磁場を通じてエネルギーを抽出し、強力なジェットの加速と方向づけに重要な役割を果たします。"}, {"question": "銀河中心部での星間ガスの冷却過程に最も寄与するメカニズムは何か？", "choices": ["光電効果による電子逸脱。", "分子雲内のCOやH2の回転・振動準位による放射冷却。", "暗黒物質粒子の崩壊によるエネルギー放出。", "銀河磁場の断熱圧縮。"], "answer": 1, "explanation": "銀河中心の冷たい星間ガスは、主に分子雲内のCO分子やH2分子の回転・振動準位からの赤外線放射冷却によって温度が下がり、星形成の条件となります。暗黒物質の崩壊は寄与しません。"}, {"question": "「モンスター銀河核」という呼称はどのような天体に対して使われるか？", "choices": ["超大質量ブラックホールを抱える銀河核。", "非常に大きな矮小銀河核。", "暗黒物質密度が異常に高い領域。", "連星ブラックホールの集積領域。"], "answer": 0, "explanation": "「モンスター銀河核」は通常、質量が非常に大きい超大質量ブラックホールが存在する銀河核に対し比喩的に使われる呼称です。"}, {"question": "銀河コア形成理論における「シードブラックホール」とは何を指すか？", "choices": ["初期宇宙での微小なブラックホールの萌芽。", "ブラックホールに吸収される星のこと。", "暗黒物質の小規模な塊。", "銀河中心でのX線放射源。"], "answer": 0, "explanation": "シードブラックホールは宇宙初期に形成された比較的小さなブラックホールで、そこから降着や合体により超大質量ブラックホールへと成長すると考えられています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
