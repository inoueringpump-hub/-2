<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>希少鉱物化学検定：マニアッククイズゲーム</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>希少鉱物化学検定：マニアッククイズゲーム</h1>
    <div class="desc">鉱物分類、元素分析、結晶構造、希少鉱物特性に焦点を当てた高度な問題を解いて専門知識を試そう！</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "ホウ酸塩鉱物群に分類される希少鉱物ウランペン鉱の主要元素組成はどれか？", "choices": ["Ba, Al, Si, O", "U, P, O, H", "K, Fe, S, O", "Ca, Mg, CO3, OH"], "answer": 1, "explanation": "ウランペン鉱(Uranyl phosphate mineral)は主にウラン(U)、リン(P)、酸素(O)、水素(H)を含むホウ酸塩鉱物の一種であり、ウランの酸化状態とリン酸基との結合が特徴的です。"}, {"question": "自然界で最も安定して広範囲に存在する希少トリリニウム元素を含む鉱物は？", "choices": ["トリルコフェライト", "トリリニット", "トリフォン石", "トリルディナイト"], "answer": 0, "explanation": "トリルコフェライトは希少なトリリニウム元素を含む鉱物で、安定した結晶構造を持ち天然で発見されています。その他は架空の名称です。"}, {"question": "結晶系でテトラゴナルに分類される希少鉱物ソディウムチタニウムシリケートの一般式はどれか？", "choices": ["Na2TiSi3O9", "NaTi2O5", "Na2Ti3O7", "Na2Ti2Si2O9"], "answer": 2, "explanation": "Na2Ti3O7はテトラゴナル結晶系に属し、ナトリウム、チタン、酸素を含む希少なチタニウムシリケート鉱物の一般式です。結晶構造が安定していることで希少価値があります。"}, {"question": "微量元素分析においてICP-MS法が特に有効な鉱物元素検出の利点は何か？", "choices": ["高耐熱性の元素同定", "超高感度による痕跡元素の定量", "鉱物の結晶構造分析", "鉱物内部の同位体イメージング"], "answer": 1, "explanation": "ICP-MS(誘導結合プラズマ質量分析)は微量の痕跡元素を高感度で定量分析できるため、希少鉱物の微量元素起源や特徴評価に有効です。"}, {"question": "斜方晶系に属する稀少なバナジウム含有鉱物はどれか？", "choices": ["デュスレライト", "パラバナジン鉱", "ブラジベント", "クロミト"], "answer": 1, "explanation": "パラバナジン鉱はバナジウムを含む希少な稀有鉱物で、斜方晶系に属します。その他の鉱物は異なる元素組成や晶系です。"}, {"question": "希少鉱物の解析において、X線回折法(XRD)で判別困難な場合に有効な補助手法は何か？", "choices": ["電子顕微鏡による微細構造解析", "密度測定法", "比熱測定", "磁化率測定"], "answer": 0, "explanation": "電子顕微鏡（SEM/TEM）による微細構造解析は、XRDでの同質異像や微細構造判別が難しい場合に実用的な補助手法です。"}, {"question": "モース硬度が7を超える希少鉱物として正しいのはどれか？", "choices": ["トパーズ", "アイオライト", "ルチル", "セリサイト"], "answer": 0, "explanation": "トパーズのモース硬度は8で非常に硬く、希少鉱物の中でも高い硬度を示します。アイオライトは7、ルチルは6～6.5程度、セリサイトは1.5～2です。"}, {"question": "希少なクロム元素を含む鉱物クロミットの化学式はどれか？", "choices": ["FeCr2O4", "MgCr2O4", "FeAl2O4", "MgAl2O4"], "answer": 1, "explanation": "クロミットはスピネル族で、主にマグネシウムとクロムを含むMgCr2O4の化学式を持つ鉱物です。"}, {"question": "希少鉱物における結晶欠陥の主要な影響はどれか？", "choices": ["結晶硬度の急激な増加", "元素組成の均一化", "物理的性質の変動や電子伝導性の変化", "鉱物表面の色彩の均一化"], "answer": 2, "explanation": "結晶欠陥は電子的性質や物理的性質に変動をもたらし、特に伝導性や磁気特性に影響を及ぼすことがあります。"}, {"question": "超高圧条件下で生成する希少なアグルコアイト鉱物の特徴として正しいのは？", "choices": ["低密度で層状構造を持つ", "高温高圧安定で六方晶系に属する", "低温環境で形成される一般的な石英型鉱物", "高クロム含有でモース硬度が低い"], "answer": 1, "explanation": "アグルコアイトは超高圧環境で形成される六方晶系の安定な鉱物で、高温高圧下での物理化学的特性が特徴的です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
