<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日本古代暦検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>日本古代暦検定</h1>
    <div class="desc">日本の古代暦法、天体観測、十二支、太陰太陽暦に関する難易度5のマニアックなクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "日本古代の太陰太陽暦で用いられた「節気」はどのように定められたか？", "choices": ["太陽の黄道上の位置を24等分した点を基準として設定された日付", "月の満ち欠けから14等分した日を基準に定められた節目", "北極星の位置変化を元に季節を区切った基準日", "日の出の方角の変化を観測して決められた日付"], "answer": 0, "explanation": "古代日本の太陰太陽暦では、中国から伝わった二十四節気が採用されており、太陽の黄道上の位置を約15度ずつ区切って1年を24分割し、それを節気として季節の目安にした。"}, {"question": "日本古代暦における「寅の刻」が示す時間帯はどれに最も近いか？", "choices": ["03時～05時", "05時～07時", "07時～09時", "09時～11時"], "answer": 0, "explanation": "十二支で表す刻は2時間ずつであり、「寅の刻」は午前3時から午前5時を指す。これは古代の時刻制度「十二刻」の一つである。"}, {"question": "「甲子待（こうしまち）」が行われた目的として正しいものは何か？", "choices": ["暦の改定に先立って次の甲子の日の天候を占う儀式", "初めて新しい太陰暦の元日を正式に定める法的手続き", "太陽黄経から節気の開始日を厳密に測定する天体観測", "十二支の順序を再確認し暦の誤差を調整する検査"], "answer": 0, "explanation": "甲子待とは暦の重要な節目となる甲子の日に、天候や自然の兆候を占い、暦の妥当性や今後の作業方針を確認する古代の儀礼である。"}, {"question": "日本の古代暦において「閏月」を挿入する基準に最も関係が深いものはどれか？", "choices": ["太陽が次の節気に達するまでの期間の調整", "月の朔望周期の誤差を1年ごとに補正するため", "二十四節気の中で特に寒さが厳しい日を避けるため", "天の北極星の正確な年間位置に対応させるため"], "answer": 0, "explanation": "太陰暦は月の周期で年が決まるが太陽年より短いため、太陽の節気が遅れないように太陽が次の節気に達する前に閏月を挿入し調整していた。"}, {"question": "古代日本で天体観測において「渾天儀」が果たした役割は何か？", "choices": ["天空の星座や惑星の位置を測る回転する観測装置", "月の満ち欠けを正確に記録する水時計の一種", "日の出と日の入りの時刻を算出するための太陽暦装置", "十二支の順番を決めるための占星術用器具"], "answer": 0, "explanation": "渾天儀は古代中国由来の天体観測器具で、球体の中に天球があり星や惑星の位置を精密に測定するのに用いられた。これが日本へも伝わり暦作成に活用された。"}, {"question": "十二支が暦の運用に用いられた目的として正しいものは何か？", "choices": ["時間・日付の識別と周期計算のための象徴的符号", "農作業の具体的な開始時期を示すための直線的時間指標", "太陽の高度角を計算する際の天球上の基準点", "月の満ち欠けの形を表す視覚的記号"], "answer": 0, "explanation": "十二支は古代から時間や日付の単位として使われ、1日や1時間を表現する記号として周期的な暦の管理に重要な役割を果たした。"}, {"question": "日本古代の太陰太陽暦における「朔（さく）」とは何を指すか？", "choices": ["新月の瞬間で月が太陽と重なる状態", "満月の直前の月の形態", "太陽が黄道上の特定の星座に入る瞬間", "月が地球から最も遠い点に到達する日"], "answer": 0, "explanation": "朔は月齢0の状態で、新月の瞬間を示し、太陰暦の月の始まりの指標として重要視された。"}, {"question": "古代において日本で天文観測記録として最も早く残る文献は次のうちどれか？", "choices": ["『日本書紀』の天文現象の記述", "『竹取物語』に記される星座譚", "『万葉集』中の星空詠歌", "『風土記』の天象に関する記述"], "answer": 0, "explanation": "『日本書紀』は720年に成立した歴史書で、天体現象や異常気象の記録が最も整理された形で残されており、古代の天文知識の重要な資料である。"}, {"question": "「太陰太陽暦」の特徴として正しいものはどれか？", "choices": ["月齢を基準にしながらも太陽の運行に応じて1年を調整する暦法", "完全に月の満ち欠けだけで1年を区切る暦で季節は一定しない", "太陽の運行のみを基準にし月の満ち欠けは無視された暦", "太陽と月の運行を無視して14日を1周期とする純粋な月暦"], "answer": 0, "explanation": "太陰太陽暦は月の朔望（月の満ち欠け）を基本としつつも、太陽の運行である節気とのずれを閏月挿入で調整し一年を合わせる暦法である。"}, {"question": "日本古代暦において、1年を24分割した節気の一つ「冬至」の意味は何か？", "choices": ["太陽が黄道上で南半球側に最も傾く日で昼が最も短い日", "月の満ち欠けが最も大きく輝く満月の日", "北極星が真上に位置する特別な天体位置の日", "太陽が黄道上で北回帰線に最も近づく日"], "answer": 0, "explanation": "冬至は二十四節気の一つで、太陽が黄道上で南半球側に最も傾き、北半球で昼の時間が最も短くなる日を指す。日本の古代暦でも季節の変わり目の重要な指標だった。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
