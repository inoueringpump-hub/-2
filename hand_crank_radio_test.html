<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>手動巻ラジオ検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>手動巻ラジオ検定</h1>
    <div class="desc">手動巻き式ラジオの基本構造や動作原理、歴史的背景に関する初級向け専門用語クイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "手動巻き式ラジオの動力源として用いられる主要な部品は何ですか？", "choices": ["電池", "スピーカー", "ダイナモ", "同調コイル"], "answer": 2, "explanation": "手動巻き式ラジオは内部のダイナモ（発電機）を巻くことにより電力を生成し、ラジオの動力としています。電池は使いません。"}, {"question": "手動巻きラジオで電力を貯蔵するためによく利用される装置は何？", "choices": ["コンデンサー", "バッテリー", "コイル", "ダイオード"], "answer": 1, "explanation": "手動巻きで発電した電気は内蔵バッテリーに蓄えられ、安定してラジオを動かすために使用されます。"}, {"question": "手動巻き式ラジオのチューニングに使用される回路要素は何？", "choices": ["可変抵抗", "同調コイル", "可変コンデンサー", "ダイオード"], "answer": 2, "explanation": "可変コンデンサーは受信周波数を調節する役割を持ち、同調回路の一部として広く使われています。"}, {"question": "手動巻きラジオの発明や普及に大きく影響を与えた時代背景は？", "choices": ["第一次世界大戦前", "1920年代のラジオ普及期", "第二次世界大戦後の復興期", "1990年代の携帯電話普及期"], "answer": 2, "explanation": "第二次世界大戦後は資源不足の中で自給自足エネルギーとして手動巻き式ラジオが普及しました。"}, {"question": "手動巻き式ラジオが採用する発電メカニズムの特徴は？", "choices": ["永久磁石の回転による誘導起電力", "燃料電池の化学反応利用", "太陽電池を併用", "熱電効果による発電"], "answer": 0, "explanation": "永久磁石が内部のコイルの近くで回ることで電磁誘導により電気を発生させる方式です。"}, {"question": "手動巻き式ラジオの回路保護に用いられる素子はどれ？", "choices": ["ヒューズ", "抵抗", "コイル", "バリスタ"], "answer": 0, "explanation": "ヒューズは過負荷時に回路を遮断して機器を保護します。手動巻き式ラジオにも安全装置として使われることがあります。"}, {"question": "手動巻き式ラジオに使われるスピーカーの形式として一般的なのは？", "choices": ["ダイナミックスピーカー", "ホーンスピーカー", "圧電スピーカー", "骨伝導スピーカー"], "answer": 0, "explanation": "ダイナミックスピーカーは電磁誘導によりコイルが動き音を出すため、手動巻き式ラジオに適しています。"}, {"question": "手動巻きラジオの主な制御機構として該当するものは？", "choices": ["ボリューム調整ツマミ", "電源スイッチのみ", "発振周波数の自動調整機構", "巻き上げ回数を計測するカウンター"], "answer": 0, "explanation": "ボリューム調整ツマミは音量調節用制御機構として標準的に備えられています。"}, {"question": "手動巻き式ラジオの特徴として正しいのは？", "choices": ["発電を手動で行うためバッテリーは不要", "発電と貯蔵を分離しバッテリーも利用する場合が多い", "充電式電池だけで動作する", "燃料を使った発電方法が主流"], "answer": 1, "explanation": "発電は手動ですが、電力を安定化するために内蔵バッテリーに貯蔵する設計が一般的です。"}, {"question": "手動巻き式ラジオの開発に寄与した主な技術分野は？", "choices": ["電気工学と機械工学の融合", "化学工学のみ", "音響工学だけ", "コンピューター工学"], "answer": 0, "explanation": "手動巻きラジオは回転メカニズム（機械工学）と電磁誘導や回路設計（電気工学）が高度に関連しています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
