<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>書道典籍評価検定 - 上級編</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>書道典籍評価検定 - 上級編</h1>
    <div class="desc">書道の歴史、古典書体の特徴、筆法の識別、文化的価値の評価に関するマニアックな問題を10問収録。難易度5の精鋭クイズで知識を試しましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "三国時代の書聖として知られる王羲之が最も重視した筆法の特徴は何か？", "choices": ["点画の均衡と連続性", "墨色の濃淡による調和", "筆圧の強弱を明確に分けること", "筆の旋回動作と流動性の表現"], "answer": 3, "explanation": "王羲之は筆の旋回動作を巧みに使い、線の流動性と変化を重視した筆法を用いたことで知られており、これは彼の書風の柔軟さと生き生きとした表現力の鍵となっている。"}, {"question": "隷書の特徴として正しくないものはどれか？", "choices": ["波磔という独特な線の終わり方がある", "筆画が直線的で均一な太さを保つ", "鎖状の連続した線のリズム感がある", "楷書の祖として位置づけられる場合も多い"], "answer": 1, "explanation": "隷書は筆画において線の太さが均一ではなく、波磔という点画の末端を強調する独特な筆法が特徴的。直線的で均一な太さは楷書の特徴であり、隷書とは異なる。"}, {"question": "『蘭亭序』はどの書体で書かれているか？", "choices": ["行書", "草書", "楷書", "隷書"], "answer": 0, "explanation": "『蘭亭序』は王羲之により書かれた行書の代表作であり、流麗で自然な筆運びが行書の特徴をよく示している。"}, {"question": "魏晋南北朝時代の書風として最もふさわしい説明はどれか？", "choices": ["装飾的で筆法が重厚な傾向にある", "文人による自由奔放な筆遣いと個性重視", "大量の官製楷書の整った書体が主流となった", "隷書から草書へ急速に変遷した時期"], "answer": 1, "explanation": "魏晋南北朝時代は文人文化が栄え、書道においても自由かつ個性的な筆遣いが尊ばれ、自己表現の追求が顕著になった時期である。"}, {"question": "中国古典書法における「筆脈」とは何を指すか？", "choices": ["筆圧の強弱の変化", "筆運びにおける線の連続性と生命力", "墨の濃淡の調整方法", "紙質と筆の相性による書写感"], "answer": 1, "explanation": "筆脈とは線のつながりやリズム、筆の流れの生命力を指し、書の動的な美しさや作者のエネルギーを伝える重要な概念である。"}, {"question": "唐代の玄宗時代に盛んになった書体は何か？", "choices": ["楷書の整備と普及", "草書の急激な簡略化", "隷書の公式書体への復権", "篆書を用いた碑刻の増加"], "answer": 0, "explanation": "唐代玄宗時期は楷書の体系化と広範な普及が進み、書道の標準とされた書体として完成度が高まった時代である。"}, {"question": "『多宝塔碑』に見られる筆法の特徴はどれか？", "choices": ["細く繊細な線で構成される", "力強い直線に加え流れるような曲線を活用", "跳ねや波磔が過剰に強調される", "墨色の斑紋や潤渇の表現が少ない"], "answer": 1, "explanation": "『多宝塔碑』は筆の強弱と直線・曲線の巧みな融合が特徴で、力強さと柔らかさを両立させた筆法が見られる。"}, {"question": "日本の古典書道において「和様」と称される特徴的要素は何か？", "choices": ["漢字の隷書体を基盤とする様式", "唐風書道に対して独自の柔らかく抑揚に富んだ線", "行書草書の技法の徹底的な排除", "筆圧を全く変化させない均一な筆致"], "answer": 1, "explanation": "和様は唐風書道とは異なり、日本独自の感性による柔らかく繊細で抑揚に富んだ線質を重視し、和の美意識を表現した書風を指す。"}, {"question": "書法鑑賞で「骨法用筆」とは何を意味するか？", "choices": ["文字の骨格を維持するための筆圧調整", "筆使いの骨組みのような基本技術", "墨色の骨太さを表現する技法", "筆の動きの速さを一定に保つ技術"], "answer": 1, "explanation": "骨法用筆は書の骨格を形成する筆遣いの基本技術を意味し、線の強弱やメリハリにより書全体の構造的な強固さを生み出す。"}, {"question": "宋代の書道評価において、蘇軾の書が高く評価された理由として最も適切なものは？", "choices": ["書体の整然とした均整美の追求", "書風の自由奔放さと詩的表現の融合", "伝統的な筆法の硬直的な復活", "墨色を極端に抑えた淡墨表現の完成"], "answer": 1, "explanation": "蘇軾は自由奔放な筆法と詩的感性を融合させ、書を単なる文字の伝達手段から高度な芸術表現へと昇華させたことで知られている。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
