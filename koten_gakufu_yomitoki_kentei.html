<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古典楽譜読み解き検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古典楽譜読み解き検定</h1>
    <div class="desc">音楽史や古典的な楽譜記号、拍子、演奏法についてのマニアックな知識を問う高難度クイズ。専門的な視点から古典楽譜の理解を深めます。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "バロック時代の楽譜で用いられる「オルナトゥーラ」とは何を指すか？", "choices": ["装飾音を示す符号の一種で、演奏に装飾的な音を加える指示", "指定された楽器の調弦方法の記号", "新しい楽曲の始まりを示す符号", "演奏速度が急激に変化する箇所を示す標識"], "answer": 0, "explanation": "オルナトゥーラはバロック音楽で頻繁に用いられる装飾音の総称で、トリルやモルデントなど演奏者に装飾的なニュアンスを付けるための記号です。"}, {"question": "古典期の二分の二拍子（カットタイム）を示す楽譜記号は次のうちどれか？", "choices": ["数字の \"2\" を上下に重ねた記号", "数字の \"6\" を上下に重ねた記号", "数字の \"C\" の上に縦棒がついた記号", "波線のような記号"], "answer": 2, "explanation": "カットタイムは、小節が二分音符2つ分の拍子を表し、Cに縦棒が付いた記号で示されます。通常の4/4拍子の半分の速さを感じさせることもあります。"}, {"question": "古典楽譜で用いられる「アルペジオ記号」とは演奏者に何を指示するか？", "choices": ["和音を同時に演奏せず、音を連続して短く弾く指示", "指定の楽器を特定の調子に調律すること", "演奏者に音量を急激に落とす指示", "リズムを数える速度を変える標識"], "answer": 0, "explanation": "アルペジオ記号は和音の音を一瞬ずつ上や下へ連続して弾くことを意味し、和音を一度にではなく順次演奏する技巧を示します。"}, {"question": "18世紀の楽譜で多用された「メヌエット形式」とは何か？", "choices": ["主に3拍子で書かれた優雅で軽快な踊りの形式", "速い4拍子の軍隊行進曲の一種", "自由な変奏曲を伴う組曲の一部", "即興的な二重奏の為の譜面"], "answer": 0, "explanation": "メヌエットは18世紀の宮廷舞踏会で人気があった3拍子の曲で、優雅かつ形式的な踊りの特徴を持つ楽曲形式の一つです。"}, {"question": "古典楽譜に見られる「セーニョ（𝄋）」の役割は何か？", "choices": ["反復の基点を示して、演奏の繰り返し箇所を指定する記号", "音程が半音上がることを示す修飾記号", "特定のリズムパターンに入る合図", "楽器の持ち替えを指示する記号"], "answer": 0, "explanation": "セーニョは楽譜内の特定箇所を示し、D.C.（ダ・カーポ）などの指示がある場合にここに戻って繰り返すための目印とする記号です。"}, {"question": "18世紀の楽譜における「トリル」の書き方として最も一般的なものはどれか？", "choices": ["トリルは \"tr\" と書き、上の音と素早く交互に演奏する指示", "斜めの波線のみの記号で音の長さのみを示す", "数字で指定された特定の音を強調する即興指示", "楽譜の最後にまとめて記された追加情報の一種"], "answer": 0, "explanation": "トリルは「tr」と略して書かれることが多く、主音とその上の音を素早く交互に演奏する装飾音を表します。"}, {"question": "古典楽譜の拍子記号「6/8拍子」は一般的にどのような拍の感じを持つか？", "choices": ["一小節を三拍の強弱のリズムで感じる複合拍子", "単純に六つの等しい8分音符を持つ等拍子", "一拍目が強く二拍目が弱い二拍子", "不規則にアクセントが入る自由拍子"], "answer": 0, "explanation": "6/8拍子は3拍の複合拍子で、各拍は2つの8分音符で構成され、一拍毎に強弱のリズム感を持ちます。"}, {"question": "バロック期の演奏法で「スフォルツァンド（sfz）」が示す意味は何か？", "choices": ["突然強く強調して音を演奏せよという指示", "急激に音を弱くする装飾", "音色を変えて倍音を増やす弓の使い方", "続けて同じ音を素早く反復演奏せよの指示"], "answer": 0, "explanation": "スフォルツァンドは突然強く音を出すことを意味する演奏記号で、楽曲内でのアクセントや感情の起伏を際立たせます。"}, {"question": "古典楽譜の「リタルダンド（rit.）」記号は何を演奏者に指示するか？", "choices": ["演奏速度を徐々に遅くすること", "演奏を一瞬止めて間を持たせること", "急に速く演奏を進めること", "強弱の変化を激しくすること"], "answer": 0, "explanation": "リタルダンドは徐々に演奏速度を遅くしていく指示で、曲の最後や感情的な部分によく用いられます。"}, {"question": "古典期の楽譜で使われる「フェルマータ（𝄐）」は何を意味するか？", "choices": ["その音符や休符を指定されたより長く伸ばして演奏する指示", "次の小節に急いで移る合図", "楽器の音色を変える効果音の指示", "左手で弦を押さえる位置を示す符号"], "answer": 0, "explanation": "フェルマータは音符や休符の上に置かれ、そこを通常より長く引き伸ばして音を伸ばす演奏指示です。演奏者の解釈に委ねられる余地があります。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
