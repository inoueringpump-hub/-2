<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>戦国時代武具設計検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>戦国時代武具設計検定</h1>
    <div class="desc">武具の構造や製造技術、戦術的応用にまつわる知識を問う、難易度最高レベルのクイズです。マニアックな視点で戦国時代の武具設計に迫ります。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "戦国時代に使用された火縄銃の火縄の材質で、最も耐久性が高く燃えにくいものはどれか？", "choices": ["綿糸に松脂を塗布したもの", "麻糸を密に編んだもの", "生皮を用いたもの", "藤蔓を乾燥させて編んだもの"], "answer": 0, "explanation": "戦国期の火縄銃に用いられた火縄は、綿糸に松脂を塗布し耐久性と火持ちを高めていた。麻糸や生皮は水に弱く、藤蔓は耐火性で劣るため実用には適さなかった。"}, {"question": "日本の戦国甲冑における『篭手（こて）』の役割として最も適切なのはどれか？", "choices": ["手を保護しつつ矢や打撃に耐える防護", "肩関節の可動域を広げるための装飾", "胸部を覆い敵の刀を受ける防板", "足首の可動を補助する革紐"], "answer": 0, "explanation": "篭手は手首や手の甲を覆い、防御力を持たせる部品である。肩関節や胸部を覆うのは胴丸や肩当、足首の装飾は脚絆が担う。"}, {"question": "戦国時代の槍の先端に多く見られる、『柳葉型』の槍頭が重視した設計思想は何か？", "choices": ["刺突のみならず切断も可能な多機能性", "矢を受け流すための曲線構造", "槍の重量を軽減するための空洞設計", "敵兵の鎧を貫くため硬度強化"], "answer": 0, "explanation": "柳葉型槍頭は刃部分が広がっており、刺突だけでなく斬撃も可能にする多機能性を持つ設計であった。曲線や空洞は別の意図で設計された。"}, {"question": "戦国期の鎧製造における『革紐通し（かわひもとおし）』の主な目的は何か？", "choices": ["各小札を結合ししなやかな防護を実現するため", "装飾性を高めるための彩色用", "敵の刃を滑らせる特殊加工", "重量を均等に分散させる金属補強"], "answer": 0, "explanation": "革紐通しは複数の小札（こざね）を結びつけ、可動性を確保しつつ防御力を維持するための基本技術である。"}, {"question": "戦国時代の軍配（ぐんばい）において、知将が最も重視した機能は何か？", "choices": ["軍勢への声の通達と視覚的指示の明確化", "敵兵の動きを妨害するための武器化", "武士の階級を示す徽章の役割", "火縄銃の点火補助道具としての使用"], "answer": 0, "explanation": "軍配は部隊指揮者が手に持ち、合図の視覚・聴覚信号を兼ねることで戦場での命令伝達を容易にした器具である。"}, {"question": "戦国時代の弓矢の製造技術で、強靭かつしなやかな弓を生み出すために重要視された素材組成は何か？", "choices": ["漆塗りの竹材と牛角の複合構造", "単一のヒノキ材による削り出し", "鉄製の裏打ちを施した木材", "鹿の皮を巻いた木製筒"], "answer": 0, "explanation": "戦国期の弓は竹のしなやかさと牛角の硬度を組み合わせ、漆塗りで防水性と耐久性を持たせる複合素材構成が特徴的であった。"}, {"question": "戦国武士の鉄製脛当て（すねあて）において、負担軽減のために採用された構造的工夫は何か？", "choices": ["関節部に革紐の蝶番を設け可動性を確保", "鋲を打ち込み防御力を集中", "鋼鉄製で一枚板の均一設計", "内部に鉛を入れて重量化"], "answer": 0, "explanation": "脛当ては革紐を蝶番状に用いて可動域を確保、換言すると装着者の足の動きを妨げず防御力を維持する工夫があった。"}, {"question": "戦国時代の銃砲設計で、火皿（ひさら）の重要ポイントは何か？", "choices": ["火薬の安定燃焼と火縄の確実な発火点保持", "装填速度向上のための形状", "銃身の冷却効果向上", "煙排出の効率化"], "answer": 0, "explanation": "火皿は火縄銃の火薬を保持し、火縄からの火花で確実に点火させる部分であり、その形状と材質は燃焼安定性に直結した。"}, {"question": "戦国時代の刀剣製造において、『折れにくさ』を実現するための代表的な鍛造法は何か？", "choices": ["鋼と軟鉄を組み合わせた地鉄と刃鉄の複合鍛造", "全鋼一体鍛造による均一硬度化", "純鉄を焼き入れのみで硬化", "青銅との合金化"], "answer": 0, "explanation": "鎬造りなどで硬度の高い刃鉄と粘り強い地鉄を組み合わせることで、折れにくさと切れ味のバランスを実現した。"}, {"question": "戦国時代の兵装における『前立て』の実用的な機能は何か？", "choices": ["敵味方の識別を容易にし士気を高める識別標識", "頭部の防御を強化する金属製付属品", "矢を防ぐための布製防護", "火縄銃の装填補助具"], "answer": 0, "explanation": "前立ては兜の正面に飾られ、部隊間での識別や個人の威厳を示し、戦場での混乱を防ぐ役割があった。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
