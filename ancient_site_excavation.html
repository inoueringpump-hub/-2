<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古遺跡発掘技術検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古遺跡発掘技術検定</h1>
    <div class="desc">考古学の発掘技術、地層学、遺物分析に関する高度な知識を問うマニアックなクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "放射性炭素年代測定法で年代の推定に用いられる炭素同位体はどれか？", "choices": ["炭素-12（12C）", "炭素-13（13C）", "炭素-14（14C）", "炭素-15（15C）"], "answer": 2, "explanation": "放射性炭素年代測定には炭素-14（14C）が用いられます。これは大気中に微量存在し、生物が含む炭素の一種で、半減期約5730年の放射性同位体です。"}, {"question": "発掘現場で層位学的に最も新しい層はどの位置に存在するか？", "choices": ["最も深い層", "中央の層", "最も浅い層", "水平に混入した層"], "answer": 2, "explanation": "層位学では原則として地層は下から上へ形成されるため、最も浅い層が最も新しい層になります。"}, {"question": "遺物の破片同士を繋げる技術で、形状を復元する方法を何というか？", "choices": ["錐体分析法", "接合復元法", "磁気共鳴法", "同位体比測定"], "answer": 1, "explanation": "接合復元法は遺物の破片を形や模様で照合し、元の形状へと復元する考古学的技術です。"}, {"question": "地層の堆積順序を考慮して、地層中の遺物の年代推定を何というか？", "choices": ["層位学的年代測定", "熱年代測定", "水分含有量分析", "元素分析"], "answer": 0, "explanation": "層位学的年代測定は地層の堆積順序（層位）を基にして、遺物や遺構の相対的年代を推定します。"}, {"question": "発掘作業中に遺物の破損を防ぐため、使用される微細な洗浄方法は何か？", "choices": ["超音波洗浄", "エタノール注入洗浄", "微細ブラシ洗浄", "化学薬品溶解除去"], "answer": 2, "explanation": "微細ブラシ洗浄は発掘時に遺物周辺の土を慎重に除去する方法で、破損リスクを最小にします。"}, {"question": "古代の土器分析において、焼成温度を推定する際に利用される技術はどれか？", "choices": ["赤外分光分析（FTIR）", "電気伝導度測定", "X線結晶解析", "熱分析（TG-DTA）"], "answer": 3, "explanation": "熱分析（熱重量分析や示差熱分析）は土器の焼成温度や組成変化を推定できる技術です。"}, {"question": "地層の断面を詳細に記録する際、標準的に使われる記録用紙は何というか？", "choices": ["ストラティグラフ用紙", "セクショングリッドシート", "フィールドノート", "プロファイル図用紙"], "answer": 0, "explanation": "ストラティグラフ用紙は地層の層理を詳細に描き記録するための専用用紙です。"}, {"question": "発掘地点周辺の磁場変動を測定し、過去の石造物配置を推定する方法は？", "choices": ["考古地磁気調査", "音波探査法", "電気抵抗探査", "地震波探査"], "answer": 0, "explanation": "考古地磁気調査では遺跡周辺の磁場変動を検出し、地中の埋没構造や石造物の存在を推測します。"}, {"question": "遺跡の層序形成に影響を与え、考古学的解釈を複雑にする自然現象はどれか？", "choices": ["ワーキング加工", "生物攪乱（バイオタービング）", "人為攪乱", "鉱物風化"], "answer": 1, "explanation": "生物攪乱（バイオタービング）は動物の掘削活動などによって地層が撹乱され、層序解釈が困難になる現象です。"}, {"question": "土器や石器の研磨面を観察し、製作技術や使用痕を解析する顕微鏡観察法は？", "choices": ["偏光顕微鏡観察", "走査型電子顕微鏡（SEM）観察", "蛍光顕微鏡観察", "位相差顕微鏡観察"], "answer": 1, "explanation": "走査型電子顕微鏡（SEM）は高倍率で表面の微細構造を観察でき、表面の摩耗や加工痕、使用痕を詳細に解析可能です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
