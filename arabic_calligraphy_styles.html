<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アラビア書道様式検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>アラビア書道様式検定</h1>
    <div class="desc">イスラム文化に深く根ざしたアラビア書道の技法や装飾文様に関する高度な知識を問うマニアックなクイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "アラビア書道の主要な書体の一つで、均一な線幅と幾何学的な形で知られる書体は何ですか？", "choices": ["ナスフ体", "ルクア体", "クフ体", "ディーワーニー体"], "answer": 2, "explanation": "クフ体は7〜8世紀に発達した幾何学的で直線的な書体で、初期イスラム写本や建築装飾によく使われました。線幅が均一で角張った特徴があります。"}, {"question": "イスラム書道で装飾的に使用される、アラビア文字を連続的に繰り返し図案化したパターンを何と呼ぶ？", "choices": ["ティルミーム", "アラベスク", "ムカッナス", "タズリーブ"], "answer": 1, "explanation": "アラベスクは植物的なモチーフと共にアラビア文字を連続的に装飾的に繰り返す模様を指し、イスラム美術の代表的装飾様式です。"}, {"question": "ディーワーニー書体は特にどのような用途で歴史的に重用されましたか？", "choices": ["宗教写本の本文用", "王室の公式文書用", "詩文の装飾用", "碑文用"], "answer": 1, "explanation": "ディーワーニーは16世紀にオスマン帝国で発展し、流麗な曲線と装飾的な線が特徴で、主に王室の公式書類や布告に用いられました。"}, {"question": "ティルスィールはアラビア書道の用語で何を意味しますか？", "choices": ["文字の飾り線や終筆の装飾", "新しい書体の名前", "特定の筆の種類", "写本の修復技法"], "answer": 0, "explanation": "ティルスィールは文字の終わりや角に施される装飾的な線で、文字の美観を高めるために加えられる繊細な飾りを指します。"}, {"question": "イスファハーンで発展したとされる、柔らかい曲線と優雅な装飾で特徴づけられる書道スタイルは何ですか？", "choices": ["ナスフ体", "タリーク体", "サルスル体", "ルクア体"], "answer": 1, "explanation": "タリーク体は16世紀ペルシャで発展し、柔軟な曲線と装飾を多用した優雅なスタイルで、詩歌や宮廷文書に好まれました。"}, {"question": "イスラムの幾何学模様でしばしば文字と組み合わされる、反復される対称的な装飾パターンを何といいますか？", "choices": ["ムカルナス", "アラベスク", "ズィルスティール", "カリグラフィックモザイク"], "answer": 1, "explanation": "アラベスクは花や葉の模様を反復させるデザインとともに、しばしば書道の文字装飾にも用いられ、イスラム美術の核心的パターンです。"}, {"question": "ほとんどのアラビア書道では縦横の比率が重視される筆記具は何ですか？", "choices": ["竹製の細筆", "切り出した葦のペン（カラム）", "動物毛の筆", "金属製ペン先"], "answer": 1, "explanation": "カラムは葦を削って作られ、線の太さと傾斜によって文字の美しさを調整するために重要な筆記具です。特に縦横比を保つことが求められます。"}, {"question": "イスラーム文化圏で文字の意味を隠し装飾的に配置した図案を何と呼ぶ？", "choices": ["ミージャン", "ヒヤーム", "カリグラフィックアート", "クフ式レリーフ"], "answer": 2, "explanation": "カリグラフィックアートは、文字の意味を装飾的に変形・配置し、芸術的図案として表現したもので、イスラーム美術の一様式です。"}, {"question": "アラビア書道の伝統で、文字の比率や角度を定めた体系的な規則をまとめたものは何と呼ばれる？", "choices": ["ワルカ書法", "キターブ・アル＝ハッスーブ", "バスター数理", "アル＝ハカマート"], "answer": 1, "explanation": "キターブ・アル＝ハッスーブはレイアウトや文字比率を計算した伝統的な書法体系のことを指し、美しいアラビア文字の設計基準となります。"}, {"question": "アラビア書道における「ハイル」は何を指しますか？", "choices": ["ある書体の名前", "文字の連結部分の装飾", "特定の筆使いの技法", "写本の署名欄"], "answer": 1, "explanation": "ハイルは文字間や連結部分に施される波状や渦巻き状の装飾線で、全体の調和と美しさを引き立てる役割があります。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
