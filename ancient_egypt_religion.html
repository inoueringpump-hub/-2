<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古代エジプト宗教検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古代エジプト宗教検定</h1>
    <div class="desc">エジプト神話の神格から宗教儀式、壁画の象徴解釈まで、古代エジプトの宗教世界を深掘りする高難易度問題10問。専門的知識を試すための本格的な内容です。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "オシリス神が司っていたとされる主な役割はどれですか？", "choices": ["太陽の昇る方角を守る神", "冥界の王であり死者の復活を司る神", "ナイルの氾濫を制御する水の神", "天空の星を記録する神官の守護神"], "answer": 1, "explanation": "オシリスは古代エジプトの冥界の王であり、死者の復活と来世の審判を司る神として信仰されました。ナイルや天文学の神ではありません。"}, {"question": "『死者の書』におけるハートの重さを量る儀式の目的は何ですか？", "choices": ["生前の罪の重さを判断し、死後の裁きを決定するため", "死者の魂が冥界に入る適性を評価するため", "ファラオの即位権を神に認めさせるための儀式", "壁画に祈りを描く際の正確な方角を定めるため"], "answer": 0, "explanation": "『死者の書』に描かれるハートの重さを量る儀式（アンビュテライトの審判）は、生前の行いによる罪の重さを正義の女神マアトの羽と比較し、死後の裁きを決める重要な宗教的意味を持ちます。"}, {"question": "古代エジプト神話において、ラー神の役割として最も正しいものはどれか？", "choices": ["夜の道を統べる主神", "冥界の審判官", "太陽神として日々天空を航行する神", "大地の収穫を豊かにする神"], "answer": 2, "explanation": "ラーは太陽神であり、日々天空を船で航行し太陽を運ぶ姿で信仰された古代エジプトの主要な神の一つです。"}, {"question": "ホルス神が象徴するものは何か？", "choices": ["天空と王権の象徴", "死後の世界の守護者", "農耕と豊穣の守護神", "医療と知識の神"], "answer": 0, "explanation": "ホルスは天空神であり、特に王権を象徴する鷹の頭を持つ神です。王がホルスの化身とされ、権力の正当性を示しました。"}, {"question": "ファラオの壁画に頻繁に描かれる「アンケセナーメンが太陽神アテンに祈っている場面」の意味合いは何か？", "choices": ["地上の平和を祈願する民衆の姿を示すため", "王が神の加護を受けて統治する正当性を示すため", "神官階級の権力を誇示するため", "貴族の婚姻儀礼を表す象徴的意味"], "answer": 1, "explanation": "ファラオが太陽神アテンに祈る描写は、王権の正当性や神聖なる支配権を神から授かっていることを象徴的に示す宗教的イメージです。"}, {"question": "古代エジプトのミイラ作製において、心臓（ハート）が取り除かれなかった理由は何か？", "choices": ["ハートは死者の知恵を司る臓器だと考えたため", "死後の審判で必要な魂の秤量に使われると信じられたため", "ミイラ化における技術的制約によるもの", "ナイル川の水質による腐敗防止のため"], "answer": 1, "explanation": "心臓は『死者の書』の死後審判において魂の重さを量る重要な臓器とされたため、ミイラ作製時に取り除かれず残されました。"}, {"question": "セシェト神（書記女神）の主な役割はどれか？", "choices": ["戦争を支配し勝利をもたらす神", "文字と記録、知識を司る女神", "豊穣と生産の神", "天空を守る女神で雷を司る"], "answer": 1, "explanation": "セシェトは古代エジプトで文字や書記、記録の女神として崇拝されました。知識の守護神として重要視されています。"}, {"question": "古代エジプトの祭祀において、ホルス像が王の頭上に置かれる儀式は主に何を意味するか？", "choices": ["王の子孫繁栄を願う儀式", "王が天空の神の庇護を受けることを示す即位式", "農耕の豊作を祈願する儀式", "ナーイル川の氾濫を制御する儀式"], "answer": 1, "explanation": "ホルスは王権の象徴であり、ホルス像が王の頭上に置かれる即位式は、王が神の庇護を受けて統治する正当な存在であることを示す儀式でした。"}, {"question": "エジプトの死者の書に描かれる『アヌビス神』の役割は何か？", "choices": ["死者の魂を冥界へ導くジャッカルの頭の神", "ナイルの氾濫を司る水神", "太陽の運行を助ける神官長の守護者", "天空を支配する最高神"], "answer": 0, "explanation": "アヌビスはジャッカルの頭を持つ死者の霊魂を死後の世界へ導き、ミイラ作りの神として崇拝されました。"}, {"question": "ラムセス２世が建てた大型神殿アブ・シンベルの壁画における主要な宗教的意味は何か？", "choices": ["太陽神ラーへの奉納と王の神格化を示すため", "農耕儀礼の様子を神に報告するため", "死者の魂が天へ昇るための祈りを描くため", "ナイル川の氾濫予測の記録"], "answer": 0, "explanation": "アブ・シンベル神殿の壁画は主に太陽神ラーへの奉納を示し、同時にラムセス２世自身の神格化と権威の誇示を宗教的に表現しています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
