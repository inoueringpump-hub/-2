<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>宇宙真空物理検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>宇宙真空物理検定</h1>
    <div class="desc">宇宙空間環境や真空中の物理現象、プラズマ物理、分子運動論に関する高度な問題に挑戦し、専門的な知識を深めるクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "宇宙空間の真空中で起こるアウトガス現象の主な原因は何ですか？", "choices": ["太陽風のプラズマ衝撃による材料表面の損傷", "物質の熱運動による絶縁体内の微量ガス放出", "宇宙線の高エネルギー粒子による材料原子の崩壊", "真空中での化学反応による新たな気体の生成"], "answer": 1, "explanation": "アウトガスとは、真空中の材料内部に含まれる微量のガス分子が熱エネルギーなどにより放出される現象であり、宇宙空間での熱膨張や照射で促進される。"}, {"question": "プラズマ環境下でのイオン・中性粒子の運動に最も影響を与える力は何ですか？", "choices": ["重力加速度による引力", "電磁場によるローレンツ力", "分子間斥力", "コリオリの力"], "answer": 1, "explanation": "プラズマ中の荷電粒子は電磁場の影響を強く受け、ローレンツ力（電場と磁場による力）が粒子運動の主要因となる。"}, {"question": "宇宙空間の極度の真空状態で分子運動論的に考えると平均自由行程はどうなるか？", "choices": ["極端に短くなる", "変わらず一定の値を持つ", "極端に長くなる", "無限に近い値にはならない"], "answer": 2, "explanation": "真空度が非常に高い宇宙空間では分子密度が極端に低いため、分子同士の衝突頻度が減り平均自由行程が非常に長くなる。"}, {"question": "宇宙真空中プラズマのデバイス設計で重要となるパラメータはどれか？", "choices": ["真空度（圧力）", "プラズマ密度とエネルギー分布", "材料の熱伝導率", "機体表面の粗さ"], "answer": 1, "explanation": "プラズマ密度と粒子のエネルギー分布はプラズマの挙動制御に直結し、宇宙環境デバイスの性能設計で不可欠なパラメータである。"}, {"question": "宇宙空間の真空における熱伝達で最も支配的なメカニズムは何か？", "choices": ["対流熱伝達", "伝導熱伝達", "輻射熱伝達", "コンベクション熱伝達"], "answer": 2, "explanation": "宇宙真空中では物質の存在がほとんどないため、熱は主に電磁波の輻射を通じて伝わる。対流や伝導はほとんど発生しない。"}, {"question": "宇宙真空中で起こる分子の脱着現象とは何を指すか？", "choices": ["分子が材料表面に吸着する過程", "気体分子が固体材料から放出される過程", "プラズマによる分子の電離", "分子が他の分子と反応し結合する現象"], "answer": 1, "explanation": "脱着は材料表面上の分子が吸着したり、外部の作用により放出されたりする現象で、真空中の表面特性に重要な影響を与える。"}, {"question": "宇宙空間内のプラズマで発生しやすい揺らぎ現象はどれか？", "choices": ["ブラウン運動", "プラズマ波動（アルフヴェン波）", "熱拡散現象", "静電気力"], "answer": 1, "explanation": "プラズマ中では複雑な磁場と流体の振動が生じ、アルフヴェン波などの波動が代表的な揺らぎ現象である。"}, {"question": "真空中の分子運動論を用いた場合、圧力pと分子運動速度の関係を表す式で正しいものは？", "choices": ["p=nkT（nは分子数密度、kはボルツマン定数）", "p=ρv（ρは密度、vは速度）", "p=F/A（Fは力、Aは面積）", "p=mv^2/2（mは質量、vは速度）"], "answer": 0, "explanation": "理想気体の圧力は分子数密度n、ボルツマン定数k、温度Tに依存し、p=nkT で表される。"}, {"question": "宇宙真空中でしばしば発生する磁気リコネクション現象は何を指すか？", "choices": ["磁場のエネルギーが熱に変換される過程", "磁気モーメントの消失過程", "電場が磁場に変換されること", "プラズマ中の分子間結合"], "answer": 0, "explanation": "磁気リコネクションは磁場の配置が変化し、そのエネルギーがプラズマの加熱や運動エネルギーに変換される物理現象である。"}, {"question": "宇宙空間における真空の定義として最も適切なのは？", "choices": ["分子密度が地上大気の約1億分の1以下の状態", "完全に分子が存在しない空間", "圧力がゼロの理想状態", "プラズマが存在しない空間"], "answer": 0, "explanation": "実際の宇宙真空は完全な分子ゼロではなく、分子密度が非常に低い状態であり、地上大気に比べ約10^-8以下になることが多い。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
