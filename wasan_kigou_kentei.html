<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>和算記号検定クイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>和算記号検定クイズ</h1>
    <div class="desc">和算の数学記号や用語、計算法に関するマニアックな知識を問う難易度5の検定クイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "和算における「割符（わりふ）」という記号は何を表しますか？", "choices": ["平方根を表す符号", "割り算や分数を示す符号", "加減算の優先順位を示す記号", "無限大を表す記号"], "answer": 1, "explanation": "割符は和算で分数や割り算を表す際に用いられた記号で、数の割り算関係を示すために使われました。"}, {"question": "江戸時代の和算家が使用した「開平算」はどのような計算方法ですか？", "choices": ["三角関数の近似計算法", "立方根を求める計算法", "平方根を近似的に求める計算法", "対数を用いた計算法"], "answer": 2, "explanation": "開平算は平方根を求める際の和算独自の計算法で、現代の平方根の近似計算法と類似点があります。"}, {"question": "和算の数学記号「□」が意味するものは何か？", "choices": ["未知数や変数を表す記号", "二乗の計算を意味する記号", "和を示す記号", "積分の概念を記した記号"], "answer": 1, "explanation": "和算では□を未知数や変数の代わりとして用いることが多く、方程式の解を求める際に使用されました。"}, {"question": "「天元術（てんげんじゅつ）」は和算においてどのような技術ですか？", "choices": ["多項式の一次方程式を解く技法", "円周率の近似値を求める法則", "多項式方程式の係数を操作する代数技術", "微分積分の基礎理論"], "answer": 2, "explanation": "天元術は多項式の係数を操作して未知数の解を求める和算独特の代数手法で、現代の代数方程式理論に近い考え方です。"}, {"question": "和算用語の「勾股算（こうこさん）」は何を意味しているか？", "choices": ["三角関数の計算方法", "ピタゴラスの定理の応用計算法", "円周の長さの測定法", "数列の和を求める方法"], "answer": 1, "explanation": "勾股算はピタゴラスの定理に基づく勾配と直角三角形の辺の長さ計算を指し、土地測量などで用いられました。"}, {"question": "和算記号「〻」の用途は何を示すか？", "choices": ["反復や累乗を表す記号", "割り算の簡略記号", "負の数を示す符号", "方程式の結合法則表示"], "answer": 0, "explanation": "〻は和算で複数回の繰り返し計算や累乗を示す符号として使われ、計算の簡略化に寄与しました。"}, {"question": "和算で使われた記号「+」「−」はどのように導入されたか？", "choices": ["中国の数学書を通じて", "西洋の算術書により江戸時代後期に", "平安時代の和算古典から", "奈良時代の律令制数学書に由来"], "answer": 1, "explanation": "「+」「−」の記号は和算が発展した江戸時代後期、西洋の算術書が伝わり取り入れられるようになりました。"}, {"question": "和算における「算木（さんぎ）」とは何か？", "choices": ["計算をするための木製の道具", "計算式を書き記す帳面", "数値を表す特別な記号", "数学理論の書籍名"], "answer": 0, "explanation": "算木は数値や数列を視覚的に表現するための、木製の小さな棒で、計算や教示に用いられました。"}, {"question": "和算で用いられた「重立法」とは何のための方法か？", "choices": ["多重方程式を組み合わせて解く技法", "積分の近似計算方法", "微分方程式の初歩的解法", "確率の計算手法"], "answer": 0, "explanation": "重立法は複数の方程式を同時に解くための方法で、連立方程式の解法に当たります。"}, {"question": "和算における「天元符（てんげんふ）」の記号は何を意味していたか？", "choices": ["方程式の未知数を示す記号", "無限大を表す数学記号", "割り算を意味する符号", "比率や比例を示す記号"], "answer": 0, "explanation": "天元符は未知数を表現するために使われ、方程式の元となる変数の位置を示す重要な符号でした。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
