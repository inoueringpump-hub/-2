<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古典魔法書解読検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>古典魔法書解読検定</h1>
    <div class="desc">古代の魔法文献や呪文の構造、神秘学的シンボル、古語の解読に焦点を当てた難易度5の専門的なクイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "古代の魔法書『グリモワール』において、四大元素の符号として伝統的に使われているシンボルはどれか？", "choices": ["丸（○）は水、三角形（▲）は火、四角形（■）は風、五角形（☆）は地", "三角形（▲）が火、逆三角形（▼）が水、三角形に横線（△）が風、四角形（■）が地", "三角形（▲）は火、逆三角形（▼）は水、三角形に横線（△）が地、四角形（■）が風", "1は火、2は水、3は風、4は地を表す記号として使われる"], "answer": 1, "explanation": "伝統的なグリモワールでは三角形が火、逆三角形が水、三角形に横線は風、四角形が地を表すシンボルとして使われています。これは中世の錬金術符号から発展した体系です。"}, {"question": "中世ヨーロッパの魔法文献において、呪文の効果を強化するために使われた「シグイル」とは何か？", "choices": ["魔法のエネルギーを定める魔方陣の形状", "特定の悪霊を召喚する時に唱える呪文の言葉", "魔法効果を象徴的に表現した神秘的な紋章や記号", "呪文を記録するための古語で書かれた巻物の名称"], "answer": 2, "explanation": "シグイル（Sigil）は、魔法効果や霊的エネルギーを象徴的に示す図像・紋章であり、その形状は意識的に設計されて呪文の効果を具体化し強化すると考えられています。"}, {"question": "古典呪文の構造に関し、「インカンテーション（Incantation）」とは何を指しているか？", "choices": ["魔法の書に記された呪文の解説文", "呪文を唱えるための特定の言語体系、または呪文文句そのもの", "魔法陣の周辺に描かれる装飾的な図案", "魔法効果を妨害するための逆呪文のこと"], "answer": 1, "explanation": "インカンテーションとは呪文を唱えるための言語的要素であり、特定の言葉やフレーズを声に出して発することで魔法効果を発現させることを指します。古典魔法ではその発音や言語が極めて重要視されます。"}, {"question": "ヘルメス文書『エメラルドタブレット』における有名な格言「上は下の如く、下は上の如し」が示す意味は何か？", "choices": ["宇宙の神秘的結合と密接な対応関係の法則を示す", "呪文の効果は上下逆に唱えることで強まるという秘訣", "魂と肉体の二元論的対立を表現している", "魔法の力は昼と夜で異なるという神秘学的真実"], "answer": 0, "explanation": "この格言は宇宙のあらゆる階層が対応し合い、一体となっているという神秘主義の基本原則であり、特に錬金術や魔術の根底にある宇宙論的な考え方を表しています。"}, {"question": "古語に頻出する魔法用語「アブラカダブラ」の起源とされる説として、最も信憑性が高いものはどれか？", "choices": ["ギリシャ語の「abraxas（アブラクサス）」から派生した魔力を込める言葉", "サンスクリット語で「創造」を意味する言葉そのまま", "エジプトの呪術書に記載された精霊の名前", "中世ラテン語で「力を集結させる」という意味の造語"], "answer": 0, "explanation": "「アブラカダブラ」は古代ギリシャの魔術用語「abraxas」に由来すると考えられ、これは神秘的な力を宿す言葉として呪文に転用されました。多くの魔術書でこの起源が支持されています。"}, {"question": "中世魔法書において「ペンタグラム（五芒星）」が逆さに描かれた時に一般的に象徴するとされる意味は何か？", "choices": ["守護と清浄の象徴を強める護符", "悪霊召喚や混沌をもたらすものとして忌避される象徴", "豊穣と繁栄を願う祝福の徴", "火星神への崇拝を示す儀式用記号"], "answer": 1, "explanation": "五芒星を逆さに描くことはしばしば悪魔的・混沌的な力を象徴し、悪霊召喚や反キリスト的な意味合いを持つとして中世以降の魔法文献で忌避されてきました。"}, {"question": "古典魔法文献で頻出する「アルファベット魔術（アストロロジカル・アルファベット）」とは何か？", "choices": ["星座の形状から作られた文字体系を使った呪文書記法", "各文字に天体や惑星の象徴的意味を対応させる魔法理論", "文字の逆読みを利用した呪文の暗号技術", "霊的存在から伝授されたとされる失われた古代文字"], "answer": 1, "explanation": "アルファベット魔術は文字それぞれに太陽や月、金星など天体の属性や神秘的象徴を割り当て、その組み合わせで魔法効果を狙う理論で、錬金術や占星術に結びついています。"}, {"question": "呪文の詠唱時に用いられる言語「エノキアン」は誰が16世紀に体系化したとされるか？", "choices": ["ジョン・ディーとエドワード・ケリー", "ニコラス・フラメル", "パラケルスス", "コルネリウス・アグリッパ"], "answer": 0, "explanation": "エノキアン言語は16世紀のイギリスの数学者・錬金術師ジョン・ディーと彼の媒介者エドワード・ケリーによって体系化されたとされ、天使からの啓示として知られています。"}, {"question": "古代魔法書に記される「カバラ」体系において、10のセフィロトは何を象徴しているか？", "choices": ["根源的宇宙の属性や神の10の側面", "10種類の魔法元素", "魔法結社の階級制度", "10の呪文成分"], "answer": 0, "explanation": "カバラのセフィロトとは、神の本質を10の異なる属性に分けた神秘学的な体系で、魔術や霊性の研究において中心的な役割を果たしています。"}, {"question": "古代呪文で用いられる「テトラグラマトン（四文字神名）」とは何か？", "choices": ["四つの元素を組み合わせた呪文", "ヤハウェの神名であり、神聖不可侵とされる四文字のヘブライ語", "魔法円の四方を守る四天使の象徴", "古代呪文を解読するための鍵の暗号"], "answer": 1, "explanation": "テトラグラマトンはヘブライ語で神の名前ヤハウェ（יהוה）を構成する4文字を指し、ユダヤ教及び秘教の伝統で最も神聖な名前として呪文や儀式で重要視されています。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
