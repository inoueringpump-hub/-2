<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>万年筆ニブ検定 初級編</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>万年筆ニブ検定 初級編</h1>
    <div class="desc">万年筆のニブに関する基礎知識を問う、初心者向けマニアッククイズ10問です。ニブの種類や製造法、書き味に関する専門用語を学べます。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "万年筆のニブに使われる材料として最も一般的なのは何ですか？", "choices": ["ステンレススチール", "純銀合金", "銅合金", "チタン合金"], "answer": 0, "explanation": "万年筆のニブでは耐久性とコストのバランスからステンレススチールが最も広く使用されています。純金ニブもありますが高価で、銀や銅合金は一般的ではありません。"}, {"question": "「モンブラン」などでよく見られる14金や18金のニブの魅力は？", "choices": ["耐摩耗性の高さ", "しなやかな弾力と経年変化による書き味の向上", "最も硬い素材であること", "非磁性の特性"], "answer": 1, "explanation": "金のニブはしなやかで弾力があり、使い込むほどに書き味が良くなる経年変化が魅力で、多くの高級万年筆に使われています。"}, {"question": "ニブの先端に取り付けられ、紙との摩擦を和らげる小さな球状のパーツは何と呼ばれる？", "choices": ["ペンポイント", "インクフィーダー", "カートリッジ", "シャフト"], "answer": 0, "explanation": "ペンポイントはニブの先端にある小さな球状の部分で、書き味の滑らかさと耐久性を担います。"}, {"question": "ニブの形状のうち、筆圧の強弱で線の太さが変わる特徴があるのはどれ？", "choices": ["フレキシブルニブ", "ファインニブ", "ブロードニブ", "ステュビーニブ"], "answer": 0, "explanation": "フレキシブルニブはしなりを持っていて、筆圧に応じて線の太さが変わるため、筆文字のような表現が可能です。"}, {"question": "ニブ製造工程で、先端のペンポイントを硬く耐久性を持たせるために施す伝統的な処理は何？", "choices": ["ロジウムメッキ", "焼結処理", "金属針圧打ち加工（ラウンドニング）", "電気めっき"], "answer": 2, "explanation": "ラウンドニング（先端球状化）はニブ先端を小さな金属球で圧着し耐摩耗性を高め、滑らかな書き味を実現する伝統的技術です。"}, {"question": "細字用のニブは一般的にどのような特徴を持つ？", "choices": ["先端が広く丸い形状", "先端が細く鋭い形状", "先端に穴がない", "先端に埋め込まれたダイヤモンド"], "answer": 1, "explanation": "細字ニブは先端が細く細かい線が書けるように鋭い形状で作られています。広い形状は太字ニブの特徴です。"}, {"question": "インクフローを安定させるニブ中央の切り込み部分を何という？", "choices": ["スリット", "フィード", "ホール", "トリム"], "answer": 0, "explanation": "スリットはニブ中央の細長い切れ込みで、インクをペンポイントまで導き、インクフローを安定させます。"}, {"question": "ニブの先端のペンポイントに見られる中央の丸い穴は主に何のため？", "choices": ["インクの通り道を確保するため", "飾りとしての意匠", "インク漏れ防止", "寿命表示マーク"], "answer": 0, "explanation": "その丸い穴（ブレイクホール）はスリットの先端にあり、ひび割れを防ぎインクの通り道を安定させる役割を持ちます。"}, {"question": "「アイアンレース」と呼ばれるニブの特徴は？", "choices": ["鉄鋼のように硬いニブ処理技術", "鋭い切れ味を生む特殊形状ニブ", "非常に柔らかく書き味の繊細なニブ", "ニブの装飾に用いられる錬鉄模様"], "answer": 0, "explanation": "アイアンレースは特殊に硬化処理されたニブで、硬度と耐久性に優れた加工技術を指し、硬い書き味の実現に用いられます。"}, {"question": "ニブの表面に金やロジウムをコーティングする目的として最も適切なのは？", "choices": ["見た目の美しさと耐腐食性向上", "重量を増やして安定感を得るため", "摩擦を増加させるため", "インク吸収性を高めるため"], "answer": 0, "explanation": "金やロジウムのコーティングは耐腐食性を上げると同時に高級感あふれる外観を作り出します。摩擦軽減も多少ありますが主目的は耐腐食と装飾です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
