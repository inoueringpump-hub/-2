<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>超伝導物性検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>超伝導物性検定</h1>
    <div class="desc">低温物理と電子ペアリングから磁束ピンニングまで、超伝導の高度な知識を問う難易度5の専門クイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "BCS理論におけるクーパー対形成の主な駆動因子は何か？", "choices": ["電子と格子の相互作用によるフォノン媒介結合", "電子間の直接キャリントン的クーロン斥力", "格子欠陥による電子の局在化効果", "スピン軌道相互作用によるスピン揺らぎ"], "answer": 0, "explanation": "BCS理論では、電子がフォノンを介して有効な引力を持ち、それがクーパー対形成の主体となる。この電子-フォノン相互作用が超伝導の根底にある。"}, {"question": "超伝導体におけるギンツブルグ・ランダウ理論の主要な秩序変数は何か？", "choices": ["超伝導ギャップの位相と大きさを示す複素順序パラメータ", "結晶格子の振動モードの振幅", "電子のスピン密度の分布", "磁束の一様な分布関数"], "answer": 0, "explanation": "ギンツブルグ・ランダウ理論では、超伝導状態を複素数の秩序パラメータψで表す。このパラメータの絶対値の二乗は超伝導電子対の密度に相当する。"}, {"question": "タイプII超伝導体に見られる磁束ピンニングの主な機構は？", "choices": ["格子欠陥や不純物による磁束線の捕捉", "熱揺らぎによる磁束線の拡散", "電子スピンのランダム配向", "単一磁壁形成による磁束閉じ込め"], "answer": 0, "explanation": "タイプII超伝導体では、不純物や欠陥が磁束線（量子化された磁束）を局所的に捕捉し、移動を妨げることでピンニング現象を生じる。これにより超伝導体の臨界電流が増加する。"}, {"question": "超伝導ギャップの対称性がd波の場合、特徴的なエネルギー依存性は？", "choices": ["ノード（ゼロ点）を持ち、低エネルギーでの線形な密度の状態を示す", "完全なギャップで、全エネルギースペクトルでゼロ密度状態", "フェルミ面での電子軌道の非対称分布", "高エネルギー励起状態に尖ったピークが存在"], "answer": 0, "explanation": "d波対称性の超伝導ギャップは角度依存的にゼロになるノードを持ち、そのためゼロエネルギーに近い低エネルギー状態が存在し、線形的な密度の状態が観測される。"}, {"question": "超伝導体におけるジョセフソン効果の基礎となる現象は？", "choices": ["異なる超伝導体間のマクスウェル方程式の境界条件違い", "超伝導波動関数の位相差によるクーパー対のトンネル効果", "電子のスピン状態の非保存過程", "格子振動の非線形共鳴"], "answer": 1, "explanation": "ジョセフソン効果は、2つの超伝導体間に位相差があると、クーパー対がそのバリアをトンネルトンネルし、ゼロ電圧での超伝導電流が流れる現象である。"}, {"question": "超伝導の臨界磁場において第1種と第2種超伝導体の違いは何か？", "choices": ["第1種は臨界磁場で完全排除、第2種は混合状態を形成する", "第1種は常温で超伝導、第2種は低温でのみ超伝導", "第1種はスピン軌道効果が強い、第2種は純粋な電荷移動効果", "第1種はフェルミ液体理論適用、第2種は非フェルミ液体"], "answer": 0, "explanation": "第1種超伝導体は臨界磁場を超えると超伝導が完全に消失するが、第2種超伝導体は低い臨界磁場で部分的に磁束を取り込み混合状態（バルク内部に磁束量子が存在）を作る。"}, {"question": "電子ペアリングでのスピン三重項状態の特徴は何か？", "choices": ["パリティ非対称でスピン角運動量が１の対称状態", "通常のs波超伝導と同様にスピン対消失", "強いクーロン斥力による対形成の阻害", "電子が完全に局在化している状態"], "answer": 0, "explanation": "スピン三重項ペアリングはスピン状態が1であり波動関数の空間対称性も異なるため、空間的に非対称な（例えばp波）対称性を持つ。代表例はSr2RuO4など。"}, {"question": "磁束ピンニングにおけるコアピンニングとは何を指すか？", "choices": ["磁束線の正常コア部分が欠陥に強く結合して動きを妨げる現象", "格子全体の歪みが磁束を押し出す効果", "超伝導対の熱的励起による磁場変動", "磁場が完全に遮蔽される理想状態"], "answer": 0, "explanation": "コアピンニングは磁束線の中心部にある正常導電コアが、材料中の欠陥と相互作用して動きを止める現象であり、超伝導物性に重要な影響を与える。"}, {"question": "超伝導体のペアリング機構の非従来型はどのような特徴があるか？", "choices": ["フォノン媒介以外の電子間相互作用が主な駆動力である", "伝統的なBCS理論と完全に一致する", "常に高温超伝導に限られる", "ペアリングはスピンの完全消失に依存する"], "answer": 0, "explanation": "非従来型超伝導では、フォノンではなくスピン揺らぎや電子間の強相関など他の相互作用によって電子がペアリングされるケースがある。例えば銅酸化物高温超伝導体で見られる。"}, {"question": "低温における超伝導体のテルミン効果の特異性とは？", "choices": ["超伝導状態では電子のエントロピー変化により熱電効果が大幅に低下する", "常温時と同様に通常の熱電材料の挙動を示す", "熱電効果がゼロで厳密に絶縁状態となる", "熱流が完全に電流に変換される"], "answer": 0, "explanation": "超伝導転移により電子の自由度が減少し、電子のエントロピーが変わるためテルミン効果（熱電効果）は大幅に減少または変化を示す。この特性は超伝導に伴う電子状態の変化を示す指標となる。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
