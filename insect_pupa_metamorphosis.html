<!doctype html>

<title>昆虫蛹変態生理検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>昆虫蛹変態生理検定</h1>
    <div class="desc">昆虫の蛹期における変態生理、ホルモン作用、細胞分化に関する高度な知識を問うクイズです。難易度は最上級の5に設定されています。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "昆虫の蛹期において、脱皮と組織再編成を制御する主なホルモンはどれか？", "choices": ["エクジソン（脱皮ホルモン）", "メラトニン（体内時計調整ホルモン）", "アリルアセチルコリン（神経伝達物質）", "ジベレリン（植物成長ホルモン）"], "answer": 0, "explanation": "昆虫の蛹期における脱皮や組織の再構築はエクジソンという脱皮ホルモンによって主に制御される。メラトニンやジベレリンは別の生物のホルモン、アリルアセチルコリンは神経伝達物質である。"}, {"question": "蛹期における細胞分化で、幼虫表皮細胞がどのようにして蛹皮細胞に置換されるか、その主要な機構は？", "choices": ["幼虫表皮細胞のアポトーシスと蛹細胞の増殖による交換", "幼虫表皮細胞の単純増殖転換", "蛹表皮細胞への横方向の直接変態", "表皮細胞の融合と多核細胞化"], "answer": 0, "explanation": "蛹期では幼虫表皮細胞がエクジソン誘導によりアポトーシス（細胞死）し、それと同時に蛹から分化した新しい細胞群が増殖し置換する。単純な増殖や直接変態ではない。"}, {"question": "PTTH（脳下垂体前葉刺激ホルモン）の役割として正しいものは？", "choices": ["プロトルスホルモンの分泌を促進し、エクジソン合成を間接的に誘導する", "蛹化ホルモンの分解を促進し、蛹化を防止する", "神経伝達速度を低下させ、活動休止を誘導する", "細胞内のカルシウムイオン濃度を直接調整する"], "answer": 0, "explanation": "PTTHは内分泌ホルモンで、プロトルスホルモンの分泌を促してエクジソン生成を誘導し、脱皮・変態を開始させる働きを持つ。"}, {"question": "変態完了後の成虫に見られる翅の発達は、蛹期の何によって主に制御されているか？", "choices": ["蛹ホルモンとその誘導する遺伝子発現の調節", "脱皮ホルモンエクジソンの直接的物理的作用", "メチルブチルジオールの神経刺激効果", "幼虫期の栄養ストレスによる細胞死促進"], "answer": 0, "explanation": "蛹ホルモン（JH）濃度の低下とエクジソン刺激により、翅芽の細胞が分化遺伝子を活性化し、翅の完全な発達が進む。"}, {"question": "蛹期の脂肪体細胞における役割として誤っているものは？", "choices": ["エネルギー貯蔵と代謝調整", "ホルモン合成の一部を担当", "直接的な脱皮ホルモン放出", "免疫応答の調節"], "answer": 2, "explanation": "脂肪体はエネルギー貯蔵やホルモン合成の補助、免疫調節に関与するが、脱皮ホルモンを直接放出するのは主に脳神経およびプロトルス腺である。"}, {"question": "蛹化ホルモン（エクジジアリックホルモン）が蛹期に誘導する主な分子的効果は何か？", "choices": ["新規遺伝子の発現誘導と既存組織の脱分化促進", "細胞膜の脂質構成変更による透過性制御", "ミトコンドリア内ATP合成の増加", "細胞骨格の崩壊による形態変化の阻害"], "answer": 0, "explanation": "蛹化ホルモンは特定の遺伝子発現を誘導し、幼虫組織の脱分化・再編成、さらには新組織の分化を促進する。"}, {"question": "蛹の組織で観察される組織再編成における「イマゴ成長器官（imaginal discs）」の役割は？", "choices": ["成虫の外形器官に分化する未分化細胞の集合体", "幼虫における防御用の硬化組織である", "ホルモン産生の中枢として機能する神経節", "栄養貯蔵を担う脂肪細胞群"], "answer": 0, "explanation": "イマゴ成長器官は未分化の細胞群で、これが蛹期に成虫の翅や脚、触角などの外形器官に分化する。"}, {"question": "蛹期のホルモン環境において、幼虫ホルモン（JH）の濃度低下がもたらす影響として適切なものは？", "choices": ["蛹化および成虫への完全変態の誘導", "幼虫形態の維持と脱皮阻害", "産卵行動の強制的誘発", "蛹期の寿命延長"], "answer": 0, "explanation": "幼虫ホルモンの濃度低下は蛹化開始の重要条件であり、その後の成虫への完全な変態を誘導する信号となる。"}, {"question": "蛹変態時における細胞死（アポトーシス）と細胞増殖の関係について最も正しい説明は？", "choices": ["特定の幼虫組織で細胞死が起こる一方、成虫形態の組織は新規に分裂増殖する", "全ての細胞が一斉にアポトーシスし、新たな細胞に完全置換される", "蛹期は増殖細胞が休止し、細胞死のみが進行する", "細胞死は蛹期では起こらず、成虫期に集中する"], "answer": 0, "explanation": "蛹期では不要となった幼虫組織がアポトーシスにより除去され、その分解後、成虫器官となる組織の細胞が分裂・増殖し再生する。"}, {"question": "エクジソン受容体の細胞内シグナル伝達経路で重要な役割を果たす分子はどれか？", "choices": ["NR1型核内受容体と転写促進複合体", "チロシンキナーゼ受容体とMAPキナーゼカスケード", "Gタンパク質共役受容体とサイクリックAMP", "イオンチャネルの開口によるカルシウム流入"], "answer": 0, "explanation": "エクジソン受容体は核内受容体で、NR1型核内受容体として作用し、転写促進複合体として標的遺伝子の発現を調節する。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
