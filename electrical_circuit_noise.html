<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>電気回路ノイズ解析検定クイズ</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>電気回路ノイズ解析検定クイズ</h1>
    <div class="desc">電気回路やノイズ源、信号処理、干渉対策に関するマニアックで高度な知識を問うクイズです。難易度5の専門的な問題を通じて、ノイズ解析の理解を深めましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "ノイズ解析において、ホワイトノイズのパワースペクトル密度はどのような特徴を持つか？", "choices": ["周波数に依存し一定の値をとる", "低周波で特に高いピークを持つ", "高周波数で指数関数的に減衰する", "特定の周波数でのみ現れる狭帯域ノイズである"], "answer": 0, "explanation": "ホワイトノイズは全周波数帯域にわたって一定のパワースペクトル密度を持つ理想的なノイズモデルで、これは解析の標準的基準として多用されます。"}, {"question": "回路におけるショットノイズの生成要因として正しいものはどれか？", "choices": ["電子の熱運動によるランダムな電圧変動", "電荷キャリアの離散的な輸送による電流変動", "誘電体中の分極揺らぎ", "外部の電磁波誘起雑音"], "answer": 1, "explanation": "ショットノイズは電流を構成する電子やホールなどの荷電キャリアが離散的に移動することに起因するランダムな電流変動であり、トンネルダイオードや半導体接合などで顕著に現れます。"}, {"question": "フリッカーノイズ（1/fノイズ）に関して真実なのはどれか？", "choices": ["周波数が高くなるほど強くなる特性を持つ", "主に白熱球フィラメントで発生するノイズに由来する", "周波数が低くなるほど増加し、デバイス不良とも関連が深い", "測定誤差の結果であり実際のノイズではない"], "answer": 2, "explanation": "フリッカーノイズは周波数が低くなるほどノイズパワー密度が増加する特徴を持ち、半導体素子の欠陥や物理的なトラップ状態の変動が原因と考えられています。"}, {"question": "ノイズ低減のために最も効果的なシールド技術は何か？", "choices": ["無指向性アンテナの利用", "高透磁率金属による磁界シールド", "パルス整形による信号強調", "アクティブフィードバック制御"], "answer": 1, "explanation": "高透磁率材料は外部磁界の侵入を防ぐためのシールドとして有効であり、特に低周波磁界ノイズの抑制に適しています。"}, {"question": "信号対ノイズ比 (SNR) を向上させる手法として正しいのはどれか？", "choices": ["ノイズ帯域幅を意図的に広げる", "信号振幅を増加させノイズ電力を一定に保つ", "信号の位相をランダム化する", "ノイズ強度を増加させる"], "answer": 1, "explanation": "SNRは信号電力とノイズ電力の比率なので、信号の振幅を増やすことでSNRを向上させることができます。ノイズ帯域幅を広げるとノイズ電力が増えるため悪化します。"}, {"question": "干渉対策として用いられる差動信号伝送の主なメリットは何か？", "choices": ["信号振幅を倍増できる", "共通モードノイズに強くなる", "位相遅延を無くせる", "電源ノイズを増加させる"], "answer": 1, "explanation": "差動伝送では２つの信号線が逆位相で信号を送るため、共通モードのノイズが両線に同時に現れても相殺されノイズ耐性が高まります。"}, {"question": "スペクトラム拡散技術でノイズ耐性が向上する主な理由は？", "choices": ["電力を狭帯域に集中できるため", "雑音が広帯域に分散されるため", "信号帯域を広げて雑音と分散させるため", "混信が間欠的になるため"], "answer": 2, "explanation": "スペクトラム拡散は信号を広帯域に拡散することで、ノイズや干渉が特定周波数に集中する影響を緩和し、結果的に耐ノイズ性能を向上させます。"}, {"question": "熱雑音（ジョンソン−ナイキストノイズ）に影響を与えない回路パラメータはどれか？", "choices": ["抵抗値", "絶対温度", "測定帯域幅", "電流値"], "answer": 3, "explanation": "熱雑音は抵抗値、温度、帯域幅に比例するが、電流値そのものには依存しません。電流値はショットノイズなど他のノイズに関係します。"}, {"question": "ノイズ解析におけるクロストークの主な原因は何か？", "choices": ["近接する信号線間の静電容量や誘導結合", "抵抗素子の熱運動", "電源電圧の変動", "外部の太陽放射線"], "answer": 0, "explanation": "クロストークは近接した複数の信号線間での静電容量結合や相互インダクタンスによる信号干渉で発生し、信号劣化の原因となります。"}, {"question": "アクティブノイズキャンセリング回路の基本動作原理は何か？", "choices": ["ノイズと同位相の信号を加える", "ノイズをフィルタで完全に除去する", "ノイズと逆位相の信号を生成し合成する", "ノイズを増幅して検出精度を上げる"], "answer": 2, "explanation": "アクティブノイズキャンセリングではノイズと位相が180度ずれた信号を発生させて、ノイズを打ち消し合い、全体のノイズレベルを低減させます。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
