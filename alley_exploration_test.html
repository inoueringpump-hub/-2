<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>路地裏探検検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>路地裏探検検定</h1>
    <div class="desc">都市の路地裏文化や歴史、構造に関する専門用語を問う初級レベルのクイズゲームです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "都市の路地裏に見られる「袋小路」とは何を指す？", "choices": ["通り抜けができない行き止まりの通り", "商店街のメインアーケード", "高速道路の出入口", "地下鉄の待避線"], "answer": 0, "explanation": "袋小路は片方が閉じている通りで、一般的には行き止まりの路地を指します。路地裏探検ではその特徴的な構造を把握することが重要です。"}, {"question": "路地裏の構造を特徴付ける「路地（ろうじ）」の本来の意味は？", "choices": ["建物と建物の間に挟まれた細い通路", "都市計画で定められた広場の名称", "主要幹線道路の別名", "河川沿いの遊歩道"], "answer": 0, "explanation": "「路地」とは都市内で建物の間に存在する狭い通路を指し、生活や交通の細部に関わる空間です。"}, {"question": "路地裏にある昔ながらの住居形態「長屋」とは？", "choices": ["複数の住戸が横に連なる一戸建て住宅群", "高層マンションの一種", "公園に面した集合住宅", "路地を曲がった場所の別称"], "answer": 0, "explanation": "長屋は一列に連なった低層住宅で、昔の日本の都市部でよく見られた住居形態です。路地裏文化の代表例となります。"}, {"question": "「路地裏」の魅力としてよく挙げられる文化現象「ご近所付き合い」とは？", "choices": ["路地内での住民同士の生活や情報交換の関係性", "都市開発による新しい商店街の形成", "自治体による治安維持活動", "地域の大型イベント開催の総称"], "answer": 0, "explanation": "路地裏は細かく入り組んだ空間で、住民同士の密接な交流や助け合いが生まれやすい環境を指し、これを「ご近所付き合い」と呼びます。"}, {"question": "路地裏探索で注意が必要な「ゴミ置き場」について正しい説明は？", "choices": ["路地脇の狭い空間に設けられた共同の廃棄物集積場所", "大型ショッピングモール内の食品売り場", "公園内のバーベキュー専用スペース", "地下鉄駅の待合場所"], "answer": 0, "explanation": "路地の隅に設けられた共有のゴミ置き場は衛生面だけでなく景観にも影響するため、路地裏の特徴の一つとして知られています。"}, {"question": "路地裏の歴史を研究する際によく使われる資料「住宅地図」とは？", "choices": ["都市の細街路や建物の配置を詳細に示した地図のこと", "地形図の一種で山岳地帯を表すもの", "国際航空路線図の別称", "地下鉄網の路線図"], "answer": 0, "explanation": "住宅地図は建物の位置や所有者情報などを詳細に記載しており、路地裏の歴史的変遷を研究する際の重要な資料となります。"}, {"question": "路地裏の景観に大きな影響を与える「看板建築」とは？", "choices": ["主に昭和初期に建てられた商店のファサードに特徴的な外壁仕上げ", "大規模な商業施設の屋上広告の一種", "路地に設置された街路灯のデザイン名称", "公園の案内表示板"], "answer": 0, "explanation": "看板建築は店舗の外観を特徴付ける商業建築様式で、路地裏の雰囲気を形成する重要な要素です。"}, {"question": "路地裏特有の通行性管理方法「抜け道規制」とは何か？", "choices": ["迷惑行為や防犯のため歩行者や車両の通行を制限する措置", "都市高速道路の進入禁止区間のこと", "地下道に設けられる換気設備の名称", "駅前広場の歩行者専用区域"], "answer": 0, "explanation": "抜け道規制は地域の路地裏で通行を制限し、安全や静穏を確保するための町内会などの取り組みの一つです。"}, {"question": "路地裏に見られる「五尺路（ごしゃくろ）」とは何か？", "choices": ["幅約1.5メートル（五尺）程度の狭い路地の別称", "古代の城郭の城壁の名称", "道路の敷設に用いられる特殊な資材の名称", "観光名所にある幅五メートルの歩道"], "answer": 0, "explanation": "五尺路は日本独特の表現で、幅が約五尺（約1.5メートル）程度の細い路地を指し、都市部の細街路の単位として使われます。"}, {"question": "路地裏探索でよく言及される「暗渠（あんきょ）」とは何か？", "choices": ["かつて河川や水路が埋め立てられて暗く覆われた区間のこと", "地下鉄の連絡通路名称", "トンネルの照明設備の特徴", "歴史的な街灯のタイプ"], "answer": 0, "explanation": "暗渠は都市化により川や用水路が埋められ、地下に転換された経路で、路地裏の地形や歴史を理解する鍵となります。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
