<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>熱力学第二法則応用検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>熱力学第二法則応用検定</h1>
    <div class="desc">物理化学の視点から熱力学第二法則に関連するエントロピー、熱機関、非平衡系についての高度な問題集です。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "熱力学第二法則におけるエントロピーの定義として正しいものはどれか？", "choices": ["系の内部自由エネルギーの量的尺度", "系の乱雑さや無秩序さの定量的指標", "系が交換可能な熱量の最大値", "熱機関が取りうる最大効率の理論値"], "answer": 1, "explanation": "エントロピーは系の無秩序さや状態の取りうる微視的な配置数の対数に比例し、乱雑さの指標として定義される。これにより、自然過程の不可逆性を表現することができる。"}, {"question": "カルノーサイクルの効率は以下の式で表される。正しいものはどれか？", "choices": ["1 - (T_h / T_c)", "(T_c / T_h) - 1", "1 - (T_c / T_h)", "(T_h / T_c) + 1"], "answer": 2, "explanation": "カルノー効率は高温側温度T_hと低温側温度T_c（絶対温度）を用いて、η = 1 - T_c/T_hで表される。これが熱機関の理論上最大効率となる。"}, {"question": "エントロピー生成がゼロとなる条件として正しいのはどれか？", "choices": ["孤立系における断熱不可逆変化", "可逆変化中の等温過程", "可逆過程における任意の変化", "開放系におけるエネルギー交換がない場合"], "answer": 2, "explanation": "エントロピー生成がゼロとなるのは可逆過程に限られ、これにより系のエントロピーは変化しても生成は発生しない。非可逆過程ではエントロピーが生成される。"}, {"question": "非平衡熱力学におけるエントロピー流束の特徴に関して、正しい説明はどれか？", "choices": ["エントロピー流束は常に内部生成分より小さい", "エントロピー流束は系の外部との熱交換のみに依存する", "エントロピー流束は内部生成と境界通過の合計で表現される", "エントロピー流束は孤立系では常にゼロである"], "answer": 2, "explanation": "非平衡熱力学ではエントロピーの変化は内部生成分（不可逆過程に伴う）と境界面を通じたエントロピー流束の和として扱われる。"}, {"question": "熱機関の性能評価において、エントロピー増大則が示す制約はどれか？", "choices": ["効率は常にカルノー効率より大きい", "効率は絶対零度で最大となる", "可逆サイクル以外は必ずエントロピーが生成し効率低下をもたらす", "熱機関の仕事量は常に一定である"], "answer": 2, "explanation": "エントロピー増大則により、実際の熱機関は不可逆損失があり効率はカルノー効率以下となり、可逆サイクル以外では必ずエントロピー生成が生じる。"}, {"question": "非平衡系において、熱力学力学的法則とマクロ的観測量に対する関係で誤っているのはどれか？", "choices": ["系のエントロピーは時間と共に増大しうる", "定常状態ではエントロピー生成と流出が釣り合う", "非平衡状態ではエントロピーは一定である", "外部駆動により系は定常非平衡状態を維持可能である"], "answer": 2, "explanation": "非平衡状態では通常エントロピーは時間とともに変化し一定ではない。定常非平衡状態ではエントロピーの内部生成と流出が等しく、全エントロピーは一定のまま維持される。"}, {"question": "ジブズの不等式が示す熱力学第二法則の応用はどれか？", "choices": ["孤立系での自由エネルギーの最大化", "等圧等温条件下での自由エネルギーの最小化", "断熱膨張における内部エネルギーの増加", "非平衡過程でのエントロピー減少"], "answer": 1, "explanation": "ジブズの不等式は等圧等温過程において自由エネルギーが最小となる方向に進むことを示し、平衡状態の判別に応用される。"}, {"question": "熱エントロピーと情報エントロピーの関係について正しいのはどれか？", "choices": ["情報エントロピーは熱力学エントロピーの物理的対応物とされる", "情報エントロピーはエネルギーの単位で表される", "熱エントロピーは統計的配分と無関係である", "両者は全く異なる概念で関連を持たない"], "answer": 0, "explanation": "熱エントロピーは統計力学的にマイクロステートの不確定性の概念に基づき、情報エントロピーの数学的構造と対応し、情報理論と熱力学の橋渡しをする。"}, {"question": "クラウジウスの定理は熱力学第二法則をどのように表したか？", "choices": ["可逆過程でのみ熱の交換が起こる", "熱効率は温度差の関数である", "閉じた系の熱の流入を積分するとゼロになる", "可逆サイクルでの熱の受け渡しを温度で除した積分はゼロである"], "answer": 3, "explanation": "クラウジウスの定理は、可逆熱サイクルにおいて \u001d Q/T の環状積分がゼロになることを示し、これがエントロピーの自然定義へと繋がる。"}, {"question": "非平衡熱力学で用いられるフォン・ノイマンの法則として誤っている記述はどれか？", "choices": ["粒子の拡散は濃度勾配に比例する", "熱流束は温度勾配に比例する", "電流は電場に比例する", "エントロピーは必ず減少する方向に向かう"], "answer": 3, "explanation": "フォン・ノイマンの法則は各種流束が対応する駆動力（熱なら温度勾配など）に比例することを示すが、エントロピーが減少することは熱力学第二法則に反しており誤りである。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
