<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>紙飛行機設計検定【初級】</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>紙飛行機設計検定【初級】</h1>
    <div class="desc">紙飛行機の基本的な形状や飛行原理、設計技術に関するマニアックな専門用語を問うクイズです。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "紙飛行機の翼端に取り付けられ、空気の乱れを抑え飛行安定性を向上させる小さな突起を何と呼ぶ？", "choices": ["フラップ", "ウィングレット", "エルロン", "スラット"], "answer": 1, "explanation": "ウィングレットは翼端に取り付けられ、揚力の効率を上げつつ、渦を減らして飛行の安定性を高める役割を持ちます。紙飛行機にも採用されることがあります。"}, {"question": "紙飛行機の飛行中に左右にゆらゆらと揺れる現象を指す専門用語は何？", "choices": ["ピッチング", "ロール", "ヨーイング", "スウェイ"], "answer": 2, "explanation": "ヨーイングは機体の垂直軸周りの回転運動で、左右の揺れを指します。紙飛行機でも風の影響などで現れやすい運動です。"}, {"question": "紙飛行機の設計で、主翼の前縁を反らせ、揚力を増加させるための技術用語は何？", "choices": ["キャンバー", "ストール", "スパン", "アスペクト比"], "answer": 0, "explanation": "キャンバーとは翼の断面形状の曲率のことで、前縁を反らせることで揚力を増やし、飛行距離や安定性を向上させます。"}, {"question": "紙飛行機の設計で揚力と抵抗のバランスを最適化するために考慮される、翼幅と翼弦長の比率を何という？", "choices": ["リフト・トゥ・ドラッグ比", "アスペクト比", "ピッチング角", "迎角"], "answer": 1, "explanation": "アスペクト比は翼の幅（スパン）を翼の平均弦長で割ったもので、揚力効率や抵抗に大きく影響します。高い値は効率的な飛行に有利です。"}, {"question": "紙飛行機の安定性を高めるために、翼より後方に配置される小さな翼を示す専門用語は何？", "choices": ["エルロン", "スタビライザー", "ラダー", "フラップ"], "answer": 1, "explanation": "スタビライザーは尾翼にある水平または垂直の小型の翼で、機体の安定性を確保する役割を持ちます。紙飛行機でも後方に小翼を加えることで安定化が図れます。"}, {"question": "翼の表面上の空気の流れを示し、揚力発生の基本原理となる概念を表す用語は何？", "choices": ["バーナリの定理", "ニュートンの第三法則", "ベルヌーイの定理", "フックの法則"], "answer": 2, "explanation": "ベルヌーイの定理により、翼の上面では空気流速が速くなり圧力が下がるため揚力が発生します。これは紙飛行機の飛行原理の基礎です。"}, {"question": "紙飛行機の後縁部分を曲げて揚力や抵抗を調整する技術用語は何？", "choices": ["フラップ操作", "リフト操作", "エルロン調整", "ラダー調整"], "answer": 0, "explanation": "フラップは翼の後縁の可動部分で、紙飛行機では後縁を軽く折り曲げることで揚力や抵抗を微調整し、飛行性能を変化させます。"}, {"question": "紙飛行機の設計で、飛行の方向や傾きを制御するために利用される翼の一部で特に旋回に寄与する部分は？", "choices": ["ラダー", "エルロン", "ピッチング面", "ウィングレット"], "answer": 1, "explanation": "エルロンは左右の翼の後縁部分の調整で機体のロール（傾き）を制御し、旋回などを助けます。紙飛行機でも若干の傾きをつける際に使う技術です。"}, {"question": "紙飛行機の設計で、飛行時間や距離を伸ばすため飛行安定性を犠牲にして用いられる極端に細長い翼の特徴を指す用語は？", "choices": ["ロングスパンウィング", "ダルマ型翼", "デルタ翼", "ストレイトウィング"], "answer": 0, "explanation": "ロングスパンウィングは翼幅が非常に長い翼で、揚力を増やし滑空性能を高めるが安定性は下がる傾向があります。長距離飛行を狙う紙飛行機設計に用いられます。"}, {"question": "紙飛行機の設計において空気抵抗を減らすために機首を細く尖らせた形状を表す専門用語は？", "choices": ["エアロダイナミックシェイプ", "ボリューム効率", "クラウド形状", "ブロック形状"], "answer": 0, "explanation": "エアロダイナミックシェイプは空気の流れを滑らかにして抵抗を減らす形状で、紙飛行機においても機首を尖らせることで飛距離や速度向上に役立ちます。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
