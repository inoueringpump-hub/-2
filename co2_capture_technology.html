<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>二酸化炭素捕捉技術検定 - 上級編</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>二酸化炭素捕捉技術検定 - 上級編</h1>
    <div class="desc">環境工学や化学吸収、触媒反応にフォーカスした高難度の二酸化炭素捕捉技術に関するクイズです。気候変動対策の理解を深めることを目的としています。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "化学吸収法で用いられるアミン系溶液の主な反応機構は何ですか？", "choices": ["物理吸着によりCO2が溶液中に溶解する", "CO2がアミンと化学的に反応しカルバミン酸塩を形成する", "触媒作用によりCO2が分解される", "CO2が溶液中の水酸基と直接結合する"], "answer": 1, "explanation": "アミン系溶液はCO2と反応してカルバミン酸塩を形成し、化学的に吸収する。物理吸着とは異なり、化学結合が生成されることが特徴である。"}, {"question": "ポストコンバッション法において、多段圧縮と多段減圧が導入される目的は何ですか？", "choices": ["CO2の化学反応速度を高めるため", "吸収塔内の温度を均一に保つため", "溶液中のCO2濃度を最大化するため", "エネルギー消費を削減し、吸着効率を向上させるため"], "answer": 3, "explanation": "多段圧縮や減圧を利用することで、プロセス全体のエネルギー消費を抑えつつCO2吸収および再生の効率を高める設計が可能となる。"}, {"question": "酸化カルシウム（CaO）を用いるカルボネーション反応で生成される物質は何か？", "choices": ["炭酸カルシウム（CaCO3）", "炭酸ナトリウム（Na2CO3）", "塩化カルシウム（CaCl2）", "炭酸水素カルシウム（Ca(HCO3)2）"], "answer": 0, "explanation": "CaOはCO2と反応してCaCO3を生成する。この反応は高温条件下でも進行し、固体吸収材として活用される。"}, {"question": "化学吸収法における再生工程での主なエネルギー負荷はどの段階か？", "choices": ["CO2吸収時の熱放出", "溶媒の再生のための加熱工程", "吸収塔内での攪拌動力", "CO2圧縮時の電力消費"], "answer": 1, "explanation": "吸収後の溶媒からCO2を脱離させるために加熱を行う再生工程は、化学吸収法の中で最もエネルギー負荷の高いステップである。"}, {"question": "膜分離法と比較したときの化学吸収法の主な利点は何か？", "choices": ["高温での運用が可能である", "化学的選択性によって高い純度のCO2回収が可能である", "設置コストが低い", "メンテナンスがほとんど不要"], "answer": 1, "explanation": "化学吸収法は特定の化学反応を利用してCO2のみを選択的に吸収するため、高純度のCO2回収が可能である点が膜分離法より優れている。"}, {"question": "アンモニア吸収法における主な課題として正しいものはどれか？", "choices": ["アンモニアの分解による有害ガス排出", "アンモニアの揮発による環境汚染のリスク", "CO2と反応しにくい性質", "高コストな吸収剤の使用"], "answer": 1, "explanation": "アンモニアは吸収中に揮発しやすく、周辺環境への影響や安全面での問題が考慮される必要がある。"}, {"question": "吸着法における固体吸着材として、以下のうちCO2回収に最も適している材料はどれか？", "choices": ["アクティベーテッドカーボン", "ゼオライト", "多孔性金属錯体（MOFs）", "シリカゲル"], "answer": 2, "explanation": "多孔性金属錯体（MOFs）は高い表面積と選択的結合サイトを持ち、CO2捕捉に関して非常に有望な材料として研究されている。"}, {"question": "触媒反応を利用したCO2水素化により生成される有用化学物質はどれか？", "choices": ["炭酸水素ナトリウム", "メタノール", "酢酸", "エチレン"], "answer": 1, "explanation": "CO2水素化反応はCO2と水素を用いてメタノールを生成し、燃料や化学品の原料となることから注目されている。"}, {"question": "二酸化炭素の直接空気回収（DAC）技術の主な課題は何か？", "choices": ["高濃度のCO2にしか対応できない", "多量の水を消費する", "空気中のCO2濃度が極めて低いため大量のエネルギーを必要とする", "触媒の毒性問題がある"], "answer": 2, "explanation": "大気中のCO2濃度は約0.04％と低いため、DACは大量の空気を処理する必要があり、そのためのエネルギー消費が大きな課題となっている。"}, {"question": "二酸化炭素溶解法（物理吸収）で利用される主要な溶媒の特徴は何か？", "choices": ["高い化学反応性でCO2と強く結合する", "低体積膨張率で温度変化に弱い", "高いCO2分配係数を持ち、低圧下で効率的に吸収可能である", "腐食性が高く装置の耐久性が低い"], "answer": 2, "explanation": "物理吸収法で使われる溶媒はCO2の分配係数が高く、圧力依存性が強いため低圧で効率よくCO2を吸収できる特性を持つ。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
