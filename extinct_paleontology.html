<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>絶滅古生物学検定</title>
<style>
  :root {
    --bg1:#090a18;
    --bg2:#151b3d;
    --card:#11172fdd;
    --accent:#7cf7ff;
    --accent2:#ff5fd7;
    --text:#f5f7ff;
    --muted:#a9b1d6;
    --ok:#4ade80;
    --ng:#fb7185;
  }
  * { box-sizing: border-box; }
  body {
    margin:0;
    min-height:100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at top left, #2845ff55, transparent 36%),
      radial-gradient(circle at bottom right, #ff3bd555, transparent 34%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    padding: 22px;
  }
  .wrap { max-width: 980px; margin: 0 auto; }
  header {
    padding: 28px 22px;
    border: 1px solid #ffffff22;
    background: #ffffff10;
    border-radius: 24px;
    box-shadow: 0 20px 60px #0008;
    backdrop-filter: blur(12px);
    margin-bottom: 18px;
  }
  h1 { margin: 0 0 8px; font-size: clamp(26px, 5vw, 46px); letter-spacing: .03em; }
  .desc { color: var(--muted); line-height: 1.75; }
  .panel {
    border: 1px solid #ffffff22;
    background: var(--card);
    border-radius: 24px;
    padding: 22px;
    box-shadow: 0 20px 60px #0007;
  }
  .status { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px; }
  .badge {
    padding: 8px 12px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    border-radius:999px;
    color:var(--muted);
    font-size:14px;
  }
  .question {
    font-size: clamp(20px, 3vw, 28px);
    line-height:1.55;
    margin: 14px 0 18px;
    font-weight: 800;
  }
  .choices { display:grid; gap:12px; }
  button.choice {
    width:100%;
    text-align:left;
    border:1px solid #ffffff26;
    color:var(--text);
    background:#ffffff10;
    padding:16px 18px;
    border-radius:16px;
    font-size:16px;
    line-height:1.55;
    cursor:pointer;
    transition:.16s transform, .16s background, .16s border;
  }
  button.choice:hover { transform: translateY(-2px); background:#ffffff18; border-color:var(--accent); }
  button.choice.correct { border-color: var(--ok); background: #22c55e22; }
  button.choice.wrong { border-color: var(--ng); background: #ef444422; }
  .explain {
    margin-top:16px;
    padding:16px;
    background:#00000033;
    border-left:4px solid var(--accent);
    border-radius:12px;
    color:#dfe7ff;
    line-height:1.8;
    display:none;
  }
  .controls { display:flex; gap:10px; flex-wrap:wrap; margin-top:18px; }
  .mainbtn {
    border:0;
    border-radius:999px;
    padding:13px 18px;
    font-weight:800;
    cursor:pointer;
    color:#06101c;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .subbtn {
    border:1px solid #ffffff22;
    border-radius:999px;
    padding:13px 18px;
    font-weight:700;
    cursor:pointer;
    color:var(--text);
    background:#ffffff12;
  }
  .result { display:none; text-align:center; padding:28px 10px; }
  .score {
    font-size: clamp(38px, 10vw, 82px);
    font-weight:900;
    margin: 8px 0;
    background: linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    color:transparent;
  }
  .rank { font-size: 24px; font-weight: 900; margin-bottom: 12px; }
  footer { opacity:.7; font-size:12px; text-align:center; margin-top:18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>絶滅古生物学検定</h1>
    <div class="desc">化石学や古生物学、絶滅理論、進化史に関するマニアックな問題を10問収録した難易度5のクイズゲームです。高度な知識に挑戦しましょう。</div>
  </header>

  <main class="panel" id="game">
    <div class="status">
      <div class="badge" id="progress">Q 1 / 1</div>
      <div class="badge" id="scoreBadge">Score 0</div>
      <div class="badge">推測困難型・極限検定</div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="explain" id="explain"></div>
    <div class="controls">
      <button class="mainbtn" id="nextBtn" disabled>次の問題へ</button>
      <button class="subbtn" id="restartBtn">最初から</button>
    </div>
  </main>

  <section class="panel result" id="result">
    <div>最終結果</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment" class="desc"></p>
    <button class="mainbtn" onclick="restart()">もう一度挑戦</button>
  </section>

  <footer>Generated by Quiz Factory HTML Generator v3</footer>
</div>

<script>
const QUESTIONS = [{"question": "ジュラ紀に生息していた大型肉食恐竜で、鋭い牙と強力な後肢を持ち、その名は「爬虫類の王」とも称されるのは？", "choices": ["アロサウルス", "スコミムス", "カルノタウルス", "メガロサウルス"], "answer": 0, "explanation": "アロサウルスはジュラ紀に生息した代表的な大型肉食恐竜で、強力な後肢と鋭い牙を持ち、『爬虫類の王』として知られます。カルノタウルスは後期白亜紀、スコミムスはジュラ紀後期ですがより小型、メガロサウルスはジュラ紀初期の恐竜です。"}, {"question": "ペルム紀末の大量絶滅を引き起こした主因として最も支持されているのは？", "choices": ["巨大隕石の衝突", "シベリアトラップの火山活動", "大規模な海面上昇", "氷期の進展"], "answer": 1, "explanation": "ペルム紀末大量絶滅の主因はシベリアトラップの大規模な火山活動によるとする説が有力で、これが大気や海洋環境の劇的変化を引き起こしました。隕石衝突説は白亜紀末絶滅で優勢です。"}, {"question": "三葉虫の一種で、複眼構造が非常に発達し、視覚適応の鍵となった大学者の名を冠した種は？", "choices": ["アノマロカリス・ウォルコッキ", "トマクトロン・ロックヒル", "アジアクロナス・リー", "ガリメデス・ウォームウッド"], "answer": 0, "explanation": "アノマロカリスは三葉虫と同時代の捕食者で複雑な複眼を持ち、その名はウォルコット博士にちなみます。ただし厳密には三葉虫ではなく古生物学的に重要な節足動物の先駆けです。"}, {"question": "有名な絶滅理論で、ダーウィンの提唱した自然選択説とは異なり、突然の大量絶滅の事実を補完したのは？", "choices": ["漸進的進化説", "突発的絶滅説", "中生代進化説", "分岐進化論"], "answer": 1, "explanation": "突発的絶滅説は大量絶滅が短期間で急激に起こることを説明し、従来のゆっくり進行するとされた自然選択説（漸進的進化説）に補完的な考え方を提供しました。"}, {"question": "初期哺乳類の特徴とされる、三つの耳小骨のうち、特に鼓膜振動の伝達に関与する骨は？", "choices": ["インクス骨", "マルレウス骨", "スタペス骨", "ペトロス骨"], "answer": 2, "explanation": "スタペス骨（鐙骨）は三つの耳小骨の一つであり、鼓膜の振動を内耳に伝える役割があり、哺乳類の音響伝達に重要です。インクス骨とマルレウス骨も耳小骨ですが、ペトロス骨は頭蓋骨の部位です。"}, {"question": "海洋性の絶滅古生物の一例で、眼が発達し巨大化した中生代の軟体動物は？", "choices": ["アンモナイト", "ベレムナイト", "オウムガイ", "ビアクルス"], "answer": 0, "explanation": "アンモナイトは中生代で繁栄し、発達した複眼を持つ軟体動物の一種です。ベレムナイトも軟体動物ですが内部軟骨が多い、オウムガイは現存種、ビアクルスは化石種としては知られていません。"}, {"question": "古第三紀における哺乳類の放散に大きく寄与したと考えられる出来事は？", "choices": ["中生代白亜紀の大量絶滅", "始新世の気候温暖化", "古新世末の大規模火山活動", "中新世の氷河期開始"], "answer": 0, "explanation": "中生代白亜紀の大量絶滅により恐竜が絶滅し、哺乳類が多様化・放散する契機となりました。始新世の温暖化も重要ですが、哺乳類の基盤的進化はそれ以前に始まっています。"}, {"question": "化石の年代測定で、放射性同位元素を用いた方法で最も一般的に利用されるのは？", "choices": ["カリウム-アルゴン法", "炭素-14法", "ウランシリーズ法", "酸素同位体比法"], "answer": 0, "explanation": "カリウム-アルゴン法は古い岩石や化石の年代測定に広く用いられ、特に古生代や中生代の年代決定に適します。炭素-14法は数万年程度までの年代測定に限られます。"}, {"question": "古生代の魚類の一群で、あごを持つ初期の顎口類として知られるのは？", "choices": ["デボン紀のダンクレオステウス", "カンブリア紀のアノマロカリス", "オルドビス紀のトリロバイト", "シルル紀のアーケロン"], "answer": 0, "explanation": "ダンクレオステウスは古生代デボン紀に生息した大型の顎口類で、初期のあごを持つ魚類として有名です。アノマロカリスは節足動物の祖先的存在、トリロバイトは三葉虫、アーケロンは白亜紀のカメです。"}, {"question": "絶滅種の復活研究で注目されている「デ・エクスティンクション」の主な技術的課題は？", "choices": ["完全なゲノム解析と修復", "自然交配の再現", "古環境の復元", "生育環境の人工的模倣"], "answer": 0, "explanation": "「デ・エクスティンクション」では絶滅種の復活の鍵は、完全なゲノム解析と欠損部分の修復技術にあります。自然交配や環境復元は別途課題ですが、ゲノム情報の確実な再構築が最も基盤的な技術的課題です。"}];

let index = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const choicesEl = document.getElementById("choices");
const explainEl = document.getElementById("explain");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const progressEl = document.getElementById("progress");
const scoreBadge = document.getElementById("scoreBadge");
const gameEl = document.getElementById("game");
const resultEl = document.getElementById("result");
const finalScoreEl = document.getElementById("finalScore");
const rankEl = document.getElementById("rank");
const commentEl = document.getElementById("comment");

function render() {
  answered = false;
  nextBtn.disabled = true;
  explainEl.style.display = "none";
  explainEl.textContent = "";

  const q = QUESTIONS[index];
  progressEl.textContent = `Q ${index + 1} / ${QUESTIONS.length}`;
  scoreBadge.textContent = `Score ${score}`;
  qEl.textContent = q.question;
  choicesEl.innerHTML = "";

  q.choices.forEach((choice, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = `${String.fromCharCode(65 + i)}. ${choice}`;
    btn.onclick = () => answer(i);
    choicesEl.appendChild(btn);
  });
}

function answer(selected) {
  if (answered) return;
  answered = true;

  const q = QUESTIONS[index];
  const buttons = [...document.querySelectorAll("button.choice")];

  buttons.forEach((b, i) => {
    b.disabled = true;
    if (i === q.answer) b.classList.add("correct");
    if (i === selected && i !== q.answer) b.classList.add("wrong");
  });

  if (selected === q.answer) score++;

  explainEl.style.display = "block";
  explainEl.textContent = q.explanation;
  scoreBadge.textContent = `Score ${score}`;
  nextBtn.disabled = false;
}

function next() {
  index++;
  if (index >= QUESTIONS.length) showResult();
  else render();
}

function showResult() {
  gameEl.style.display = "none";
  resultEl.style.display = "block";
  const percent = Math.round(score / QUESTIONS.length * 100);
  finalScoreEl.textContent = `${score} / ${QUESTIONS.length}`;

  let rank = "";
  let comment = "";
  if (percent >= 90) {
    rank = "神域の専門家";
    comment = "これはもう出題者側に回るレベルです。";
  } else if (percent >= 70) {
    rank = "上級マニア";
    comment = "かなり深い知識です。普通の検定なら余裕で最上位です。";
  } else if (percent >= 50) {
    rank = "沼の入口突破";
    comment = "難問相手に十分健闘しています。";
  } else {
    rank = "まだ人間側";
    comment = "この検定はそもそも理不尽寄りです。再挑戦で沼へ。";
  }
  rankEl.textContent = rank;
  commentEl.textContent = comment;
}

function restart() {
  index = 0;
  score = 0;
  gameEl.style.display = "block";
  resultEl.style.display = "none";
  render();
}

nextBtn.onclick = next;
restartBtn.onclick = restart;
render();
</script>
</body>
</html>
